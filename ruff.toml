# ruff.toml — bmt-gcloud
# https://docs.astral.sh/ruff/ | https://docs.astral.sh/ruff/rules/
# Use Ruff extension (charliermarsh.ruff) for on-save linting/formatting.

line-length = 120
target-version = "py312"
fix = true
show-fixes = true
preview = false

exclude = [".git", ".venv", "build", "dist", "data", "sk_runtime", "local_batch", "secrets"]

[format]
quote-style = "double"
indent-style = "space"
line-ending = "auto"
skip-magic-trailing-comma = false
docstring-code-format = true
docstring-code-line-length = "dynamic"

[lint]
dummy-variable-rgx = "^(_+|(_+[a-zA-Z0-9_]*[a-zA-Z0-9]+?))$"

select = [
    "E",   # pycodestyle errors
    "F",   # pyflakes
    "W",   # pycodestyle warnings
    "I",   # isort
    "B",   # flake8-bugbear
    "UP",  # pyupgrade
    "RUF", # ruff-specific rules
    "PL",  # pylint
    "S",   # flake8-bandit
    "C4",  # flake8-comprehensions
    "A",   # flake8-builtins
    "C90", # mccabe complexity
    "N",   # pep8-naming
]

extend-select = [
    "PERF", # perflint
    "SIM",  # flake8-simplify
    "T20",  # flake8-print
    "ERA",  # eradicate
    "FBT",  # flake8-boolean-trap
    "DTZ",  # flake8-datetimez
    "FA",   # flake8-future-annotations
    "ISC",  # flake8-implicit-str-concat
    "PTH",  # flake8-use-pathlib
    "TID",  # flake8-tidy-imports
    "PT",   # flake8-pytest-style
    "G",    # flake8-logging
    "ARG",  # flake8-unused-arguments
    "FURB", # refurb
    "TRY",  # tryceratops
    "PIE",  # flake8-pie
    "RET",  # flake8-return (return consistency, avoid assignment-before-return)
    "ICN",  # flake8-import-conventions (e.g. numpy as np)
]

# Optional rule sets: uncomment and add to extend-select to enable.
# COM  = flake8-commas (trailing comma style; formatter may already enforce)
# Q    = flake8-quotes (quote consistency; formatter handles double by default)
# RSE  = flake8-raise (prefer raise X from e, avoid redundant raise)
# LOG  = flake8-logging-format (logging format args)
# EM   = flake8-errmsg (exception message style)
# TC   = flake8-type-checking (move typing-only imports into TYPE_CHECKING)
# SLF  = flake8-self (self/cls usage)
# extend-select = [..., "COM", "PIE", "Q", "RSE", "RET", "ICN", "LOG", "EM", "TC", "SLF"]

ignore = [
    "E501",    # line length handled by formatter
    "PLR2004", # magic values in comparisons
    "PLR0913", # too many arguments
    "S101",    # assert is acceptable
    "S603",    # trusted subprocess usage (gcloud, runner)
    "S607",    # trusted partial executable paths
]

extend-ignore = [
    "COM812",  # missing trailing comma — handled by formatter
    "ISC001",  # single-line implicit string concat — handled by formatter
    "EM101",   # exception message formatting
    "EM102",   # exception message formatting
    "TRY300",  # tryceratops: exception handling
    "TRY301",  # tryceratops: exception handling
    "TRY003",  # long exception messages OK (runtime errors, user-facing)
    "SIM108",  # readability vs terseness
    "RET504",  # assignment-before-return (debuggability tradeoff)
    "ARG002",  # unused method argument (interfaces/callbacks)
    "PLR6301", # method could be function (noisy for pytest/extensibility)
    "PERF401", # list comprehension optional (explicit loops acceptable)
    "S310",    # urlopen: VM watcher uses HTTPS only; bandit heuristic too strict
    "S105",    # false positive: constant names like STATUS_PASS not passwords
]

[lint.isort]
known-first-party = ["bmt"]
combine-as-imports = true
force-single-line = false
force-wrap-aliases = false
split-on-trailing-comma = true

[lint.flake8-tidy-imports]
ban-relative-imports = "parents"

[lint.flake8-type-checking]
strict = true

[lint.mccabe]
max-complexity = 10

[lint.per-file-ignores]
# Lazy/google.* imports: allow inside functions (PLC0415) and isort single-line (I001)
"gcp/image/**" = ["PLC0415"]
"tests/**" = [
    "S101",    # assert is fine in tests
    "PLR2004", # magic values OK in tests
    "PLR0913", # many args OK in test fixtures
    "T20",     # print OK in tests
    "ARG001",  # unused fixture args (pytest pattern)
    "RUF059",  # unpacked variable unused OK (e.g. status, _ = f())
    "PLC0415", # imports in test functions OK
    "FBT001",  # boolean args OK in tests
    "FBT002",  # boolean defaults OK in tests
    "F401",    # imports in try/except for availability
    "S108",    # /tmp paths OK in tests
    "S110",    # try/except/pass OK in tests
    "B007",    # unused loop variable OK in tests
    "B017",    # broad exception assertions OK in tests
    "PT011",   # broad pytest.raises OK in tests
    "PT018",   # compound assertions OK in tests
    "SLF001",  # private member access OK in tests
]
# tools: PLC0415 — lazy imports (CLI subcommands, Rich when TTY); top-level would load deps on every run
"tools/**" = [
    "ERA001",  # commented code OK during development
    "T20",     # print OK in tools CLI scripts
    "E402",    # module import not at top (path/setup before imports)
    "PLC0415", # see comment above
    "PLR0911", # many returns OK (e.g. generators)
    "PLR0912", # many branches OK
    "PLR0915", # many statements OK in scripts
    "C901",    # complexity OK in scripts
    "G004",    # logging f-strings OK (not perf-critical)
    "TC003",   # stdlib imports at runtime OK
    "FBT001",  # boolean positional args OK
    "FBT002",  # boolean default args OK
    "TRY004",  # RuntimeError OK for CLI validation (not type errors)
    "ARG001",  # unused args OK (interface compliance)
    "SIM117",  # nested with OK (mock/patch patterns)
]
".github/bmt/**" = [
    "T20",     # print OK for CLI (driver)
    "ARG001",  # unused args OK (command interface)
    "PLC0415", # lazy imports OK in driver.py
    "I001",    # isort single-line; google.cloud imports often multi-line
    "C901",    # complexity OK in wait_verdicts
    "PLR0912", # many branches OK
    "PLR0915", # many statements OK
]
"deploy/**" = [
    "T20",     # print OK in VM-side scripts
    "ARG001",  # unused args OK (argparse/interface)
    "FBT001",  # boolean positional args (ThreadPoolExecutor, etc.)
    "FBT002",  # boolean default args
    "S108",    # /tmp/dummy is template placeholder, not insecure
    "C901",    # complexity OK in bmt_manager
    "PLR0912", # many branches OK
    "PLR0915", # many statements OK
    "PLW0603", # global for signal handler (_shutdown) is intentional
]
