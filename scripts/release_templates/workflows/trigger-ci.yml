# Thin trigger — workflow_dispatch only (no push to dev).
# PR trigger with full BMT pipeline lives in trigger-ci-pr.yml.
# This template is used in core-main/.github/workflows/trigger-ci.yml.
name: Build (dispatch)

on:
  workflow_dispatch:

permissions:
  contents: read
  actions: write

jobs:
  build:
    name: Build
    uses: ./.github/workflows/build-and-test.yml
    secrets: inherit
