# Thin trigger so CI runs using workflow files from the *source* branch.
# - On pull_request_target: runs build-and-test from the PR head (your branch), not the target.
# - No push to dev: merge policy assumes direct pushes to dev are forbidden; CI is PR-driven.
# Copy to core-main/.github/workflows/internal/ (root workflows stay build-and-test, bmt-handoff, clang-format). Merge to default once.
name: Trigger CI (from branch)

on:
  workflow_dispatch:
  pull_request_target:
    branches: [ dev ]

permissions:
  contents: read
  actions: read

jobs:
  ci:
    name: Run CI from source branch
    runs-on: ubuntu-latest
    uses: ./.github/workflows/build-and-test.yml@${{ github.event_name == 'pull_request_target' && github.head_ref || github.ref_name }}
    secrets: inherit
