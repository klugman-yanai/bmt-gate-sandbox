# Thin trigger so CI runs using workflow files from the *source* branch.
# - On pull_request: runs build-and-test from the PR head (your branch), not the target.
# - On push: runs build-and-test from the branch that was pushed.
# Copy to core-main/.github/workflows/ alongside build-and-test.yml. Merge to default once.
name: Trigger CI (from branch)

on:
  push:
    branches: [ dev ]
  pull_request_target:
    branches: [ dev ]

permissions:
  contents: read
  actions: read

jobs:
  ci:
    name: Run CI from source branch
    runs-on: ubuntu-latest
    uses: ./.github/workflows/build-and-test.yml@${{ github.event_name == 'pull_request_target' && github.head_ref || github.ref_name }}
    secrets: inherit
