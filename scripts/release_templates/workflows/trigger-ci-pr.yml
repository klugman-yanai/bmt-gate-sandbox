# Thin trigger — PRs to dev run full CI + BMT handoff.
# Push-only build trigger lives in trigger-ci.yml.
# This template is used in core-main/.github/workflows/trigger-ci-pr.yml.
name: Build and BMT (PR)

on:
  pull_request_target:
    branches:
      - dev

permissions:
  contents: read
  actions: write
  id-token: write
  statuses: write
  pull-requests: read

jobs:
  build:
    name: Build
    uses: ./.github/workflows/build-and-test.yml
    secrets: inherit

  bmt:
    name: BMT
    needs: [build]
    if: >-
      (needs.build.result == 'success' || needs.build.result == 'skipped')
      && github.event.pull_request.head.repo.full_name == github.repository
    permissions:
      contents: read
      actions: read
      id-token: write
      statuses: write
      pull-requests: read
    uses: ./.github/workflows/bmt-handoff.yml
    with:
      ci_run_id: ${{ github.run_id }}
      head_sha: ${{ github.event.pull_request.head.sha }}
      head_branch: ${{ github.event.pull_request.head.ref }}
      head_event: ${{ github.event_name }}
      pr_number: ${{ format('{0}', github.event.pull_request.number) }}
      use_mock_runner: false
      skip_missing_runner_artifacts: false
      cloud_run_region: ${{ vars.CLOUD_RUN_REGION }}
      bmt_status_context: ${{ vars.BMT_STATUS_CONTEXT }}
    secrets: inherit
