
[build-system]
requires = ["uv_build>=0.10.7,<0.11.0"]
build-backend = "uv_build"

[tool.uv.build-backend]
# Workspace root: minimal stub package so uv_build has one module; real CLI is in workspace member packages/bmt-cli.
module-name = "bmt_cloud_dev"
module-root = "src"

[project]
name = "bmt-cloud-dev"
version = "0.1.0"
requires-python = ">=3.12"
dependencies = [
    "bmt",
    "click>=8.1.0",
    "rich>=13.0",
    "requests>=2.31.0",
    "whenever>=0.9.5",
]

[tool.uv.sources]
bmt = { workspace = true }

[tool.uv.workspace]
members = ["packages/bmt-cli"]

[project.optional-dependencies]
# For VM watcher when using GitHub App JWT (install with: pip install -e ".[vm]")
vm = ["PyJWT>=2.0", "cryptography>=41.0"]
# For live BMT monitor TUI (install with: pip install -e ".[monitor]")
monitor = ["rich>=13.0", "whenever>=0.9.0"]

# Ruff: configured in ruff.toml (line-length 120, py312, select/ignore, per-file-ignores).
# bmt is a workspace member (.github/bmt); root no longer builds it via setuptools find.

[tool.basedpyright]
include = ["."]
exclude = ["**/.venv", "**/node_modules", "**/__pycache__", "data", "sk_runtime", "local_batch", "secrets"]
venvPath = "."
venv = ".venv"
pythonVersion = "3.12"
extraPaths = ["packages/bmt-cli"]
# Scripts parse arbitrary JSON (dict[str, Any]); keep Any/unknown reporting off.
reportExplicitAny = false
reportAny = false
reportUnknownMemberType = false
reportUnknownVariableType = false
reportUnknownArgumentType = false

[dependency-groups]
dev = [
    "cryptography>=46.0.5",
    "prek>=0.3.3",
    "pyjwt>=2.11.0",
    "pytest>=9.0.2",
]
