
[project]
name = "bmt-cloud-dev"
version = "0.1.0"
requires-python = ">=3.12"
dependencies = [
    "bmt",
    "click>=8.1.0",
    "rich>=13.0",
    "requests>=2.31.0",
    "whenever>=0.9.5",
]

[tool.uv.sources]
bmt = { workspace = true }

[tool.uv]
# Workspace root only; do not attempt to build/install a root package.
package = false

[tool.uv.workspace]
members = [".github/bmt"]

[project.optional-dependencies]
# For VM watcher when using GitHub App JWT (install with: pip install -e ".[vm]")
vm = ["PyJWT>=2.0", "cryptography>=41.0"]
# For live BMT monitor TUI (install with: pip install -e ".[monitor]")
monitor = ["rich>=13.0", "whenever>=0.9.0"]

# Ruff: configured in ruff.toml (line-length 120, py312, select/ignore, per-file-ignores).
# bmt is a workspace member (.github/bmt); root is intentionally non-packaged.

[tool.basedpyright]
include = ["."]
exclude = ["**/.venv", "**/node_modules", "**/__pycache__", "data", "sk_runtime", "local_batch", "secrets"]
venvPath = "."
venv = ".venv"
pythonVersion = "3.12"
extraPaths = [".github/bmt"]
# Scripts parse arbitrary JSON (dict[str, Any]); keep Any/unknown reporting off.
reportExplicitAny = false
reportAny = false
reportUnknownMemberType = false
reportUnknownVariableType = false
reportUnknownArgumentType = false

[dependency-groups]
dev = [
    "cryptography>=46.0.5",
    "httpx>=0.28.1",
    "prek>=0.3.3",
    "pyjwt>=2.11.0",
    "pytest>=9.0.2",
]
