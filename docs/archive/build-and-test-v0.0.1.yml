name: CI

on:
  workflow_dispatch:
  push:
    # Only dev: PR branches trigger via pull_request, so one run per push.
    branches:
      - dev
  pull_request:
    branches:
      - dev
      - ci/check-bmt-gate
      - test/check-bmt-gate-*
      - test/workflow-optimizations

defaults:
  run:
    shell: bash

# Artifact upload (checkout-once) and download (restore-snapshot) need actions read/write.
permissions:
  contents: read
  actions: read

# One run per branch; push and pull_request share group by branch name.
concurrency:
  group: ci-${{ github.repository }}-${{ github.event.pull_request.head.ref || github.ref_name }}
  cancel-in-progress: true

jobs:
  checkout-once:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: write
    outputs:
      artifact_size: ${{ steps.report.outputs.artifact_size }}
    steps:
      - name: Checkout source
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
        with:
          repository: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name || github.repository }}
          ref: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.sha }}
          fetch-depth: 1
          submodules: false
          lfs: false

      - name: Create repo snapshot
        run: |
          tar --exclude='.git' \
              --exclude='.ruff_cache' \
              --exclude='.venv' --exclude='venv' --exclude='.uv' \
              --exclude='__pycache__' --exclude='.mypy_cache' --exclude='.pytest_cache' --exclude='.tox' --exclude='*.egg-info' \
              --exclude='.cursor' --exclude='.vscode' \
              --exclude='node_modules' \
              -czf /tmp/repo-snapshot.tar.gz .
          mv /tmp/repo-snapshot.tar.gz repo-snapshot.tar.gz

      - name: Report repo-snapshot size
        id: report
        run: |
          size=$(du -h repo-snapshot.tar.gz | cut -f1)
          echo "::notice::repo-snapshot artifact size: $size"
          echo "artifact_size=$size" >>"$GITHUB_OUTPUT"

      - name: Upload repo-snapshot
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4
        with:
          name: repo-snapshot
          path: repo-snapshot.tar.gz
          retention-days: 5

  extract-presets:
    runs-on: ubuntu-latest
    outputs:
      presets_release: ${{ steps.parse.outputs.presets_release }}
      presets_nonrelease: ${{ steps.parse.outputs.presets_nonrelease }}
    steps:
      - name: Fetch CMakePresets.json
        env:
          REPO: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name || github.repository }}
          REF: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.sha }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          url="https://api.github.com/repos/${REPO}/contents/CMakePresets.json?ref=${REF}"
          for delay in 0 5 10 20; do
            [[ "$delay" -gt 0 ]] && sleep "$delay"
            curl -fsSL --connect-timeout 15 --max-time 60 \
              -H "Authorization: Bearer ${GH_TOKEN}" \
              -H "Accept: application/vnd.github.raw" \
              "${url}" -o CMakePresets.json && break
          done
          [[ -s CMakePresets.json ]] || { echo "::error::Failed to fetch CMakePresets.json"; exit 1; }

      - name: Parse CMakePresets.json
        id: parse
        run: |
          presets_release=$(jq -c '
            [ .buildPresets[]
              | { build: .name
                , configure: .configurePreset
                , short: (.name | sub("-build$"; "")) }
              | select(
                  (.configure | test("_gcc_Release")) and
                  (.configure | test("xtensa"; "i") | not) and
                  (.configure | test("hexagon"; "i") | not)
                )
            ]' CMakePresets.json)
          presets_nonrelease=$(jq -c '
            [ .buildPresets[]
              | { build: .name
                , configure: .configurePreset
                , short: (.name | sub("-build$"; "")) }
              | select(
                  (.configure | test("_gcc_Release") | not) or
                  (.configure | test("xtensa"; "i")) or
                  (.configure | test("hexagon"; "i"))
                )
              | . + {soft_fail: ((.configure | test("xtensa"; "i")) or (.configure | test("hexagon"; "i")))}
            ]' CMakePresets.json)
          {
            echo "presets_release=$presets_release"
            echo "presets_nonrelease=$presets_nonrelease"
          } >>"$GITHUB_OUTPUT"

  build-release:
    needs: [checkout-once, extract-presets]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: write
    strategy:
      fail-fast: false
      max-parallel: 6
      matrix:
        include: ${{ fromJson(needs.extract-presets.outputs.presets_release) }}

    env:
      GRADLE_USER_HOME: ${{ github.workspace }}/.gradle

    steps:
      - name: Checkout repo (for local actions)
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
        with:
          ref: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.sha }}
          fetch-depth: 1
          sparse-checkout: .github

      - uses: ./.github/actions/checkout-and-restore
        with:
          ref: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.sha }}

      - uses: ./.github/actions/setup-build-env
        with:
          configure: ${{ matrix.configure }}
          build: ${{ matrix.build }}

      # ---- configure ----
      - name: Configure ( ${{ matrix.configure }} )
        timeout-minutes: 20
        run: |
          set -euo pipefail
          if [[ "${{ matrix.configure }}" == *webos* || "${{ matrix.build }}" == *webos* ]]; then
            cmake --preset "${{ matrix.configure }}" \
              -DCMAKE_TRY_COMPILE_TARGET_TYPE=STATIC_LIBRARY \
              -DCMAKE_INTERPROCEDURAL_OPTIMIZATION=OFF
          else
            cmake --preset "${{ matrix.configure }}"
          fi

      # ---- build ----
      - name: Build ( ${{ matrix.short }} )
        timeout-minutes: 60
        run: |
          set -euo pipefail
          cmake --build --preset "${{ matrix.build }}" 2>&1 | tee build.log
          gzip -9 build.log

      # ---- build output ----
      - name: Check build output
        run: |
          set -euo pipefail
          if [ ! -f build.log.gz ]; then echo "No build log found"; exit 0; fi
          warnings=$(zgrep -c "warning:" build.log.gz || true)
          errors=$(zgrep -c "error:"   build.log.gz || true)
          echo "Warnings: $warnings"
          echo "Errors  : $errors"
          if [ "$warnings" -gt 0 ] || [ "$errors" -gt 0 ]; then
            echo "::error::Build failed – $warnings warnings, $errors errors."
            exit 1
          else
            echo "::notice::Build clean."
          fi

      # ---- runner artifact for BMT ----
      - name: Setup uv
        uses: astral-sh/setup-uv@38f3f104447c67c051c4a08e39b64a148898af3a  # v4
        with:
          version: "v0.5.11"

      - name: Sync BMT
        run: uv sync --project .github/bmt

      - name: Stage release runner payload
        env:
          MATRIX_CONFIGURE: ${{ matrix.configure }}
        run: uv run --project .github/bmt bmt stage-release-runner

      - name: Compute runner artifact info
        id: runner-artifact
        env:
          MATRIX_CONFIGURE: ${{ matrix.configure }}
        run: uv run --project .github/bmt bmt compute-preset-info

      - name: Upload runner artifact
        timeout-minutes: 8
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4
        with:
          # BMT handoff (bmt.yml) downloads these by name runner-<preset> from this run via ci_run_id.
          name: runner-${{ steps.runner-artifact.outputs.preset }}
          path: |
            ${{ steps.runner-artifact.outputs.runners_dir }}/kardome_runner
            ${{ steps.runner-artifact.outputs.lib_dir }}/libKardome.so
          if-no-files-found: error
          retention-days: 7

      # ---- disk + cleanup (always) ----
      - name: Disk space (after)
        if: always()
        run: |
          df -h
          echo "Workspace size:"
          du -sh . || true
          echo "Top 30 largest paths in workspace:"
          du -ah . 2>/dev/null | sort -h | tail -n 30 || true

      - name: Cleanup heavy dirs
        if: always()
        continue-on-error: true
        run: |
          set -euo pipefail
          rm -rf "${GRADLE_USER_HOME}" || true
          find . -path './.git' -prune -o -type d \( -name build -o -name .cxx -o -name CMakeFiles \) -prune -exec rm -rf {} + || true
          find . -path './.git' -prune -o -type f -name CMakeCache.txt -delete || true
          df -h

  bmt-handoff:
    needs: build-release
    if: >-
      success()
      && (github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository)
      && contains(
        fromJson('["dev","ci/check-bmt-gate"]'),
        (github.event_name == 'pull_request' || github.event_name == 'pull_request_target')
          && github.event.pull_request.head.ref
          || github.ref_name
      )
    permissions:
      actions: read
      contents: read
      statuses: write
      issues: write
      id-token: write
    uses: ./.github/workflows/bmt.yml
    with:
      ci_run_id: ${{ github.run_id }}
      head_sha: ${{ (github.event_name == 'pull_request' || github.event_name == 'pull_request_target') && github.event.pull_request.head.sha || github.sha }}
      head_branch: ${{ (github.event_name == 'pull_request' || github.event_name == 'pull_request_target') && github.event.pull_request.head.ref || github.ref_name }}
      head_event: ${{ github.event_name }}
      pr_number: ${{ (github.event_name == 'pull_request' || github.event_name == 'pull_request_target') && format('{0}', github.event.pull_request.number) || '' }}
    secrets: inherit

  bmt-gate-summary:
    needs: bmt-handoff
    if: success() && (github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository)
    runs-on: ubuntu-latest
    steps:
      - name: Log BMT result
        run: |
          echo "::notice::BMT gate passed: ${{ needs.bmt-handoff.outputs.bmt_gate_passed }}"
          echo "::notice::BMT failure fallback ran: ${{ needs.bmt-handoff.outputs.bmt_fallback_run }}"

  build-nonrelease:
    needs: [checkout-once, extract-presets]
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      max-parallel: 6
      matrix:
        include: ${{ fromJson(needs.extract-presets.outputs.presets_nonrelease) }}

    env:
      GRADLE_USER_HOME: ${{ github.workspace }}/.gradle

    steps:
      - name: Checkout repo (for local actions)
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
        with:
          ref: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.sha }}
          fetch-depth: 1
          sparse-checkout: .github

      - uses: ./.github/actions/checkout-and-restore
        with:
          ref: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.sha }}

      - uses: ./.github/actions/setup-build-env
        with:
          configure: ${{ matrix.configure }}
          build: ${{ matrix.build }}

      # ---- configure ----
      - name: Configure ( ${{ matrix.configure }} )
        timeout-minutes: 20
        continue-on-error: ${{ matrix.soft_fail }}
        run: |
          set -euo pipefail
          if [[ "${{ matrix.configure }}" == *webos* || "${{ matrix.build }}" == *webos* ]]; then
            cmake --preset "${{ matrix.configure }}" \
              -DCMAKE_TRY_COMPILE_TARGET_TYPE=STATIC_LIBRARY \
              -DCMAKE_INTERPROCEDURAL_OPTIMIZATION=OFF
          else
            cmake --preset "${{ matrix.configure }}"
          fi

      # ---- build ----
      - name: Build ( ${{ matrix.short }} )
        timeout-minutes: 60
        continue-on-error: ${{ matrix.soft_fail }}
        run: |
          set -euo pipefail
          cmake --build --preset "${{ matrix.build }}" 2>&1 | tee build.log
          gzip -9 build.log

      # ---- build output (soft-fail for embedded) ----
      - name: Check build output
        run: |
          set -euo pipefail
          if [ -f build.log.gz ]; then
            warnings=$(zgrep -c "warning:" build.log.gz || true)
            errors=$(zgrep -c "error:"   build.log.gz || true)
          elif [ -f build.log ]; then
            # build.log exists but not .gz: cmake failed before gzip ran (continue-on-error path)
            warnings=$(grep -c "warning:" build.log || true)
            errors=$(grep -c "error:"   build.log || true)
          else
            echo "No build log found"; exit 0
          fi
          echo "Warnings: $warnings"
          echo "Errors  : $errors"
          if [ "$warnings" -gt 0 ] || [ "$errors" -gt 0 ]; then
            if [ "${{ matrix.soft_fail }}" = "true" ]; then
              echo "::warning::Embedded build had $warnings warnings and $errors errors — NOT failing CI."
            else
              echo "::error::Build failed – $warnings warnings, $errors errors."
              exit 1
            fi
          else
            echo "::notice::Build clean."
          fi

      # ---- disk + cleanup (always) ----
      - name: Disk space (after)
        if: always()
        run: |
          df -h
          echo "Workspace size:"
          du -sh . || true
          echo "Top 30 largest paths in workspace:"
          du -ah . 2>/dev/null | sort -h | tail -n 30 || true

      - name: Cleanup heavy dirs
        if: always()
        continue-on-error: true
        run: |
          set -euo pipefail
          rm -rf "${GRADLE_USER_HOME}" || true
          find . -path './.git' -prune -o -type d \( -name build -o -name .cxx -o -name CMakeFiles \) -prune -exec rm -rf {} + || true
          find . -path './.git' -prune -o -type f -name CMakeCache.txt -delete || true
          df -h
