# Prek (pre-commit compatible): https://prek.j178.dev/
# Install: prek install (or prek install -f to replace pre-commit hook)
# Run manually: prek run --all-files
# Requires: uv sync --group dev (ruff in dev dependency-group)
repos:
  - repo: local
    hooks:
      - id: ruff-format
        name: ruff format
        entry: uv run ruff format
        language: system
        types: [python]
      - id: verify-gcp-bucket-sync
        name: backend/ bucket sync check
        entry: tools/scripts/hooks/pre-commit-sync-gcp.sh
        language: script
        files: ^(backend/|benchmarks/)
        pass_filenames: false
      - id: image-build-warning
        name: image-build path warning
        entry: tools/scripts/hooks/pre-commit-image-build-warning.sh
        language: script
        files: ^(infra/packer/|backend/)
        pass_filenames: false
      - id: pytest-fast
        name: pytest fast gate
        entry: bash -lc 'uv run pytest -q -m "unit or contract"'
        language: system
        pass_filenames: false
        always_run: true
        stages: [pre-commit]
      - id: pytest
        name: pytest fast gate (alias)
        entry: bash -lc 'uv run pytest -q -m "unit or contract"'
        language: system
        pass_filenames: false
        always_run: true
        stages: [pre-commit]
