# Prek (pre-commit compatible): https://prek.j178.dev/
# Install: prek install (or prek install -f to replace pre-commit hook)
# Run manually: prek run --all-files
# Requires: uv sync (dev group includes ruff, pytest; use --no-dev to exclude)
repos:
  - repo: local
    hooks:
      - id: ruff-check
        name: ruff check
        entry: uv run ruff check --fix
        language: system
        types: [python]
      - id: ruff-format
        name: ruff format
        entry: uv run ruff format
        language: system
        types: [python]
      - id: verify-gcp-bucket-sync
        name: gcp/ bucket sync check
        entry: tools/scripts/hooks/pre-commit-sync-gcp.sh
        language: script
        files: ^gcp/
        pass_filenames: false
      - id: image-build-warning
        name: image-build path warning
        entry: tools/scripts/hooks/pre-commit-image-build-warning.sh
        language: script
        files: ^(infra/packer/|gcp/image/)
        pass_filenames: false
      - id: pytest-fast
        name: pytest fast gate
        entry: bash -lc 'uv run pytest -q -m "unit or contract"'
        language: system
        pass_filenames: false
        always_run: true
        stages: [pre-commit]
