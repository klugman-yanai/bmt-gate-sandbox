# Pre-commit: https://pre-commit.com
# Install: pre-commit install (or use prek if available)
# Run manually: pre-commit run --all-files
repos:
  - repo: local
    hooks:
      - id: verify-gcp-bucket-sync
        name: gcp/ bucket sync check
        entry: tools/scripts/hooks/pre-commit-sync-gcp.sh
        language: script
        files: ^gcp/
        pass_filenames: false
      - id: image-build-warning
        name: image-build path warning
        entry: tools/scripts/hooks/pre-commit-image-build-warning.sh
        language: script
        files: ^(infra/packer/|gcp/code/vm/)
        pass_filenames: false
      - id: pytest-fast
        name: pytest fast gate
        entry: bash -lc 'uv run pytest -q -m "unit or contract"'
        language: system
        pass_filenames: false
        always_run: true
        stages: [pre-commit]
      - id: pytest
        name: pytest fast gate (alias)
        entry: bash -lc 'uv run pytest -q -m "unit or contract"'
        language: system
        pass_filenames: false
        always_run: true
        stages: [pre-commit]
