# Pre-commit: https://pre-commit.com
# Install: pre-commit install (or use prek if available)
# Run manually: pre-commit run --all-files
repos:
  - repo: local
    hooks:
      - id: verify-remote-bucket-sync
        name: deploy/ bucket sync check
        entry: scripts/hooks/pre-commit-sync-remote.sh
        language: script
        files: ^deploy/
        pass_filenames: false
      - id: block-direct-push-ci-check-bmt-gate
        name: block direct push to ci/check-bmt-gate
        entry: scripts/hooks/pre-push-block-ci-check-bmt-gate.sh
        language: script
        pass_filenames: false
        always_run: true
        stages: [pre-push]
