# Pre-commit: https://pre-commit.com
# Install: pre-commit install (or use prek if available)
# Run manually: pre-commit run --all-files
repos:
  - repo: local
    hooks:
      - id: verify-gcp-bucket-sync
        name: gcp/ bucket sync check
        entry: scripts/hooks/pre-commit-sync-gcp.sh
        language: script
        files: ^gcp/
        pass_filenames: false
