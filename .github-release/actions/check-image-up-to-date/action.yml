# Check that a successful BMT VM image build exists for the given ref when image-affecting paths changed.
# Paths and workflow name must match bmt-vm-image-build.yml (paths: and workflow filename).
name: Check image up to date
description: Verifies BMT Image Build ran for this ref when infra/packer or backend changed.

inputs:
  head_sha:
    description: Head commit SHA to check.
    required: true
  head_branch:
    description: Branch name (for gh run list --branch).
    required: true
  default_branch:
    description: Repository default branch for diff base.
    required: false
    default: main

outputs:
  passed:
    description: "true if no image-affecting changes, or a successful image build run exists for head_sha; false otherwise."
    value: ${{ steps.check.outputs.passed }}

runs:
  using: composite
  steps:
    - id: check
      shell: bash
      env:
        HEAD_SHA: ${{ inputs.head_sha }}
        HEAD_BRANCH: ${{ inputs.head_branch }}
        DEFAULT_BRANCH: ${{ inputs.default_branch }}
      run: |
        set -euo pipefail
        # Must match bmt-vm-image-build.yml paths (any change under backend or infra/packer).
        AFFECTED_PATHS=("infra/packer" "backend")
        WORKFLOW_FILE="bmt-vm-image-build.yml"

        git fetch origin "${DEFAULT_BRANCH}" --depth=1 2>/dev/null || true
        changed="$(git diff --name-only "origin/${DEFAULT_BRANCH}...${HEAD_SHA}" -- "${AFFECTED_PATHS[@]}" 2>/dev/null || true)"
        if [[ -z "${changed//[[:space:]]/}" ]]; then
          echo "No image-affecting paths changed; skip image build check."
          echo "passed=true" >> "$GITHUB_OUTPUT"
          exit 0
        fi

        echo "Image-affecting paths changed; verifying BMT Image Build ran for this ref."
        runs_json="$(gh run list \
          --workflow "${WORKFLOW_FILE}" \
          --branch "${HEAD_BRANCH}" \
          --limit 30 \
          --json conclusion,headSha,status \
          --jq '[.[] | select(.status=="completed" and .conclusion=="success") | .headSha]' 2>/dev/null || echo '[]')"
        if echo "$runs_json" | jq -e --arg sha "${HEAD_SHA}" 'index($sha) != null' >/dev/null 2>&1; then
          echo "BMT Image Build succeeded for commit ${HEAD_SHA}."
          echo "passed=true" >> "$GITHUB_OUTPUT"
          exit 0
        fi

        echo "::error::Image-affecting paths changed (infra/packer or backend), but no successful BMT Image Build run found for this ref (branch=${HEAD_BRANCH}, sha=${HEAD_SHA}). Run the BMT Image Build workflow for this branch/commit and re-run BMT."
        echo "passed=false" >> "$GITHUB_OUTPUT"
        exit 1
