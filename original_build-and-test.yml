name: CI

on:
  workflow_dispatch:
  push:
    branches: [ dev ]
  pull_request:
    branches: [ dev ]

defaults:
  run:
    shell: bash

jobs:
  # ─────────────────────── 1) extract preset list ───────────────────────
  extract-presets:
    runs-on: ubuntu-latest
    outputs:
      presets: ${{ steps.parse.outputs.presets }}
    steps:
      - name: Checkout source for preset parsing
        uses: actions/checkout@v4
        with:
          repository: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name || github.repository }}
          ref:        ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha        || github.sha }}
          fetch-depth: 1

      - name: Parse CMakePresets.json
        id: parse
        run: |
          presets=$(jq -c '
            [ .buildPresets[]
              | { build: .name
                , configure: .configurePreset
                , short: (.name | sub("-build$"; "")) }
            ]' CMakePresets.json)
          echo "presets=$presets" >>"$GITHUB_OUTPUT"

  # ─────────────────────── 2) build every preset ────────────────────────
  build:
    needs: extract-presets
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      
      matrix:
        include: ${{ fromJson(needs.extract-presets.outputs.presets) }}

    # Keep Gradle cache inside workspace so we can reliably clean it
    env:
      GRADLE_USER_HOME: ${{ github.workspace }}/.gradle

    steps:
      # Checkout with FG-PAT; do NOT persist GITHUB_TOKEN creds
      - name: Checkout source to build
        uses: actions/checkout@v4
        with:
          repository: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name || github.repository }}
          ref:        ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha        || github.sha }}
          fetch-depth: 1
          submodules: false
          lfs: false
          persist-credentials: false

      # ---- disk diagnostics + cleanup --------------------------------
      - name: Disk space (before)
        run: |
          df -h
          echo "Largest dirs (top 30) under /usr/share /opt /usr/local (best effort)"
          sudo du -xh /usr/share /opt /usr/local 2>/dev/null | sort -h | tail -n 30 || true

      - name: Free disk space on runner
        run: |
          set -euo pipefail
          # Common large preinstalls on ubuntu-latest
          sudo rm -rf /usr/share/dotnet || true
          sudo rm -rf /opt/ghc || true
          sudo rm -rf /usr/local/lib/android || true
          sudo rm -rf /usr/local/share/boost || true

          # Clean apt caches (if any)
          sudo apt-get clean || true
          sudo rm -rf /var/lib/apt/lists/* || true

          df -h

      # Make webOS toolchains relocatable and install minimal deps
      - name: Fix Hardcoded Paths and Install Deps for webOS Toolchains
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y patchelf libfl2
          if compgen -G "third-party/starfish-bdk*" > /dev/null; then
            find third-party/starfish-bdk* -type f -executable | while read -r exe; do
              if file "$exe" | grep -q "ELF.*executable"; then
                patchelf --set-interpreter /lib64/ld-linux-x86-64.so.2 "$exe" || true
                patchelf --set-rpath '$ORIGIN/../lib' "$exe" || true
              fi
            done
          fi

      # ---- install the requested CMake version -----------------------
      - name: Install CMake 3.29.3
        run: |
          set -euo pipefail
          wget -q https://github.com/Kitware/CMake/releases/download/v3.29.3/cmake-3.29.3-linux-x86_64.tar.gz
          tar -xf cmake-3.29.3-linux-x86_64.tar.gz
          sudo mv cmake-3.29.3-linux-x86_64 /opt/cmake-3.29
          rm -f cmake-3.29.3-linux-x86_64.tar.gz
          echo "/opt/cmake-3.29/bin" >>"$GITHUB_PATH"

      # ---- install MinGW for Windows cross builds (if needed) --------
      - name: Install MinGW (64-bit)
        if: contains(matrix.configure, 'mingw') || contains(matrix.build, 'mingw')
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y g++-mingw-w64-x86-64 gcc-mingw-w64-x86-64

      # ---- configure -------------------------------------------------
      - name: Configure ( ${{ matrix.configure }} )
        continue-on-error: ${{ contains(matrix.configure, 'xtensa') || contains(matrix.build, 'xtensa') || contains(matrix.configure, 'hexagon') || contains(matrix.build, 'hexagon') }}
        run: |
          set -euo pipefail
          if [[ "${{ matrix.configure }}" == *webos* || "${{ matrix.build }}" == *webos* ]]; then
            cmake --preset "${{ matrix.configure }}" \
              -DCMAKE_TRY_COMPILE_TARGET_TYPE=STATIC_LIBRARY \
              -DCMAKE_INTERPROCEDURAL_OPTIMIZATION=OFF
          else
            cmake --preset "${{ matrix.configure }}"
          fi

      # ---- build -----------------------------------------------------
      # Capture log for greps, but compress immediately to avoid "No space left on device"
      - name: Build ( ${{ matrix.short }} )
        continue-on-error: ${{ contains(matrix.configure, 'xtensa') || contains(matrix.build, 'xtensa') || contains(matrix.configure, 'hexagon') || contains(matrix.build, 'hexagon') }}
        env:
          MATRIX_CONFIGURE: ${{ matrix.configure }}
        run: |
          set -euo pipefail
          cmake --build --preset "${{ matrix.build }}" 2>&1 | tee build.log
          gzip -9 build.log
          bash .github/bmt/scripts/ci_workflow.sh stage-release-runner

      # ---- soft check for Xtensa/Hexagon (never fail) ----------------
      - name: Soft check (Xtensa/Hexagon)
        if: ${{ contains(matrix.configure, 'xtensa') || contains(matrix.build, 'xtensa') || contains(matrix.configure, 'hexagon') || contains(matrix.build, 'hexagon') }}
        run: |
          set -euo pipefail
          warnings=$(zgrep -c "warning:" build.log.gz || true)
          errors=$(zgrep -c "error:"   build.log.gz || true)
          echo "Warnings: $warnings"
          echo "Errors  : $errors"
          if [ "$warnings" -gt 0 ] || [ "$errors" -gt 0 ]; then
            echo "::warning::Xtensa/Hexagon build had $warnings warnings and $errors errors — NOT failing CI by request."
          else
            echo "::notice::Xtensa/Hexagon build clean."
          fi

      # ---- strict check for everything else (fail on any) ------------
      - name: Strict check (non-embedded)
        if: ${{ ! (contains(matrix.configure, 'xtensa') || contains(matrix.build, 'xtensa') || contains(matrix.configure, 'hexagon') || contains(matrix.build, 'hexagon')) }}
        run: |
          set -euo pipefail
          warnings=$(zgrep -c "warning:" build.log.gz || true)
          errors=$(zgrep -c "error:"   build.log.gz || true)
          echo "Warnings: $warnings"
          echo "Errors  : $errors"
          if [ "$warnings" -gt 0 ] || [ "$errors" -gt 0 ]; then
            echo "::error::Build failed – warnings or errors detected."
            exit 1
          fi

      - name: Compute preset info
        id: preset-info
        if: contains(matrix.configure, '_gcc_Release') && !contains(matrix.configure, 'xtensa') && !contains(matrix.configure, 'hexagon')
        env:
          MATRIX_CONFIGURE: ${{ matrix.configure }}
        run: bash .github/bmt/scripts/ci_workflow.sh compute-preset-info

      - name: Upload runner artifact
        if: steps.preset-info.outcome == 'success'
        uses: actions/upload-artifact@v4
        with:
          name: runner-${{ steps.preset-info.outputs.preset }}
          path: |
            ${{ steps.preset-info.outputs.runners_dir }}/kardome_runner
            ${{ steps.preset-info.outputs.lib_dir }}/libKardome.so
          retention-days: 1
          if-no-files-found: warn

      # ---- final disk report + cleanup (always) ----------------------
      - name: Disk space (after)
        if: always()
        run: |
          df -h
          echo "Workspace size:"
          du -sh . || true
          echo "Top 30 largest paths in workspace:"
          du -ah . 2>/dev/null | sort -h | tail -n 30 || true

      - name: Cleanup heavy dirs
        if: always()
        run: |
          set -euo pipefail
          # Clean caches and common heavy build outputs
          rm -rf "${GRADLE_USER_HOME}" || true
          rm -rf ./**/build || true
          rm -rf ./**/.cxx || true
          rm -rf ./**/CMakeFiles || true
          rm -rf ./**/CMakeCache.txt || true
          df -h

  # ─────────────────────── 3) Trigger BMT via workflow_dispatch ───────────────────────
  trigger-bmt:
    name: Trigger BMT Handoff
    needs: build
    if: success()
    runs-on: ubuntu-latest
    permissions:
      actions: write
      contents: read
      statuses: write
      issues: write
    env:
      REPOSITORY: ${{ github.repository }}
      EVENT_NAME: ${{ github.event_name }}
      PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
      PR_HEAD_REF: ${{ github.event.pull_request.head.ref }}
      PR_NUMBER: ${{ github.event.pull_request.number }}
      DEFAULT_HEAD_SHA: ${{ github.sha }}
      DEFAULT_HEAD_BRANCH: ${{ github.ref_name }}
      CI_RUN_ID: ${{ github.run_id }}
      BMT_STATUS_CONTEXT: ${{ vars.BMT_STATUS_CONTEXT }}
      GITHUB_TOKEN: ${{ github.token }}
      GITHUB_SERVER_URL: ${{ github.server_url }}
      BMT_DISPATCH_APP_ID: ${{ vars.BMT_DISPATCH_APP_ID }}
      BMT_DISPATCH_APP_PRIVATE_KEY: ${{ secrets.BMT_DISPATCH_APP_PRIVATE_KEY }}
    steps:
      - name: Checkout source for BMT handoff helpers
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Generate GitHub App token for handoff dispatch
        id: app-token
        continue-on-error: true
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ env.BMT_DISPATCH_APP_ID }}
          private-key: ${{ env.BMT_DISPATCH_APP_PRIVATE_KEY }}
          permission-actions: write

      - name: Resolve dispatch token
        id: dispatch-token
        env:
          APP_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          token="${APP_TOKEN:-${GITHUB_TOKEN}}"
          if [[ -z "$token" ]]; then
            echo "::error::No dispatch token available."
            exit 1
          fi
          if [[ -n "${APP_TOKEN:-}" ]]; then
            echo "::notice::Using GitHub App token for handoff dispatch."
          else
            echo "::warning::GitHub App secrets not configured; using GITHUB_TOKEN fallback for dispatch."
          fi
          echo "token=$token" >>"$GITHUB_OUTPUT"

      - name: Resolve head context and dispatch BMT handoff
        id: dispatch
        env:
          APP_TOKEN: ${{ steps.dispatch-token.outputs.token }}
        run: bash .github/bmt/scripts/ci_workflow.sh handoff-dispatch-bmt

      - name: Post BMT failure status/comment (handoff dispatch failed)
        if: failure()
        env:
          HEAD_SHA: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.sha }}
        run: bash .github/bmt/scripts/ci_workflow.sh post-trigger-failure-status

      - name: Write handoff dispatch summary
        if: always()
        env:
          DISPATCH_OUTCOME: ${{ steps.dispatch.outcome || 'unknown' }}
          HEAD_SHA: ${{ steps.dispatch.outputs.head_sha || (github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.sha) }}
          HEAD_BRANCH: ${{ steps.dispatch.outputs.head_branch || (github.event_name == 'pull_request' && github.event.pull_request.head.ref || github.ref_name) }}
          HEAD_EVENT: ${{ steps.dispatch.outputs.head_event || (github.event_name == 'pull_request' && 'pull_request' || 'push') }}
        run: bash .github/bmt/scripts/ci_workflow.sh write-handoff-dispatch-summary
