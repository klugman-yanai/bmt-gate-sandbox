# Variables used in workflows (repo/org variables). Keeps actionlint from flagging custom vars.
config-variables:
  - GCS_BUCKET
  - GCP_WIF_PROVIDER
  - GCP_SA_EMAIL
  - GCP_PROJECT
  - GCP_ZONE
  - CLOUD_RUN_REGION
  - BMT_CONTROL_JOB
  - BMT_TASK_STANDARD_JOB
  - BMT_TASK_HEAVY_JOB
  - BMT_STATUS_CONTEXT
  - BMT_RUNNERS_PRESEEDED_IN_GCS
  - BMT_EXPECTED_IMAGE_FAMILY
  - BMT_EXPECTED_BASE_IMAGE_FAMILY
  - BMT_EXPECTED_BASE_IMAGE_PROJECT
  - BMT_CLI
  # BMT_PEX_TAG is consumer-facing only (used to pin the reusable workflow
  # @ref, e.g. `uses: .../bmt-handoff.yml@${{ vars.BMT_PEX_TAG }}`). It is not
  # referenced by any workflow in this repo — setup-bmt-pex self-discovers the
  # release tag from its own action_ref. The release template's actionlint
  # config still lists it for consumers.
  - BMT_PEX_REPO

