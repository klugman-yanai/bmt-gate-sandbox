# Variables used in workflows (repo/org variables). Keeps actionlint from flagging custom vars.
config-variables:
  - GCS_BUCKET
  - GCP_WIF_PROVIDER
  - GCP_SA_EMAIL
  - GCP_PROJECT
  - GCP_ZONE
  - CLOUD_RUN_REGION
  - BMT_CONTROL_JOB
  - BMT_TASK_STANDARD_JOB
  - BMT_TASK_HEAVY_JOB
  - BMT_STATUS_CONTEXT
  - BMT_RUNNERS_PRESEEDED_IN_GCS
  - BMT_EXPECTED_IMAGE_FAMILY
  - BMT_EXPECTED_BASE_IMAGE_FAMILY
  - BMT_EXPECTED_BASE_IMAGE_PROJECT
  - BMT_CLI
  # CI-driven release (.github/workflows/release.yml): container image
  # repo in Artifact Registry. Defaults to 'bmt-images' via the workflow
  # expression fallback; listing here keeps lint quiet when unset in vars.
  - ARTIFACT_REGISTRY_REPO

