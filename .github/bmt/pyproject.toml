[build-system]
requires = ["uv_build>=0.10.7,<0.11.0"]
build-backend = "uv_build"

# Portable: copy this file and the `cli/` directory to any repo (e.g. prod); run `uv sync` in this directory.
[tool.uv.build-backend]
module-name = "cli"
module-root = ""

[project]
name = "bmt"
version = "0.1.0"
requires-python = ">=3.12"
description = "BMT CI driver: matrix discovery, trigger, VM lifecycle, and runner upload."
dependencies = [
    "google-cloud-storage",
    "google-cloud-pubsub",
    "PyGithub",
]

[project.optional-dependencies]
dev = [
    "ruff",
    "basedpyright",
]

[project.scripts]
bmt = "cli.driver:main"

[tool.ruff]
target-version = "py312"
line-length = 100
exclude = [".venv", "__pycache__", ".ruff_cache"]

[tool.ruff.lint]
select = ["E", "F", "I", "N", "W", "UP", "B", "C4", "SIM"]
ignore = ["E501"]

[tool.ruff.format]
quote-style = "double"

[tool.basedpyright]
typeCheckingMode = "basic"
pythonVersion = "3.12"
reportMissingTypeStubs = false
