# Thin trigger — push to ci/check-bmt-gate runs build CI only (no BMT handoff).
# PR trigger with full BMT pipeline lives in trigger-ci-pr.yml.
name: CI (push)

on:
  workflow_dispatch:
  push:
    branches:
      - ci/check-bmt-gate

permissions:
  contents: read
  actions: write

jobs:
  ci:
    name: Build
    uses: ./.github/workflows/build-and-test-dev.yml
    secrets: inherit
