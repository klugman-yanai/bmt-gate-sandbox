# Thin trigger so CI runs using workflow files from the *source* branch.
# - On pull_request: runs build-and-test from the PR head (your branch), not the target.
# - On push: runs build-and-test from the branch that was pushed.
# Merge this file to the default branch once; then all runs use the caller branch's workflows.
name: Trigger CI (from branch)

on:
  push:
    branches:
      - dev
      - ci/check-bmt-gate
      - test/check-bmt-gate-*
      - test/workflow-optimizations
      - test/*
  pull_request:
    branches:
      - dev
      - ci/check-bmt-gate
      - test/check-bmt-gate-*
      - test/workflow-optimizations

permissions:
  contents: read
  actions: read

jobs:
  ci:
    name: Run CI from source branch
    runs-on: ubuntu-latest
    # Use head ref (PR source branch) or ref_name (push branch) so the workflow file is from your branch.
    uses: ./.github/workflows/build-and-test.yml@${{ github.event_name == 'pull_request' && github.head_ref || github.ref_name }}
    secrets: inherit
