# Thin trigger — PRs to **dev** / **ci/check-bmt-gate** and pushes to **ci/check-bmt-gate**
# run CI using workflow definitions from the branch that owns the event
# (`pull_request` → PR **head**; `push` / `workflow_dispatch` → that ref).
# This file lives at the repo root so GitHub always resolves the same path (unlike only under internal/).
# Calls `build-and-test-dev.yml` (not `build-and-test.yml`; that is the core-main reusable CI shape).
name: Trigger CI (from branch)

on:
  workflow_dispatch:
  pull_request:
    branches:
      - dev
      - ci/check-bmt-gate
  push:
    branches:
      - ci/check-bmt-gate

permissions:
  contents: read
  actions: read

jobs:
  ci:
    name: Run CI from source branch
    uses: ./.github/workflows/build-and-test-dev.yml
    secrets: inherit
