name: CI

# Structure aligned with test/check-bmt-gate-workflow-optimizations and ci/check-bmt-gate:
# Only release runners are sent to BMT; non-release builds run in parallel (do not block BMT).
# checkout-once → extract-presets → build-release (gates BMT) + build-nonrelease (parallel) → decide-bmt → bmt.
on:
  push:
    branches:
      - dev
      - ci/check-bmt-gate
      - test/check-bmt-gate-*
      - test/workflow-optimizations
      - test/*
  pull_request:
    branches:
      - dev
      - ci/check-bmt-gate
      - test/check-bmt-gate-*
      - test/workflow-optimizations
  workflow_dispatch:
  workflow_call: {}

defaults:
  run:
    shell: bash

# Artifact upload (checkout-once) needs actions write.
permissions:
  contents: read
  actions: read

concurrency:
  group: ci-${{ github.repository }}-${{ github.event.pull_request.head.ref || github.ref_name }}
  cancel-in-progress: true

jobs:
  checkout-once:
    name: Checkout repository
    runs-on: ubuntu-22.04
    permissions:
      contents: read
      actions: write
    outputs:
      artifact_size: ${{ steps.report.outputs.artifact_size }}
    steps:
      - name: Checkout source
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          repository: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name || github.repository }}
          ref: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.sha }}
          fetch-depth: 1
          submodules: false
          lfs: false

      - name: Create repo snapshot
        run: |
          tar --exclude='.git' \
              --exclude='.ruff_cache' \
              --exclude='.venv' --exclude='venv' --exclude='.uv' \
              --exclude='__pycache__' --exclude='.mypy_cache' --exclude='.pytest_cache' --exclude='.tox' --exclude='*.egg-info' \
              --exclude='.cursor' --exclude='.vscode' \
              --exclude='node_modules' \
              -czf /tmp/repo-snapshot.tar.gz .
          mv /tmp/repo-snapshot.tar.gz repo-snapshot.tar.gz

      - name: Report repo-snapshot size
        id: report
        run: |
          size=$(du -h repo-snapshot.tar.gz | cut -f1)
          echo "::notice::repo-snapshot artifact size: $size"
          echo "artifact_size=$size" >>"$GITHUB_OUTPUT"

      - name: Upload repo-snapshot
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: repo-snapshot
          path: repo-snapshot.tar.gz
          retention-days: 5

  extract-presets:
    name: Parse CMake presets
    runs-on: ubuntu-22.04
    outputs:
      presets_release: ${{ steps.parse.outputs.presets_release }}
      presets_nonrelease: ${{ steps.parse.outputs.presets_nonrelease }}
    steps:
      - name: Fetch CMakePresets.json
        env:
          REPO: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name || github.repository }}
          REF: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.sha }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          url="https://api.github.com/repos/${REPO}/contents/CMakePresets.json?ref=${REF}"
          for delay in 0 5 10 20; do
            [[ "$delay" -gt 0 ]] && sleep "$delay"
            curl -fsSL --connect-timeout 15 --max-time 60 \
              -H "Authorization: Bearer ${GH_TOKEN}" \
              -H "Accept: application/vnd.github.raw" \
              "${url}" -o CMakePresets.json && break
          done
          [[ -s CMakePresets.json ]] || { echo "::error::Failed to fetch CMakePresets.json"; exit 1; }

      - name: Parse CMakePresets.json
        id: parse
        run: |
          # Null-safe: (.buildPresets // []) and (.configurePreset // "") so refs with missing
          # or partial presets (e.g. no configurePreset on an entry) do not make jq exit 5.
          presets_release=$(jq -c '
            [ (.buildPresets // [])[]
              | { build: .name
                , configure: (.configurePreset // "")
                , short: (.name | sub("-build$"; "")) }
              | select(
                  .configure != "" and
                  (.configure | test("_gcc_Release")) and
                  (.configure | test("xtensa"; "i") | not) and
                  (.configure | test("hexagon"; "i") | not)
                )
            ]' CMakePresets.json)
          presets_nonrelease=$(jq -c '
            [ (.buildPresets // [])[]
              | { build: .name
                , configure: (.configurePreset // "")
                , short: (.name | sub("-build$"; "")) }
              | select(.configure != "" and (
                  (.configure | test("_gcc_Release") | not) or
                  (.configure | test("xtensa"; "i")) or
                  (.configure | test("hexagon"; "i"))
                ))
              | . + {soft_fail: ((.configure | test("xtensa"; "i")) or (.configure | test("hexagon"; "i")))}
            ]' CMakePresets.json)
          {
            echo "presets_release=$presets_release"
            echo "presets_nonrelease=$presets_nonrelease"
          } >>"$GITHUB_OUTPUT"

  # Release builds: gate for BMT. Only release runner matrix is sent to BMT (handoff uses parse-release-runners).
  # bmt-gcloud: no real build; placeholder so job graph matches core-main.
  build-release:
    name: Build release
    needs: [checkout-once, extract-presets]
    runs-on: ubuntu-22.04
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJson(needs.extract-presets.outputs.presets_release) }}
    steps:
      - name: Release build placeholder (bmt-gcloud)
        run: |
          echo "bmt-gcloud: no real build; release preset ${{ matrix.configure }} would be built here. BMT runs after this job."

  # Non-release builds: run in parallel; do not block BMT.
  # bmt-gcloud: no real build; placeholder so job graph matches core-main.
  build-nonrelease:
    name: Build non-release
    needs: [checkout-once, extract-presets]
    runs-on: ubuntu-22.04
    strategy:
      fail-fast: false
      max-parallel: 6
      matrix:
        include: ${{ fromJson(needs.extract-presets.outputs.presets_nonrelease) }}
    steps:
      - name: Non-release build placeholder (bmt-gcloud)
        run: |
          echo "bmt-gcloud: no real build; non-release preset ${{ matrix.configure }} runs in parallel (does not gate BMT)."

  # Node/DAG aligned with docs/archive/build-and-test-v0.0.1.yml: 6 jobs, build-release → bmt-handoff → bmt-gate-summary.
  bmt-handoff:
    name: Run BMT gate
    needs: build-release
    if: >-
      success()
      && (github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository)
      && (
        contains(
          fromJson('["dev","ci/check-bmt-gate"]'),
          (github.event_name == 'pull_request' || github.event_name == 'pull_request_target')
            && github.event.pull_request.head.ref
            || github.ref_name
        )
        || startsWith(
          (github.event_name == 'pull_request' || github.event_name == 'pull_request_target')
            && github.event.pull_request.head.ref
            || github.ref_name,
          'test/check-bmt-gate'
        )
      )
    permissions:
      contents: read
      actions: read
      id-token: write
      statuses: write
    uses: ./.github/workflows/bmt-handoff.yml
    with:
      ci_run_id: ${{ github.run_id }}
      head_sha: ${{ (github.event_name == 'pull_request' || github.event_name == 'pull_request_target') && github.event.pull_request.head.sha || github.sha }}
      head_branch: ${{ (github.event_name == 'pull_request' || github.event_name == 'pull_request_target') && github.event.pull_request.head.ref || github.ref_name }}
      head_event: ${{ github.event_name }}
      pr_number: ${{ (github.event_name == 'pull_request' || github.event_name == 'pull_request_target') && format('{0}', github.event.pull_request.number) || '' }}
      skip_image_check: true
    secrets: inherit

  bmt-gate-summary:
    name: BMT gate summary
    needs: bmt-handoff
    if: success() && (github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository)
    runs-on: ubuntu-22.04
    steps:
      - name: Log BMT result
        run: |
          echo "::notice::BMT gate passed: ${{ needs.bmt-handoff.outputs.bmt_gate_passed }}"
          echo "::notice::BMT failure fallback ran: ${{ needs.bmt-handoff.outputs.bmt_fallback_run }}"
