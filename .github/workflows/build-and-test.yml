# Merged CI: real builds (from .github-packaged) + BMT handoff (gated by release build).
# Copy to core-main/.github/workflows/build-and-test.yml
# push/pull_request_target are in trigger-ci.yml so CI runs from the PR/source branch (see trigger-ci.yml).

name: CI

on:
  workflow_dispatch:
  workflow_call: {}

defaults:
  run:
    shell: bash

permissions:
  contents: read
  actions: read

concurrency:
  group: ci-${{ github.repository }}-${{ github.event.pull_request.head.ref || github.ref_name }}
  cancel-in-progress: true

jobs:
  # ─────────────────────── 1) Parse presets, split release / non-release ──
  repo_snapshot:
    name: Snapshot
    runs-on: ubuntu-22.04
    outputs:
      release_presets: ${{ steps.parse.outputs.release_presets }}
      non_release_presets: ${{ steps.parse.outputs.non_release_presets }}
    steps:
      - name: Checkout source for preset parsing
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          repository: ${{ github.event_name == 'pull_request_target' && github.event.pull_request.head.repo.full_name || github.repository }}
          ref:        ${{ github.event_name == 'pull_request_target' && github.event.pull_request.head.sha        || github.sha }}
          fetch-depth: 1

      - name: Parse CMakePresets.json
        id: parse
        run: |
          presets=$(jq -c '
            [ .buildPresets[]
              | { build: .name
                , configure: .configurePreset
                , short: (.name | sub("-build$"; ""))
                , is_release: (
                    (.configure | test("_gcc_Release")) and
                    ((.configure | test("xtensa"; "i")) | not) and
                    ((.configure | test("hexagon"; "i")) | not)
                  )
                , soft_fail: (
                    (.configure | test("xtensa"; "i")) or
                    (.configure | test("hexagon"; "i"))
                  }
            ]' CMakePresets.json)
          echo "release_presets=$(echo "$presets" | jq -c '[.[] | select(.is_release)]')" >>"$GITHUB_OUTPUT"
          echo "non_release_presets=$(echo "$presets" | jq -c '[.[] | select(.is_release | not)]')" >>"$GITHUB_OUTPUT"

  # ─────────────────────── 2a) Build release presets (gates BMT) ────────────
  build_release:
    name: Release
    needs: repo_snapshot
    runs-on: ubuntu-22.04
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJson(needs.repo_snapshot.outputs.release_presets) }}
    env:
      GRADLE_USER_HOME: ${{ github.workspace }}/.gradle
    steps:
      - name: Checkout source to build
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          repository: ${{ github.event_name == 'pull_request_target' && github.event.pull_request.head.repo.full_name || github.repository }}
          ref:        ${{ github.event_name == 'pull_request_target' && github.event.pull_request.head.sha        || github.sha }}
          fetch-depth: 1
          submodules: false
          lfs: false
          persist-credentials: false

      - name: Disk space (before)
        run: |
          df -h
          echo "Largest dirs (top 30) under /usr/share /opt /usr/local (best effort)"
          sudo du -xh /usr/share /opt /usr/local 2>/dev/null | sort -h | tail -n 30 || true

      - name: Free disk space on runner
        run: |
          set -euo pipefail
          sudo rm -rf /usr/share/dotnet /opt/ghc /usr/local/lib/android /usr/local/share/boost 2>/dev/null || true
          sudo apt-get clean 2>/dev/null || true
          sudo rm -rf /var/lib/apt/lists/* 2>/dev/null || true
          df -h

      - name: Fix Hardcoded Paths and Install Deps for webOS Toolchains
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y patchelf libfl2
          if compgen -G "third-party/starfish-bdk*" > /dev/null; then
            find third-party/starfish-bdk* -type f -executable | while read -r exe; do
              if file "$exe" | grep -q "ELF.*executable"; then
                patchelf --set-interpreter /lib64/ld-linux-x86-64.so.2 "$exe" || true
                patchelf --set-rpath "\$ORIGIN/../lib" "$exe" || true
              fi
            done
          fi

      - name: Install CMake 3.29.3
        run: |
          set -euo pipefail
          wget -q https://github.com/Kitware/CMake/releases/download/v3.29.3/cmake-3.29.3-linux-x86_64.tar.gz
          tar -xf cmake-3.29.3-linux-x86_64.tar.gz
          sudo mv cmake-3.29.3-linux-x86_64 /opt/cmake-3.29
          rm -f cmake-3.29.3-linux-x86_64.tar.gz
          echo "/opt/cmake-3.29/bin" >>"$GITHUB_PATH"

      - name: Install MinGW (64-bit)
        if: contains(matrix.configure, 'mingw') || contains(matrix.build, 'mingw')
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y g++-mingw-w64-x86-64 gcc-mingw-w64-x86-64

      - name: Configure ( ${{ matrix.configure }} )
        run: |
          set -euo pipefail
          cfg="${{ matrix.configure }}"
          bld="${{ matrix.build }}"
          if [[ "$cfg" == *webos* || "$bld" == *webos* ]]; then
            cmake --preset "${{ matrix.configure }}" \
              -DCMAKE_TRY_COMPILE_TARGET_TYPE=STATIC_LIBRARY \
              -DCMAKE_INTERPROCEDURAL_OPTIMIZATION=OFF
          else
            cmake --preset "${{ matrix.configure }}"
          fi

      - name: Build ( ${{ matrix.short }} )
        run: |
          set -euo pipefail
          cmake --build --preset "${{ matrix.build }}" 2>&1 | tee build.log
          gzip -9 build.log

      - name: Strict check (release presets)
        run: |
          set -euo pipefail
          warnings=$(zgrep -c "warning:" build.log.gz || true)
          errors=$(zgrep -c "error:"   build.log.gz || true)
          echo "Warnings: $warnings"
          echo "Errors  : $errors"
          if [ "$warnings" -gt 0 ] || [ "$errors" -gt 0 ]; then
            echo "::error::Build failed – warnings or errors detected."
            exit 1
          fi

      - name: Disk space (after)
        if: always()
        run: df -h && du -sh . 2>/dev/null || true

      - name: Cleanup heavy dirs
        if: always()
        run: |
          rm -rf "${GRADLE_USER_HOME}" ./**/build ./**/.cxx ./**/CMakeFiles ./**/CMakeCache.txt 2>/dev/null || true
          df -h

  # ─────────────────────── 2b) Build non-release presets ───────────────────
  build_non_release:
    name: Non-Release
    needs: repo_snapshot
    runs-on: ubuntu-22.04
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJson(needs.repo_snapshot.outputs.non_release_presets) }}
    env:
      GRADLE_USER_HOME: ${{ github.workspace }}/.gradle
    steps:
      - name: Checkout source to build
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          repository: ${{ github.event_name == 'pull_request_target' && github.event.pull_request.head.repo.full_name || github.repository }}
          ref:        ${{ github.event_name == 'pull_request_target' && github.event.pull_request.head.sha        || github.sha }}
          fetch-depth: 1
          submodules: false
          lfs: false
          persist-credentials: false

      - name: Disk space (before)
        run: df -h

      - name: Free disk space on runner
        run: |
          set -euo pipefail
          sudo rm -rf /usr/share/dotnet /opt/ghc /usr/local/lib/android /usr/local/share/boost 2>/dev/null || true
          sudo apt-get clean 2>/dev/null || true
          df -h

      - name: Fix Hardcoded Paths and Install Deps for webOS Toolchains
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y patchelf libfl2
          if compgen -G "third-party/starfish-bdk*" > /dev/null; then
            find third-party/starfish-bdk* -type f -executable | while read -r exe; do
              if file "$exe" | grep -q "ELF.*executable"; then
                patchelf --set-interpreter /lib64/ld-linux-x86-64.so.2 "$exe" || true
                patchelf --set-rpath "\$ORIGIN/../lib" "$exe" || true
              fi
            done
          fi

      - name: Install CMake 3.29.3
        run: |
          set -euo pipefail
          wget -q https://github.com/Kitware/CMake/releases/download/v3.29.3/cmake-3.29.3-linux-x86_64.tar.gz
          tar -xf cmake-3.29.3-linux-x86_64.tar.gz
          sudo mv cmake-3.29.3-linux-x86_64 /opt/cmake-3.29
          rm -f cmake-3.29.3-linux-x86_64.tar.gz
          echo "/opt/cmake-3.29/bin" >>"$GITHUB_PATH"

      - name: Install MinGW (64-bit)
        if: contains(matrix.configure, 'mingw') || contains(matrix.build, 'mingw')
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y g++-mingw-w64-x86-64 gcc-mingw-w64-x86-64

      - name: Configure ( ${{ matrix.configure }} )
        continue-on-error: ${{ matrix.soft_fail }}
        run: |
          set -euo pipefail
          cfg="${{ matrix.configure }}"
          bld="${{ matrix.build }}"
          if [[ "$cfg" == *webos* || "$bld" == *webos* ]]; then
            cmake --preset "${{ matrix.configure }}" \
              -DCMAKE_TRY_COMPILE_TARGET_TYPE=STATIC_LIBRARY \
              -DCMAKE_INTERPROCEDURAL_OPTIMIZATION=OFF
          else
            cmake --preset "${{ matrix.configure }}"
          fi

      - name: Build ( ${{ matrix.short }} )
        continue-on-error: ${{ matrix.soft_fail }}
        run: |
          set -euo pipefail
          cmake --build --preset "${{ matrix.build }}" 2>&1 | tee build.log
          gzip -9 build.log

      - name: Soft check (Xtensa/Hexagon)
        if: matrix.soft_fail
        run: |
          set -euo pipefail
          warnings=$(zgrep -c "warning:" build.log.gz || true)
          errors=$(zgrep -c "error:"   build.log.gz || true)
          echo "Warnings: $warnings"
          echo "Errors  : $errors"
          if [ "$warnings" -gt 0 ] || [ "$errors" -gt 0 ]; then
            echo "::warning::Xtensa/Hexagon build had $warnings warnings and $errors errors — NOT failing CI by request."
          fi

      - name: Strict check (non-embedded)
        if: ${{ ! matrix.soft_fail }}
        run: |
          set -euo pipefail
          warnings=$(zgrep -c "warning:" build.log.gz || true)
          errors=$(zgrep -c "error:"   build.log.gz || true)
          echo "Warnings: $warnings"
          echo "Errors  : $errors"
          if [ "$warnings" -gt 0 ] || [ "$errors" -gt 0 ]; then
            echo "::error::Build failed – warnings or errors detected."
            exit 1
          fi

      - name: Cleanup
        if: always()
        run: rm -rf "${GRADLE_USER_HOME}" ./**/build ./**/.cxx 2>/dev/null || true; df -h

  # ─────────────────────── 3) Decide whether to run BMT ────────────────────
  evaluate_bmt_gate:
    name: Gate
    needs: [build_release]
    runs-on: ubuntu-22.04
    outputs:
      run_bmt: ${{ steps.out.outputs.run_bmt }}
    steps:
      - id: out
        run: |
          r="${{ needs.build_release.result }}"
          same_repo="${{ github.event.pull_request.head.repo.full_name == github.repository }}"
          base_ref="${{ github.base_ref || github.ref_name }}"
          if [[ "$r" != "success" && "$r" != "skipped" ]]; then echo "run_bmt=false" >> "$GITHUB_OUTPUT"; exit 0; fi
          if [[ "$same_repo" != "true" ]]; then echo "run_bmt=false" >> "$GITHUB_OUTPUT"; exit 0; fi
          if [[ "$base_ref" != "dev" ]]; then echo "run_bmt=false" >> "$GITHUB_OUTPUT"; exit 0; fi
          echo "run_bmt=true" >> "$GITHUB_OUTPUT"

  # ─────────────────────── 4) BMT handoff (when release build ok, same repo, base=dev) ─
  bmt_handoff:
    name: Handoff
    needs: [evaluate_bmt_gate]
    if: needs.evaluate_bmt_gate.outputs.run_bmt == 'true'
    permissions:
      contents: read
      actions: read
      id-token: write
      statuses: write
    uses: ./.github/workflows/bmt-handoff.yml
    with:
      ci_run_id: ${{ github.run_id }}
      head_sha: ${{ (github.event_name == 'pull_request' || github.event_name == 'pull_request_target') && github.event.pull_request.head.sha || github.sha }}
      head_branch: ${{ (github.event_name == 'pull_request' || github.event_name == 'pull_request_target') && github.event.pull_request.head.ref || github.ref_name }}
      head_event: ${{ github.event_name }}
      pr_number: ${{ (github.event_name == 'pull_request' || github.event_name == 'pull_request_target') && format('{0}', github.event.pull_request.number) || '' }}
