name: CI

on:
  workflow_dispatch:
    inputs:
      run_live_smoke:
        description: "Run live smoke pytest suite"
        required: false
        type: boolean
        default: false
  schedule:
    - cron: "17 3 * * *"
  push:
    # Only ci/check-bmt-gate (integration branch): PR branches trigger via pull_request, so one run per push.
    branches:
      - ci/check-bmt-gate
  pull_request:
    branches:
      - dev
      - ci/check-bmt-gate
      - test/check-bmt-gate-*
      - test/workflow-optimizations

defaults:
  run:
    shell: bash

permissions:
  contents: read
  actions: read

# One run per PR branch; cancel in-progress on new push.
concurrency:
  group: ci-${{ github.repository }}-${{ github.event.pull_request.head.ref || github.ref_name }}
  cancel-in-progress: true

# Pass rule:
# - pytest-fast is the authoritative PR blocking gate.
# - pytest-heavy runs on protected flows (ci/check-bmt-gate + manual), with artifacts for diagnostics.
# - pytest-live-smoke runs on schedule/manual opt-in only.
# - prepare-builds + dummy-build-release + dummy-build-non-release remain build topology checks.
jobs:
  pytest-fast:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout source
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
      - name: Setup uv
        uses: astral-sh/setup-uv@v7
        with:
          version: "0.10.9"
      - name: Sync dev dependencies
        run: uv sync --group dev
      - name: Test smell guard
        run: uv run python tools/test_smell_check.py
      - name: Run fast pytest gate
        run: |
          uv run pytest -m "unit or contract or integration" -q -n auto --dist loadscope --reruns 1 --reruns-delay 1 --disable-socket --allow-hosts=127.0.0.1,localhost
      - name: Upload fast pytest artifacts
        if: always()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f  # v7
        with:
          name: pytest-fast-artifacts
          path: |
            junit.xml
            coverage.xml
          if-no-files-found: warn
          retention-days: 7

  pytest-heavy:
    if: >-
      github.event_name == 'workflow_dispatch'
      || github.event_name == 'schedule'
      || github.ref_name == 'ci/check-bmt-gate'
      || ((github.event_name == 'pull_request' || github.event_name == 'pull_request_target')
          && contains(fromJson('["dev","ci/check-bmt-gate"]'), github.base_ref))
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout source
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
      - name: Setup uv
        uses: astral-sh/setup-uv@v7
        with:
          version: "0.10.9"
      - name: Sync dev dependencies
        run: uv sync --group dev
      - name: Run heavy pytest suite
        run: |
          uv run pytest -m "not live_smoke" tests/ -v --durations=35 --reruns 2 --reruns-delay 2 --disable-socket --allow-hosts=127.0.0.1,localhost
      - name: Upload heavy pytest artifacts
        if: always()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f  # v7
        with:
          name: pytest-heavy-artifacts
          path: |
            junit.xml
            coverage.xml
          if-no-files-found: warn
          retention-days: 7

  pytest-live-smoke:
    if: >-
      github.event_name == 'schedule'
      || (github.event_name == 'workflow_dispatch' && inputs.run_live_smoke == true)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout source
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
      - name: Setup uv
        uses: astral-sh/setup-uv@v7
        with:
          version: "0.10.9"
      - name: Sync dev dependencies
        run: uv sync --group dev
      - name: Run live smoke pytest suite
        run: |
          uv run pytest -m "live_smoke" tests/ -v --maxfail=1
      - name: Upload live smoke artifacts
        if: always()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f  # v7
        with:
          name: pytest-live-smoke-artifacts
          path: |
            junit.xml
            coverage.xml
          if-no-files-found: warn
          retention-days: 10

  prepare-builds:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: write
    outputs:
      release_presets: ${{ steps.parse.outputs.release_presets }}
      non_release_presets: ${{ steps.parse.outputs.non_release_presets }}
    steps:
      - name: Checkout source
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
        with:
          repository: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name || github.repository }}
          ref: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.sha }}
          fetch-depth: 1
          submodules: false
          lfs: false

      - name: Parse CMakePresets.json
        id: parse
        run: |
          presets=$(jq -c '
            [ .buildPresets[]
              | { build: .name
                , configure: .configurePreset
                , short: (.name | sub("-build$"; "")) }
              | . + {
                  is_release: (
                    (.configure | test("_gcc_Release")) and
                    (.configure | test("xtensa"; "i") | not) and
                    (.configure | test("hexagon"; "i") | not)
                  ),
                  soft_fail: (
                    (.configure | test("xtensa"; "i")) or
                    (.configure | test("hexagon"; "i"))
                  )
                }
            ]' CMakePresets.json)
          echo "release_presets=$(echo "$presets" | jq -c '[.[] | select(.is_release)]')" >>"$GITHUB_OUTPUT"
          echo "non_release_presets=$(echo "$presets" | jq -c '[.[] | select(.is_release | not)]')" >>"$GITHUB_OUTPUT"

      - name: Create repo snapshot
        run: |
          tar --exclude='.git' \
              --exclude='.ruff_cache' \
              --exclude='.venv' --exclude='venv' --exclude='.uv' \
              --exclude='__pycache__' --exclude='.mypy_cache' --exclude='.pytest_cache' --exclude='.tox' --exclude='*.egg-info' \
              --exclude='.cursor' --exclude='.vscode' \
              --exclude='node_modules' \
              -czf /tmp/repo-snapshot.tar.gz .
          mv /tmp/repo-snapshot.tar.gz repo-snapshot.tar.gz

      - name: Upload repo-snapshot
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f  # v7
        with:
          name: repo-snapshot
          path: repo-snapshot.tar.gz
          retention-days: 5

  dummy-build-release:
    needs: [prepare-builds]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: write
    strategy:
      fail-fast: false
      max-parallel: 6
      matrix:
        include: ${{ fromJson(needs.prepare-builds.outputs.release_presets) }}

    env:
      GRADLE_USER_HOME: ${{ github.workspace }}/.gradle

    steps:
      - name: Download repo-snapshot
        uses: actions/download-artifact@70fc10c6e5e1ce46ad2ea6f2b72d43f7d47b13c3  # v8
        with:
          name: repo-snapshot

      - name: Extract repo snapshot
        run: tar -xzf repo-snapshot.tar.gz -C .

      - name: Dummy build ( ${{ matrix.short }} )
        run: |
          echo "Sandbox dummy build for ${{ matrix.short }} - no real compile."

  dummy-build-non-release:
    needs: [prepare-builds]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: write
    strategy:
      fail-fast: false
      max-parallel: 6
      matrix:
        include: ${{ fromJson(needs.prepare-builds.outputs.non_release_presets) }}

    env:
      GRADLE_USER_HOME: ${{ github.workspace }}/.gradle

    steps:
      - name: Download repo-snapshot
        uses: actions/download-artifact@70fc10c6e5e1ce46ad2ea6f2b72d43f7d47b13c3  # v8
        with:
          name: repo-snapshot

      - name: Extract repo snapshot
        run: tar -xzf repo-snapshot.tar.gz -C .

      - name: Dummy build ( ${{ matrix.short }} )
        run: |
          echo "Sandbox dummy build for ${{ matrix.short }} - no real compile."

  bmt:
    needs: [pytest-fast, dummy-build-release]
    if: >-
      always() && (needs.dummy-build-release.result == 'success' || needs.dummy-build-release.result == 'skipped')
      && (needs.pytest-fast.result == 'success' || needs.pytest-fast.result == 'skipped')
      && (github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository)
      && contains(
        fromJson('["dev","ci/check-bmt-gate"]'),
        (github.event_name == 'pull_request' || github.event_name == 'pull_request_target')
          && github.base_ref
          || github.ref_name
      )
    permissions:
      actions: read
      contents: read
      statuses: write
      issues: write
      id-token: write
    uses: ./.github/workflows/bmt.yml
    with:
      ci_run_id: ${{ github.run_id }}
      head_sha: ${{ (github.event_name == 'pull_request' || github.event_name == 'pull_request_target') && github.event.pull_request.head.sha || github.sha }}
      head_branch: ${{ (github.event_name == 'pull_request' || github.event_name == 'pull_request_target') && github.event.pull_request.head.ref || github.ref_name }}
      head_event: ${{ github.event_name }}
      pr_number: ${{ (github.event_name == 'pull_request' || github.event_name == 'pull_request_target') && format('{0}', github.event.pull_request.number) || '' }}
    secrets: inherit
