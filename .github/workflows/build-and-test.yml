name: CI

on:
  workflow_dispatch:
  push:
    # Only ci/check-bmt-gate (integration branch): PR branches trigger via pull_request, so one run per push.
    branches:
      - ci/check-bmt-gate
  pull_request:
    branches:
      - dev
      - ci/check-bmt-gate
      - test/check-bmt-gate-*
      - test/workflow-optimizations

defaults:
  run:
    shell: bash

permissions:
  contents: read
  actions: read

# One run per PR branch; cancel in-progress on new push.
concurrency:
  group: ci-${{ github.repository }}-${{ github.event.pull_request.head.ref || github.ref_name }}
  cancel-in-progress: true

jobs:
  checkout-once:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: write
    steps:
      - name: Checkout source
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
        with:
          repository: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name || github.repository }}
          ref: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.sha }}
          fetch-depth: 1
          submodules: false
          lfs: false

      - name: Create repo snapshot
        run: |
          tar --exclude='.git' \
              --exclude='.ruff_cache' \
              --exclude='.venv' --exclude='venv' --exclude='.uv' \
              --exclude='__pycache__' --exclude='.mypy_cache' --exclude='.pytest_cache' --exclude='.tox' --exclude='*.egg-info' \
              --exclude='.cursor' --exclude='.vscode' \
              --exclude='node_modules' \
              -czf /tmp/repo-snapshot.tar.gz .
          mv /tmp/repo-snapshot.tar.gz repo-snapshot.tar.gz

      - name: Upload repo-snapshot
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4
        with:
          name: repo-snapshot
          path: repo-snapshot.tar.gz
          retention-days: 5

  extract-presets:
    runs-on: ubuntu-latest
    outputs:
      presets: ${{ steps.parse.outputs.presets }}
    steps:
      - name: Checkout CMakePresets.json
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
        with:
          repository: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name || github.repository }}
          ref: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.sha }}
          fetch-depth: 1
          sparse-checkout: CMakePresets.json

      - name: Parse CMakePresets.json
        id: parse
        run: |
          presets=$(jq -c '
            [ .buildPresets[]
              | { build: .name
                , configure: .configurePreset
                , short: (.name | sub("-build$"; "")) }
              | . + {
                  is_release: (
                    (.configure | test("_gcc_Release")) and
                    (.configure | test("xtensa"; "i") | not) and
                    (.configure | test("hexagon"; "i") | not)
                  ),
                  soft_fail: (
                    (.configure | test("xtensa"; "i")) or
                    (.configure | test("hexagon"; "i"))
                  )
                }
            ]' CMakePresets.json)
          echo "presets=$presets" >>"$GITHUB_OUTPUT"

  build:
    needs: [checkout-once, extract-presets]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: write
    strategy:
      fail-fast: false
      max-parallel: 6
      matrix:
        include: ${{ fromJson(needs.extract-presets.outputs.presets) }}

    env:
      GRADLE_USER_HOME: ${{ github.workspace }}/.gradle

    steps:
      - name: Checkout repo (for local actions)
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
        with:
          ref: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.sha }}
          fetch-depth: 1
          sparse-checkout: .github

      - uses: ./.github/actions/checkout-and-restore
        with:
          ref: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.sha }}

      - uses: ./.github/actions/setup-build-env
        with:
          configure: ${{ matrix.configure }}
          build: ${{ matrix.build }}

      # ---- configure ----
      - name: Configure ( ${{ matrix.configure }} )
        timeout-minutes: 20
        continue-on-error: ${{ matrix.soft_fail }}
        run: |
          set -euo pipefail
          if [[ "${{ matrix.configure }}" == *webos* || "${{ matrix.build }}" == *webos* ]]; then
            cmake --preset "${{ matrix.configure }}" \
              -DCMAKE_TRY_COMPILE_TARGET_TYPE=STATIC_LIBRARY \
              -DCMAKE_INTERPROCEDURAL_OPTIMIZATION=OFF
          else
            cmake --preset "${{ matrix.configure }}"
          fi

      # ---- build ----
      - name: Build ( ${{ matrix.short }} )
        timeout-minutes: 60
        continue-on-error: ${{ matrix.soft_fail }}
        run: |
          set -euo pipefail
          cmake --build --preset "${{ matrix.build }}" 2>&1 | tee build.log
          gzip -9 build.log

      # ---- build output ----
      - name: Check build output
        run: |
          set -euo pipefail
          if [ -f build.log.gz ]; then
            warnings=$(zgrep -c "warning:" build.log.gz || true)
            errors=$(zgrep -c "error:"   build.log.gz || true)
          elif [ -f build.log ]; then
            warnings=$(grep -c "warning:" build.log || true)
            errors=$(grep -c "error:"   build.log || true)
          else
            echo "No build log found"; exit 0
          fi
          echo "Warnings: $warnings"
          echo "Errors  : $errors"
          if [ "$warnings" -gt 0 ] || [ "$errors" -gt 0 ]; then
            if [ "${{ matrix.soft_fail }}" = "true" ]; then
              echo "::warning::Embedded build had $warnings warnings and $errors errors — NOT failing CI."
            else
              echo "::error::Build failed – $warnings warnings, $errors errors."
              exit 1
            fi
          else
            echo "::notice::Build clean."
          fi

      # ---- runner artifact for BMT (release presets only) ----
      - name: Setup uv
        if: ${{ matrix.is_release }}
        uses: astral-sh/setup-uv@38f3f104447c67c051c4a08e39b64a148898af3a  # v4
        with:
          version: "0.10.9"

      - name: Sync BMT
        if: ${{ matrix.is_release }}
        run: uv sync --project .github/bmt

      - name: Stage release runner payload
        if: ${{ matrix.is_release }}
        env:
          MATRIX_CONFIGURE: ${{ matrix.configure }}
        run: uv run --project .github/bmt bmt stage-release-runner

      - name: Compute runner artifact info
        if: ${{ matrix.is_release }}
        id: runner-artifact
        env:
          MATRIX_CONFIGURE: ${{ matrix.configure }}
        run: uv run --project .github/bmt bmt compute-preset-info

      - name: Upload runner artifact
        if: ${{ matrix.is_release }}
        timeout-minutes: 8
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4
        with:
          name: runner-${{ steps.runner-artifact.outputs.preset }}
          path: |
            ${{ steps.runner-artifact.outputs.runners_dir }}/kardome_runner
            ${{ steps.runner-artifact.outputs.lib_dir }}/libKardome.so
          if-no-files-found: error
          retention-days: 7

  bmt-handoff:
    needs: build
    if: >-
      success()
      && (github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository)
      && contains(
        fromJson('["dev","ci/check-bmt-gate"]'),
        (github.event_name == 'pull_request' || github.event_name == 'pull_request_target')
          && github.base_ref
          || github.ref_name
      )
    permissions:
      actions: read
      contents: read
      statuses: write
      issues: write
      id-token: write
    uses: ./.github/workflows/bmt.yml
    with:
      ci_run_id: ${{ github.run_id }}
      head_sha: ${{ (github.event_name == 'pull_request' || github.event_name == 'pull_request_target') && github.event.pull_request.head.sha || github.sha }}
      head_branch: ${{ (github.event_name == 'pull_request' || github.event_name == 'pull_request_target') && github.event.pull_request.head.ref || github.ref_name }}
      head_event: ${{ github.event_name }}
      pr_number: ${{ (github.event_name == 'pull_request' || github.event_name == 'pull_request_target') && format('{0}', github.event.pull_request.number) || '' }}
    secrets: inherit


