name: CI

# push/pull_request are in trigger-ci.yml so CI runs from the source branch (see trigger-ci.yml).
on:
  workflow_dispatch:
  schedule:
    - cron: "17 3 * * *"
  workflow_call: {}

defaults:
  run:
    shell: bash

permissions:
  contents: read
  actions: read

# One run per PR branch; cancel in-progress on new push.
concurrency:
  group: ci-${{ github.repository }}-${{ github.event.pull_request.head.ref || github.ref_name }}
  cancel-in-progress: true

# Pass rule:
# - prepare-builds + dummy-build-release + dummy-build-non-release are topology checks only;
#   dummy jobs echo "dummy runner for <project>" (no artifact, no compile).
jobs:
  prepare-builds:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: write
    outputs:
      release_presets: ${{ steps.parse.outputs.release_presets }}
      non_release_presets: ${{ steps.parse.outputs.non_release_presets }}
    steps:
      - name: Checkout source
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          repository: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name || github.repository }}
          ref: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.sha }}
          fetch-depth: 1
          submodules: false
          lfs: false

      - name: Parse CMakePresets.json
        id: parse
        run: |
          presets=$(jq -c '
            [ .buildPresets[]
              | { build: .name
                , configure: .configurePreset
                , short: (.name | sub("-build$"; "")) }
              | . + {
                  is_release: (
                    (.configure | test("_gcc_Release")) and
                    (.configure | test("xtensa"; "i") | not) and
                    (.configure | test("hexagon"; "i") | not)
                  ),
                  soft_fail: (
                    (.configure | test("xtensa"; "i")) or
                    (.configure | test("hexagon"; "i"))
                  )
                }
            ]' CMakePresets.json)
          echo "release_presets=$(echo "$presets" | jq -c '[.[] | select(.is_release)]')" >>"$GITHUB_OUTPUT"
          echo "non_release_presets=$(echo "$presets" | jq -c '[.[] | select(.is_release | not)]')" >>"$GITHUB_OUTPUT"

  dummy-build-release:
    needs: [prepare-builds]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: write
    strategy:
      fail-fast: false
      max-parallel: 6
      matrix:
        include: ${{ fromJson(needs.prepare-builds.outputs.release_presets) }}
    env:
      GRADLE_USER_HOME: ${{ github.workspace }}/.gradle
    steps:
      - name: Dummy build ( ${{ matrix.short }} )
        run: |
          echo "Dummy build for ${{ matrix.short }} — dummy runner for relevant projects (no compile)."

  dummy-build-non-release:
    needs: [prepare-builds]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: write
    strategy:
      fail-fast: false
      max-parallel: 6
      matrix:
        include: ${{ fromJson(needs.prepare-builds.outputs.non_release_presets) }}
    env:
      GRADLE_USER_HOME: ${{ github.workspace }}/.gradle
    steps:
      - name: Dummy build ( ${{ matrix.short }} )
        run: |
          echo "Dummy build for ${{ matrix.short }} — dummy runner for relevant projects (no compile)."

  decide-bmt:
    needs: [dummy-build-release]
    runs-on: ubuntu-latest
    outputs:
      run_bmt: ${{ steps.out.outputs.run_bmt }}
    steps:
      - id: out
        run: |
          r="${{ needs.dummy-build-release.result }}"
          same_repo="${{ github.event.pull_request.head.repo.full_name == github.repository }}"
          base_ref="${{ github.base_ref || github.ref_name }}"
          if [[ "$r" != "success" && "$r" != "skipped" ]]; then echo "run_bmt=false" >> "$GITHUB_OUTPUT"; exit 0; fi
          if [[ "$same_repo" != "true" ]]; then echo "run_bmt=false" >> "$GITHUB_OUTPUT"; exit 0; fi
          if [[ "$base_ref" != "dev" && "$base_ref" != "ci/check-bmt-gate" ]]; then echo "run_bmt=false" >> "$GITHUB_OUTPUT"; exit 0; fi
          echo "run_bmt=true" >> "$GITHUB_OUTPUT"

  bmt:
    needs: [decide-bmt]
    # Run only when decide-bmt set run_bmt=true (dummy ok, same repo, base dev or ci/check-bmt-gate).
    if: needs.decide-bmt.outputs.run_bmt == 'true'
    permissions:
      contents: read
      actions: read
      id-token: write
      statuses: write
    uses: ./.github/workflows/bmt-handoff.yml
    with:
      ci_run_id: ${{ github.run_id }}
      head_sha: ${{ (github.event_name == 'pull_request' || github.event_name == 'pull_request_target') && github.event.pull_request.head.sha || github.sha }}
      head_branch: ${{ (github.event_name == 'pull_request' || github.event_name == 'pull_request_target') && github.event.pull_request.head.ref || github.ref_name }}
      head_event: ${{ github.event_name }}
      pr_number: ${{ (github.event_name == 'pull_request' || github.event_name == 'pull_request_target') && format('{0}', github.event.pull_request.number) || '' }}
    secrets: inherit
