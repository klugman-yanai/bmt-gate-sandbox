name: CI

on:
  workflow_dispatch:
  push:
    # Only ci/check-bmt-gate (integration branch): PR branches trigger via pull_request, so one run per push.
    branches:
      - ci/check-bmt-gate
  pull_request:
    branches:
      - dev
      - ci/check-bmt-gate
      - test/check-bmt-gate-*
      - test/workflow-optimizations

defaults:
  run:
    shell: bash

permissions:
  contents: read
  actions: read

# One run per PR branch; cancel in-progress on new push.
concurrency:
  group: ci-${{ github.repository }}-${{ github.event.pull_request.head.ref || github.ref_name }}
  cancel-in-progress: true

# Pass rule (aligned with dev/production): all build jobs must pass for the workflow to pass.
# - prepare-builds: checkout, parse presets, create and upload repo-snapshot for build jobs.
# - dummy-build-release + dummy-build-non-release: minimal dummy builds (download snapshot, extract, no-op).
# - bmt: invokes BMT workflow after release builds; must pass when it runs.
jobs:
  prepare-builds:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: write
    outputs:
      release_presets: ${{ steps.parse.outputs.release_presets }}
      non_release_presets: ${{ steps.parse.outputs.non_release_presets }}
    steps:
      - name: Checkout source
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
        with:
          repository: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name || github.repository }}
          ref: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.sha }}
          fetch-depth: 1
          submodules: false
          lfs: false

      - name: Parse CMakePresets.json
        id: parse
        run: |
          presets=$(jq -c '
            [ .buildPresets[]
              | { build: .name
                , configure: .configurePreset
                , short: (.name | sub("-build$"; "")) }
              | . + {
                  is_release: (
                    (.configure | test("_gcc_Release")) and
                    (.configure | test("xtensa"; "i") | not) and
                    (.configure | test("hexagon"; "i") | not)
                  ),
                  soft_fail: (
                    (.configure | test("xtensa"; "i")) or
                    (.configure | test("hexagon"; "i"))
                  )
                }
            ]' CMakePresets.json)
          echo "release_presets=$(echo "$presets" | jq -c '[.[] | select(.is_release)]')" >>"$GITHUB_OUTPUT"
          echo "non_release_presets=$(echo "$presets" | jq -c '[.[] | select(.is_release | not)]')" >>"$GITHUB_OUTPUT"

      - name: Create repo snapshot
        run: |
          tar --exclude='.git' \
              --exclude='.ruff_cache' \
              --exclude='.venv' --exclude='venv' --exclude='.uv' \
              --exclude='__pycache__' --exclude='.mypy_cache' --exclude='.pytest_cache' --exclude='.tox' --exclude='*.egg-info' \
              --exclude='.cursor' --exclude='.vscode' \
              --exclude='node_modules' \
              -czf /tmp/repo-snapshot.tar.gz .
          mv /tmp/repo-snapshot.tar.gz repo-snapshot.tar.gz

      - name: Upload repo-snapshot
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f  # v7
        with:
          name: repo-snapshot
          path: repo-snapshot.tar.gz
          retention-days: 5

  dummy-build-release:
    needs: [prepare-builds]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: write
    strategy:
      fail-fast: false
      max-parallel: 6
      matrix:
        include: ${{ fromJson(needs.prepare-builds.outputs.release_presets) }}

    env:
      GRADLE_USER_HOME: ${{ github.workspace }}/.gradle

    steps:
      - name: Download repo-snapshot
        uses: actions/download-artifact@70fc10c6e5e1ce46ad2ea6f2b72d43f7d47b13c3  # v8
        with:
          name: repo-snapshot

      - name: Extract repo snapshot
        run: tar -xzf repo-snapshot.tar.gz -C .

      - name: Dummy build ( ${{ matrix.short }} )
        run: echo "Sandbox: dummy build for ${{ matrix.short }} — no real compile."

  dummy-build-non-release:
    needs: [prepare-builds]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: write
    strategy:
      fail-fast: false
      max-parallel: 6
      matrix:
        include: ${{ fromJson(needs.prepare-builds.outputs.non_release_presets) }}

    env:
      GRADLE_USER_HOME: ${{ github.workspace }}/.gradle

    steps:
      - name: Download repo-snapshot
        uses: actions/download-artifact@70fc10c6e5e1ce46ad2ea6f2b72d43f7d47b13c3  # v8
        with:
          name: repo-snapshot

      - name: Extract repo snapshot
        run: tar -xzf repo-snapshot.tar.gz -C .

      - name: Dummy build ( ${{ matrix.short }} )
        run: echo "Sandbox: dummy build for ${{ matrix.short }} — no real compile."

  bmt:
    needs: [dummy-build-release]
    if: >-
      always() && (needs.dummy-build-release.result == 'success' || needs.dummy-build-release.result == 'skipped')
      && (github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository)
      && contains(
        fromJson('["dev","ci/check-bmt-gate"]'),
        (github.event_name == 'pull_request' || github.event_name == 'pull_request_target')
          && github.base_ref
          || github.ref_name
      )
    permissions:
      actions: read
      contents: read
      statuses: write
      issues: write
      id-token: write
    uses: ./.github/workflows/bmt.yml
    with:
      ci_run_id: ${{ github.run_id }}
      head_sha: ${{ (github.event_name == 'pull_request' || github.event_name == 'pull_request_target') && github.event.pull_request.head.sha || github.sha }}
      head_branch: ${{ (github.event_name == 'pull_request' || github.event_name == 'pull_request_target') && github.event.pull_request.head.ref || github.ref_name }}
      head_event: ${{ github.event_name }}
      pr_number: ${{ (github.event_name == 'pull_request' || github.event_name == 'pull_request_target') && format('{0}', github.event.pull_request.number) || '' }}
    secrets: inherit

