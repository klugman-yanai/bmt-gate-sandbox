# Dummy CI workflow for this test repository.
# Keeps CI topology as no-op while still collecting/uploading release runners for BMT handoff tests.
name: CI

on:
  workflow_dispatch:
  push:
    branches:
      - dev
      - ci/check-bmt-gate
      - test/check-bmt-gate-*
  pull_request:
    branches:
      - dev
      - ci/check-bmt-gate

defaults:
  run:
    shell: bash

env:
  # One build job per project; default "all". Set repo var BMT_PROJECTS to override (e.g. ["sk"]).
  BMT_PROJECTS: ${{ vars.BMT_PROJECTS }}

jobs:
  # ─────────────────────── 1) one preset per project (gcc_Release only; filtered) ───────────────────────
  extract-presets:
    runs-on: ubuntu-latest
    outputs:
      presets: ${{ steps.parse.outputs.presets }}
    steps:
      - name: Checkout source for preset parsing
        uses: actions/checkout@v4
        with:
          repository: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name || github.repository }}
          ref: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.sha }}
          fetch-depth: 1

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          python-version: "3.12"

      - name: Parse CMakePresets.json (one preset per project, gcc_Release only)
        id: parse
        run: bash .github/bmt/scripts/ci_workflow.sh parse-presets

  # ─────────────────────── 1.5) resolve BMT head context ───────────────────────
  resolve-bmt-context:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    outputs:
      head_event: ${{ steps.resolve.outputs.head_event }}
      pr_number: ${{ steps.resolve.outputs.pr_number }}
    steps:
      - id: resolve
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const refName = process.env.GITHUB_REF_NAME || "";
            const repoSlug = process.env.GITHUB_REPOSITORY || "";
            const [owner, repo] = repoSlug.split("/");
            const testBranchPattern = /^test\/check-bmt-gate-.+/;
            const requiredBaseBranch = "ci/check-bmt-gate";

            if (!testBranchPattern.test(refName)) {
              core.setOutput("head_event", "push");
              core.setOutput("pr_number", "");
              core.notice(`Resolved BMT context: push (branch=${refName})`);
              return;
            }

            if (!owner || !repo) {
              throw new Error("GITHUB_REPOSITORY is empty; cannot resolve PR context.");
            }

            const resp = await github.rest.pulls.list({
              owner,
              repo,
              state: "open",
              head: `${owner}:${refName}`,
              per_page: 100,
            });
            const pulls = (resp.data || []).filter((pr) => pr.base?.ref === requiredBaseBranch);

            if (pulls.length === 0) {
              throw new Error(
                `Branch '${refName}' matches test/check-bmt-gate-* but has no open PR into ${requiredBaseBranch}. ` +
                "Open a PR first, then push a new commit for PR-context validation."
              );
            }
            if (pulls.length > 1) {
              const list = pulls.map((pr) => `#${pr.number} (base=${pr.base?.ref || "unknown"})`).join(", ");
              throw new Error(
                `Branch '${refName}' has multiple open PRs into ${requiredBaseBranch} (${list}). ` +
                "Close extras so exactly one PR maps to this validation branch."
              );
            }

            const prNumber = String(pulls[0].number);
            core.setOutput("head_event", "pull_request");
            core.setOutput("pr_number", prNumber);
            core.notice(`Resolved BMT context: pull_request #${prNumber} (branch=${refName})`);

  # ─────────────────────── 2) build every preset (dummy/no-op except runner staging + upload) ────────────────────────
  build:
    needs: [extract-presets, resolve-bmt-context]
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJson(needs.extract-presets.outputs.presets) }}

    env:
      GRADLE_USER_HOME: ${{ github.workspace }}/.gradle

    steps:
      - name: Checkout source to build
        uses: actions/checkout@v4
        with:
          repository: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name || github.repository }}
          ref: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.sha }}
          fetch-depth: 1
          submodules: false
          lfs: false
          persist-credentials: false

      - name: Disk space (before)
        run: df -h

      - name: Free disk space on runner (dummy)
        run: "true"

      - name: Fix Hardcoded Paths and Install Deps for webOS Toolchains (dummy)
        run: "true"

      - name: Install CMake 3.29.3 (dummy)
        run: "true"

      - name: Install MinGW (64-bit) (dummy)
        if: contains(matrix.configure, 'mingw') || contains(matrix.build, 'mingw')
        run: "true"

      - name: Configure (dummy) ( ${{ matrix.configure }} )
        continue-on-error: ${{ contains(matrix.configure, 'xtensa') || contains(matrix.build, 'xtensa') || contains(matrix.configure, 'hexagon') || contains(matrix.build, 'hexagon') }}
        run: "true"

      - name: Build (dummy) + stage release runner ( ${{ matrix.short }} )
        continue-on-error: ${{ contains(matrix.configure, 'xtensa') || contains(matrix.build, 'xtensa') || contains(matrix.configure, 'hexagon') || contains(matrix.build, 'hexagon') }}
        env:
          MATRIX_CONFIGURE: ${{ matrix.configure }}
        run: bash .github/bmt/scripts/ci_workflow.sh stage-release-runner

      - name: Soft check (Xtensa/Hexagon) (dummy)
        if: ${{ contains(matrix.configure, 'xtensa') || contains(matrix.build, 'xtensa') || contains(matrix.configure, 'hexagon') || contains(matrix.build, 'hexagon') }}
        run: "true"

      - name: Strict check (non-embedded) (dummy)
        if: ${{ ! (contains(matrix.configure, 'xtensa') || contains(matrix.build, 'xtensa') || contains(matrix.configure, 'hexagon') || contains(matrix.build, 'hexagon')) }}
        run: "true"

      - name: Compute preset info
        id: preset-info
        if: contains(matrix.configure, '_gcc_Release') && !contains(matrix.configure, 'xtensa') && !contains(matrix.configure, 'hexagon')
        env:
          MATRIX_CONFIGURE: ${{ matrix.configure }}
        run: bash .github/bmt/scripts/ci_workflow.sh compute-preset-info

      - name: Upload runner artifact
        if: steps.preset-info.outcome == 'success'
        uses: actions/upload-artifact@v4
        with:
          name: runner-${{ steps.preset-info.outputs.preset }}
          path: |
            ${{ steps.preset-info.outputs.runners_dir }}/kardome_runner
            ${{ steps.preset-info.outputs.lib_dir }}/libKardome.so
          retention-days: 1
          if-no-files-found: warn

      - name: Disk space (after)
        if: always()
        run: "true"

      - name: Cleanup heavy dirs
        if: always()
        run: "true"

  # ─────────────────────── 3) Run BMT handoff inline via reusable workflow ───────────────────────
  bmt-handoff:
    name: BMT Handoff
    needs: [build, resolve-bmt-context]
    if: success()
    permissions:
      actions: read
      contents: read
      statuses: write
      issues: write
      id-token: write
    uses: ./.github/workflows/bmt.yml
    with:
      ci_run_id: ${{ github.run_id }}
      head_sha: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.sha }}
      head_branch: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.ref || github.ref_name }}
      head_event: ${{ needs.resolve-bmt-context.outputs.head_event }}
      pr_number: ${{ needs.resolve-bmt-context.outputs.pr_number }}
    secrets: inherit
