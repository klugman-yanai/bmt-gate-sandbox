# Dummy CI workflow — 1:1 mirror of core-main good-point flow for klugman-yanai/bmt-gate-sandbox.
# Same topology: extract-presets → build-release (dummy + runner upload) → BMT handoff.
# Uses testing configuration (vars/secrets for sandbox).
name: CI

on:
  workflow_dispatch:
  push:
    branches:
      - dev
      - ci/check-bmt-gate
      - test/check-bmt-gate-*
  pull_request:
    branches:
      - dev
      - ci/check-bmt-gate
      - test/check-bmt-gate-*

# One CI run per branch; cancel-in-progress for PRs and ci/test branches. Reduces runner starvation when multiple branches push.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ (github.event_name == 'pull_request' || github.event_name == 'pull_request_target') || startsWith(github.ref_name, 'ci/check-bmt-gate') || startsWith(github.ref_name, 'test/check-bmt-gate-') }}

defaults:
  run:
    shell: bash

jobs:
  # 1) Extract preset list once (no checkout — fetch CMakePresets.json via API, same as good-point)
  extract-presets:
    runs-on: ubuntu-latest
    outputs:
      presets: ${{ steps.parse.outputs.presets }}
      presets_release: ${{ steps.parse.outputs.presets_release }}
      presets_nonrelease: ${{ steps.parse.outputs.presets_nonrelease }}
    steps:
      - name: Fetch CMakePresets.json for current SHA (no git checkout)
        env:
          REPO: ${{ (github.event_name == 'pull_request' || github.event_name == 'pull_request_target') && github.event.pull_request.head.repo.full_name || github.repository }}
          REF: ${{ (github.event_name == 'pull_request' || github.event_name == 'pull_request_target') && github.event.pull_request.head.sha || github.sha }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          url="https://api.github.com/repos/${REPO}/contents/CMakePresets.json?ref=${REF}"
          ok=0
          for delay in 0 5 10 20; do
            if [[ "$delay" -gt 0 ]]; then sleep "$delay"; fi
            if curl -fsSL \
              --connect-timeout 15 \
              --max-time 60 \
              --retry 0 \
              -H "Authorization: Bearer ${GH_TOKEN}" \
              -H "Accept: application/vnd.github.raw" \
              "${url}" -o CMakePresets.json; then
              ok=1
              break
            fi
          done
          if [[ "$ok" -ne 1 ]] || [[ ! -s CMakePresets.json ]]; then
            echo "::error::Failed to download CMakePresets.json for ${REPO}@${REF}"
            exit 1
          fi

      - name: Parse CMakePresets.json
        id: parse
        run: |
          presets=$(jq -c '
            [ .buildPresets[]
              | { build: .name
                , configure: .configurePreset
                , short: (.name | sub("-build$"; "")) }
            ]' CMakePresets.json)
          presets_release=$(echo "$presets" | jq -c '
            map(
              select(
                (.configure | test("_gcc_Release")) and
                (.configure | test("xtensa"; "i") | not) and
                (.configure | test("hexagon"; "i") | not)
              )
            )')
          presets_nonrelease=$(echo "$presets" | jq -c '
            map(
              select(
                (.configure | test("_gcc_Release") | not) or
                (.configure | test("xtensa"; "i")) or
                (.configure | test("hexagon"; "i"))
              )
            )')
          {
            echo "presets=$presets"
            echo "presets_release=$presets_release"
            echo "presets_nonrelease=$presets_nonrelease"
          } >>"$GITHUB_OUTPUT"

  # 1.5) Resolve BMT head context (sandbox: test/check-bmt-gate-* → PR mapping)
  resolve-context:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    outputs:
      head_sha: ${{ steps.finalize.outputs.head_sha }}
      head_branch: ${{ steps.finalize.outputs.head_branch }}
      head_event: ${{ steps.finalize.outputs.head_event }}
      pr_number: ${{ steps.finalize.outputs.pr_number }}
    steps:
      - name: Checkout source for context resolution
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Resolve base head context
        id: resolve-base
        env:
          EVENT_NAME: ${{ github.event_name }}
          PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          PR_HEAD_REF: ${{ github.event.pull_request.head.ref }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          DEFAULT_HEAD_SHA: ${{ github.sha }}
          DEFAULT_HEAD_BRANCH: ${{ github.ref_name }}
        run: bash .github/bmt/scripts/ci_workflow.sh resolve-head-context

      - id: map-test-pr
        if: ${{ github.event_name == 'push' && startsWith(github.ref_name, 'test/check-bmt-gate-') }}
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const refName = process.env.GITHUB_REF_NAME || "";
            const repoSlug = process.env.GITHUB_REPOSITORY || "";
            const [owner, repo] = repoSlug.split("/");
            const testBranchPattern = /^test\/check-bmt-gate-.+/;
            const requiredBaseBranch = "ci/check-bmt-gate";

            if (!testBranchPattern.test(refName)) {
              core.setOutput("head_event", "push");
              core.setOutput("pr_number", "");
              core.notice(`Resolved BMT context: push (branch=${refName})`);
              return;
            }

            if (!owner || !repo) {
              throw new Error("GITHUB_REPOSITORY is empty; cannot resolve PR context.");
            }

            const resp = await github.rest.pulls.list({
              owner,
              repo,
              state: "open",
              head: `${owner}:${refName}`,
              per_page: 100,
            });
            const pulls = (resp.data || []).filter((pr) => pr.base?.ref === requiredBaseBranch);

            if (pulls.length === 0) {
              throw new Error(
                `Branch '${refName}' matches test/check-bmt-gate-* but has no open PR into ${requiredBaseBranch}. ` +
                "Open a PR first, then push a new commit for PR-context validation."
              );
            }
            if (pulls.length > 1) {
              const list = pulls.map((pr) => `#${pr.number} (base=${pr.base?.ref || "unknown"})`).join(", ");
              throw new Error(
                `Branch '${refName}' has multiple open PRs into ${requiredBaseBranch} (${list}). ` +
                "Close extras so exactly one PR maps to this validation branch."
              );
            }

            const prNumber = String(pulls[0].number);
            core.setOutput("head_event", "pull_request");
            core.setOutput("pr_number", prNumber);
            core.notice(`Resolved BMT context: pull_request #${prNumber} (branch=${refName})`);

      - name: Finalize head context
        id: finalize
        shell: bash
        run: |
          set -euo pipefail
          head_sha="${{ steps.resolve-base.outputs.head_sha }}"
          head_branch="${{ steps.resolve-base.outputs.head_branch }}"
          head_event="${{ steps.resolve-base.outputs.head_event }}"
          pr_number="${{ steps.resolve-base.outputs.pr_number }}"
          override_head_event="${{ steps.map-test-pr.outputs.head_event }}"
          override_pr_number="${{ steps.map-test-pr.outputs.pr_number }}"

          if [[ -n "$override_head_event" ]]; then
            head_event="$override_head_event"
          fi
          if [[ -n "$override_pr_number" ]]; then
            pr_number="$override_pr_number"
          fi

          {
            echo "head_sha=${head_sha}"
            echo "head_branch=${head_branch}"
            echo "head_event=${head_event}"
            echo "pr_number=${pr_number}"
          } >>"$GITHUB_OUTPUT"

  # 2) Build release presets — dummy (no-op) + stage runner + upload artifact (same matrix as good-point build-release)
  build-release:
    name: build (${{ matrix.build }}, ${{ matrix.configure }}, ${{ matrix.short }})
    needs: [extract-presets, resolve-context]
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      max-parallel: 6
      matrix:
        include: ${{ fromJson(needs.extract-presets.outputs.presets_release) }}

    env:
      GRADLE_USER_HOME: ${{ github.workspace }}/.gradle

    steps:
      - name: Checkout source to build
        uses: actions/checkout@v4
        with:
          repository: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name || github.repository }}
          ref: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.sha }}
          fetch-depth: 1
          submodules: false
          lfs: false
          persist-credentials: false

      - name: Disk space (before)
        run: df -h

      - name: Free disk space on runner (dummy)
        run: "true"

      - name: Fix Hardcoded Paths and Install Deps for webOS Toolchains (dummy)
        run: "true"

      - name: Install CMake 3.29.3 (dummy)
        run: "true"

      - name: Install MinGW (64-bit) (dummy)
        if: contains(matrix.configure, 'mingw') || contains(matrix.build, 'mingw')
        run: "true"

      - name: Configure (dummy) ( ${{ matrix.configure }} )
        continue-on-error: ${{ contains(matrix.configure, 'xtensa') || contains(matrix.build, 'xtensa') || contains(matrix.configure, 'hexagon') || contains(matrix.build, 'hexagon') }}
        run: "true"

      - name: Build (dummy) + stage release runner ( ${{ matrix.short }} )
        continue-on-error: ${{ contains(matrix.configure, 'xtensa') || contains(matrix.build, 'xtensa') || contains(matrix.configure, 'hexagon') || contains(matrix.build, 'hexagon') }}
        env:
          MATRIX_CONFIGURE: ${{ matrix.configure }}
        run: bash .github/bmt/scripts/ci_workflow.sh stage-release-runner

      - name: Soft check (Xtensa/Hexagon) (dummy)
        if: ${{ contains(matrix.configure, 'xtensa') || contains(matrix.build, 'xtensa') || contains(matrix.configure, 'hexagon') || contains(matrix.build, 'hexagon') }}
        run: "true"

      - name: Strict check (non-embedded) (dummy)
        if: ${{ ! (contains(matrix.configure, 'xtensa') || contains(matrix.build, 'xtensa') || contains(matrix.configure, 'hexagon') || contains(matrix.build, 'hexagon')) }}
        run: "true"

      - name: Compute preset info
        id: preset-info
        if: contains(matrix.configure, '_gcc_Release') && !contains(matrix.configure, 'xtensa') && !contains(matrix.configure, 'hexagon')
        env:
          MATRIX_CONFIGURE: ${{ matrix.configure }}
        run: bash .github/bmt/scripts/ci_workflow.sh compute-preset-info

      - name: Upload runner artifact
        if: steps.preset-info.outcome == 'success'
        uses: actions/upload-artifact@v4
        with:
          name: runner-${{ steps.preset-info.outputs.preset }}
          path: |
            ${{ steps.preset-info.outputs.runners_dir }}/kardome_runner
            ${{ steps.preset-info.outputs.lib_dir }}/libKardome.so
          retention-days: 1
          if-no-files-found: warn

      - name: Disk space (after)
        if: always()
        run: "true"

      - name: Cleanup heavy dirs
        if: always()
        run: "true"

  # 3) Run BMT handoff (same as good-point: needs build-release, pass head context)
  bmt-handoff:
    name: BMT Handoff
    needs: [build-release, resolve-context]
    if: success()
    permissions:
      actions: read
      contents: read
      statuses: write
      issues: write
      id-token: write
    uses: ./.github/workflows/bmt.yml
    with:
      ci_run_id: ${{ github.run_id }}
      head_sha: ${{ needs.resolve-context.outputs.head_sha }}
      head_branch: ${{ needs.resolve-context.outputs.head_branch }}
      head_event: ${{ needs.resolve-context.outputs.head_event }}
      pr_number: ${{ needs.resolve-context.outputs.pr_number }}
    secrets: inherit
