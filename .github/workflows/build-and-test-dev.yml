name: CI

# Jobs/DAG: 5 jobs, no image-check (historical ref: archive layout in git history).
# repo_snapshot → build_release + build_non_release (parallel) → evaluate_bmt_gate → bmt_handoff.
on:
  push:
    branches:
      - dev
      - ci/check-bmt-gate
      - test/check-bmt-gate-*
      - test/workflow-optimizations
      - test/*
  pull_request:
    branches:
      - dev
      - ci/check-bmt-gate
      - test/check-bmt-gate-*
      - test/workflow-optimizations
  workflow_dispatch:
  workflow_call: {}

defaults:
  run:
    shell: bash

# Artifact upload (repo_snapshot) needs actions write.
permissions:
  contents: read
  actions: read

concurrency:
  group: ci-${{ github.repository }}-${{ github.event.pull_request.head.ref || github.ref_name }}
  cancel-in-progress: true

jobs:
  repo_snapshot:
    name: Snapshot
    runs-on: ubuntu-22.04
    permissions:
      contents: read
      actions: write
    outputs:
      artifact_size: ${{ steps.report.outputs.artifact_size }}
      release_presets: ${{ steps.parse.outputs.release_presets }}
      non_release_presets: ${{ steps.parse.outputs.non_release_presets }}
    steps:
      - name: Checkout source
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          repository: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name || github.repository }}
          ref: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.sha }}
          fetch-depth: 1
          submodules: false
          lfs: false

      - name: Create repo snapshot
        run: |
          tar --exclude='.git' \
              --exclude='.ruff_cache' \
              --exclude='.venv' --exclude='venv' --exclude='.uv' \
              --exclude='__pycache__' --exclude='.mypy_cache' --exclude='.pytest_cache' --exclude='.tox' --exclude='*.egg-info' \
              --exclude='.cursor' --exclude='.vscode' \
              --exclude='node_modules' \
              -czf /tmp/repo-snapshot.tar.gz .
          mv /tmp/repo-snapshot.tar.gz repo-snapshot.tar.gz

      - name: Report repo-snapshot size
        id: report
        run: |
          size=$(du -h repo-snapshot.tar.gz | cut -f1)
          echo "::notice::repo-snapshot artifact size: $size"
          echo "artifact_size=$size" >>"$GITHUB_OUTPUT"

      - name: Upload repo-snapshot
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7
        with:
          name: repo-snapshot
          path: repo-snapshot.tar.gz
          retention-days: 5

      - name: Parse CMakePresets.json
        id: parse
        run: |
          # Null-safe: (.buildPresets // []) and (.configurePreset // "") so refs with missing
          # or partial presets (e.g. no configurePreset on an entry) do not make jq exit 5.
          presets=$(jq -c '
            [ (.buildPresets // [])[]
              | (.configurePreset // "") as $cfg
              | select($cfg != "")
              | { build: .name
                , configure: $cfg
                , short: (.name | sub("-build$"; ""))
                , is_release: (
                    ($cfg | test("_gcc_Release")) and
                    (($cfg | test("xtensa"; "i")) | not) and
                    (($cfg | test("hexagon"; "i")) | not)
                  )
                , soft_fail: (
                    ($cfg | test("xtensa"; "i")) or
                    ($cfg | test("hexagon"; "i"))
                  )
                }
            ]' CMakePresets.json)
          echo "release_presets=$(echo "$presets" | jq -c '[.[] | select(.is_release)]')" >>"$GITHUB_OUTPUT"
          echo "non_release_presets=$(echo "$presets" | jq -c '[.[] | select(.is_release | not)]')" >>"$GITHUB_OUTPUT"

  # Release builds: gate for BMT. Only release runner matrix is sent to BMT (handoff uses parse-release-runners).
  # bmt-gcloud: no real build; placeholder so job graph matches core-main.
  build_release:
    name: Release
    needs: repo_snapshot
    runs-on: ubuntu-22.04
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJson(needs.repo_snapshot.outputs.release_presets) }}
    steps:
      - name: Release build placeholder (bmt-gcloud)
        run: |
          echo "bmt-gcloud: no real build; release preset ${{ matrix.configure }} would be built here. BMT runs after this job."

  # Non-release builds: run in parallel; do not block BMT.
  # bmt-gcloud: no real build; placeholder so job graph matches core-main.
  build_non_release:
    name: Non-Release
    needs: repo_snapshot
    runs-on: ubuntu-22.04
    strategy:
      fail-fast: false
      max-parallel: 6
      matrix:
        include: ${{ fromJson(needs.repo_snapshot.outputs.non_release_presets) }}
    steps:
      - name: Non-release build placeholder (bmt-gcloud)
        run: |
          echo "bmt-gcloud: no real build; non-release preset ${{ matrix.configure }} runs in parallel (does not gate BMT)."

  evaluate_bmt_gate:
    name: Gate
    needs: [build_release]
    runs-on: ubuntu-22.04
    outputs:
      run_bmt: ${{ steps.out.outputs.run_bmt }}
    steps:
      - id: out
        env:
          BUILD_RELEASE_RESULT: ${{ needs.build_release.result }}
          EVENT_NAME: ${{ github.event_name }}
          PR_HEAD_REF: ${{ github.event.pull_request.head.ref }}
          PR_HEAD_REPO_FULL: ${{ github.event.pull_request.head.repo.full_name }}
          REF_NAME: ${{ github.ref_name }}
          THIS_REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          r="${BUILD_RELEASE_RESULT}"
          if [[ "$r" != "success" && "$r" != "skipped" ]]; then
            echo "run_bmt=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          event="${EVENT_NAME}"
          if [[ "$event" == "pull_request" || "$event" == "pull_request_target" ]]; then
            if [[ "${PR_HEAD_REPO_FULL}" != "${THIS_REPO}" ]]; then
              echo "run_bmt=false" >> "$GITHUB_OUTPUT"
              exit 0
            fi
            ref="${PR_HEAD_REF}"
          else
            ref="${REF_NAME}"
          fi
          case "$ref" in
            dev|ci/check-bmt-gate)
              echo "run_bmt=true" >> "$GITHUB_OUTPUT"
              ;;
            test/check-bmt-gate*)
              echo "run_bmt=true" >> "$GITHUB_OUTPUT"
              ;;
            *)
              echo "run_bmt=false" >> "$GITHUB_OUTPUT"
              ;;
          esac

  bmt_handoff:
    name: Handoff
    needs: [evaluate_bmt_gate]
    if: needs.evaluate_bmt_gate.outputs.run_bmt == 'true'
    permissions:
      contents: read
      actions: read
      id-token: write
      statuses: write
      pull-requests: read
    uses: ./.github/workflows/bmt-handoff.yml
    with:
      ci_run_id: ${{ github.run_id }}
      head_sha: ${{ (github.event_name == 'pull_request' || github.event_name == 'pull_request_target') && github.event.pull_request.head.sha || github.sha }}
      head_branch: ${{ (github.event_name == 'pull_request' || github.event_name == 'pull_request_target') && github.event.pull_request.head.ref || github.ref_name }}
      head_event: ${{ github.event_name }}
      pr_number: ${{ (github.event_name == 'pull_request' || github.event_name == 'pull_request_target') && format('{0}', github.event.pull_request.number) || '' }}
      use_mock_runner: false
