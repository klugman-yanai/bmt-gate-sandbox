name: CI

run-name: "CI (bmt-gcloud) · ${{ github.event_name }} · ${{ github.ref_name }} @ ${{ github.sha }}"

# Self-CI for klugman-yanai/bmt-gcloud (this repo only).
#
# DAG mirrors Kardome-org/core-main `build-and-test.yml`: Snapshot → Release gate +
# Non-Release (parallel) → Handoff → Google Workflows → Cloud Run.
#
# Unlike core-main, we do NOT compile firmware or upload runner binaries. Binaries live in
# GCS (`runner-*` artifacts there). Placeholder Release / Non-Release jobs only preserve the
# same eligibility shape and Matrix UI “feel”; CMakePresets.json exists so preset parsing stays
# aligned with core-main, but we cap matrix fan-out (below) to avoid dozens of no-op runners.
#
# Self-CI semantics (avoid “fixing” this back to dozens of jobs or fork secret paths):
# - Handoff passes force_pass true; Cloud Run workload is unchanged versus false—checks/annotations only
#   (see docs/bmt-pipeline-signal.md). Contrasts with .github/workflows/build-and-test.yml (force_pass false).
# - test/* in on/workflow eligibility is intentional (broader than the core-main build-and-test.yml template).
# - workflow_dispatch from branches other than dev, ci/check-bmt-gate, or test/* runs Snapshot/build placeholders
#   only; Handoff skips (avoid accidental GCP/BMT on random branches).
#
on:
  push:
    branches:
      - dev
      - ci/check-bmt-gate
      - test/*
  pull_request:
    branches:
      - dev
      - ci/check-bmt-gate
      - test/*
  workflow_dispatch:
  workflow_call: {}

defaults:
  run:
    shell: bash

permissions:
  contents: read
  actions: read

concurrency:
  group: ci-${{ github.repository }}-${{ github.event.pull_request.head.ref || github.ref_name }}
  cancel-in-progress: true

jobs:
  repo_snapshot:
    name: Snapshot
    runs-on: ubuntu-22.04
    outputs:
      release_presets: ${{ steps.parse.outputs.release_presets }}
      non_release_presets: ${{ steps.parse.outputs.non_release_presets }}
    steps:
      - name: Checkout source
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          repository: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name || github.repository }}
          ref: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.sha }}
          fetch-depth: 1
          submodules: false
          lfs: false

      - name: Parse CMakePresets.json (capped matrices)
        id: parse
        run: |
          set -euo pipefail
          # Same jq shape as core-main build-and-test.yml; slice caps limit CI runner churn here only.
          presets=$(jq -c '
            [ (.buildPresets // [])[]
              | (.configurePreset // "") as $cfg
              | select($cfg != "")
              | { build: .name
                , configure: $cfg
                , short: (.name | sub("-build$"; ""))
                , is_release: (
                    ($cfg | test("_gcc_Release")) and
                    (($cfg | test("xtensa"; "i")) | not) and
                    (($cfg | test("hexagon"; "i")) | not)
                  )
                , soft_fail: (
                    ($cfg | test("xtensa"; "i")) or
                    ($cfg | test("hexagon"; "i"))
                  )
                }
            ]' CMakePresets.json)
          release_presets=$(echo "$presets" | jq -c '[.[] | select(.is_release)][0:8]')
          non_release_presets=$(echo "$presets" | jq -c '[.[] | select(.is_release | not)][0:12]')
          if ! jq -e 'length > 0' <<<"$release_presets"; then
            echo "::error title=CMakePresets matrices empty::Capped release matrix is empty — check CMakePresets.json filters/buildPresets (self-CI requires both placeholders)."
            exit 1
          fi
          if ! jq -e 'length > 0' <<<"$non_release_presets"; then
            echo "::error title=CMakePresets matrices empty::Capped non-release matrix is empty — check CMakePresets.json filters/buildPresets (self-CI requires both placeholders)."
            exit 1
          fi
          echo "release_presets=$release_presets" >>"$GITHUB_OUTPUT"
          echo "non_release_presets=$non_release_presets" >>"$GITHUB_OUTPUT"

  # Release builds: gate for BMT on core-main. Here: placeholders only (no cmake, no artifacts).
  build_release:
    name: Release
    needs: repo_snapshot
    runs-on: ubuntu-22.04
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJson(needs.repo_snapshot.outputs.release_presets) }}
    steps:
      - name: Release build placeholder (bmt-gcloud)
        run: |
          echo "bmt-gcloud: no firmware build; runner binaries come from GCS. Representative preset matrix leg for ${{ matrix.configure }}."

  # Non-release: parallel smoke legs on core-main; placeholders here (do not gate handoff).
  build_non_release:
    name: Non-Release
    needs: repo_snapshot
    runs-on: ubuntu-22.04
    strategy:
      fail-fast: false
      max-parallel: 6
      matrix:
        include: ${{ fromJson(needs.repo_snapshot.outputs.non_release_presets) }}
    steps:
      - name: Non-release build placeholder (bmt-gcloud)
        run: |
          echo "bmt-gcloud: no firmware build; parallel non-release preset ${{ matrix.configure }} (does not gate BMT)."

  bmt_handoff:
    name: Handoff
    needs: [build_release]
    # Unlike build-and-test.yml handoff we do not use always(); upstream failures skip dependents by default.
    # The skipped arm on needs.build_release matches the template predicate for parity / future always(); runs
    # that matter today use success only.
    # Fork PRs excluded (no WIF secrets). Same-repo PRs only for secret-bearing handoff.
    if: >-
      (needs.build_release.result == 'success' || needs.build_release.result == 'skipped')
      && (
        (github.event_name != 'pull_request' && github.event_name != 'pull_request_target')
        || github.event.pull_request.head.repo.full_name == github.repository
      )
      && (
        (
          (github.event_name == 'pull_request' || github.event_name == 'pull_request_target')
          && (
            github.base_ref == 'dev'
            || github.base_ref == 'ci/check-bmt-gate'
            || startsWith(github.base_ref, 'test/')
          )
        )
        || (
          (github.event_name != 'pull_request' && github.event_name != 'pull_request_target')
          && (
            github.ref_name == 'dev'
            || github.ref_name == 'ci/check-bmt-gate'
            || startsWith(github.ref_name, 'test/')
          )
        )
      )
    permissions:
      contents: read
      actions: read
      id-token: write
      statuses: write
      pull-requests: read
    # `./` resolves this workflow + composites from the triggering ref — required to test handoff edits on PRs.
    # Production / core-main pin: klugman-yanai/bmt-gcloud/.github/workflows/bmt-handoff.yml@bmt-handoff or @bmt-v*
    uses: ./.github/workflows/bmt-handoff.yml
    with:
      cloud_run_region: europe-west4
      bmt_status_context: BMT Gate
      bmt_pex_repo: klugman-yanai/bmt-gcloud
      force_pass: true
