name: Build and Push Docker Image

run-name: "Docker orchestrator · ${{ github.event_name }} · ${{ github.ref_name }} @ ${{ github.sha }}"

on:
  push:
    branches:
      - ci/check-bmt-gate
      - dev
    paths:
      - 'runtime/**'
      - 'runtime/__init__.py'
  workflow_dispatch:

defaults:
  run:
    shell: bash

permissions:
  contents: read
  id-token: write

jobs:
  build-and-push:
    name: Build and Push
    runs-on: ubuntu-22.04
    env:
      GCP_WIF_PROVIDER: ${{ vars.GCP_WIF_PROVIDER }}
      GCP_SA_EMAIL: ${{ vars.GCP_SA_EMAIL }}
      GCP_PROJECT: ${{ vars.GCP_PROJECT }}
      CLOUD_RUN_REGION: ${{ vars.CLOUD_RUN_REGION || 'europe-west4' }}
    steps:
      - name: Checkout source
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: GCP Auth (WIF)
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ env.GCP_WIF_PROVIDER }}
          service_account: ${{ env.GCP_SA_EMAIL }}
          project_id: ${{ env.GCP_PROJECT }}

      - name: Setup Cloud SDK
        uses: google-github-actions/setup-gcloud@v3
        with:
          project_id: ${{ env.GCP_PROJECT }}

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.CLOUD_RUN_REGION }}-docker.pkg.dev --quiet

      - name: Build image
        run: |
          docker build -t bmt-orchestrator:latest -f runtime/Dockerfile .

      - name: Push image
        env:
          IMAGE_BASE: ${{ env.CLOUD_RUN_REGION }}-docker.pkg.dev/${{ env.GCP_PROJECT }}/bmt-images/bmt-orchestrator
          GIT_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail
          docker tag bmt-orchestrator:latest "${IMAGE_BASE}:latest"
          docker tag bmt-orchestrator:latest "${IMAGE_BASE}:${GIT_SHA}"
          docker push "${IMAGE_BASE}:latest"
          docker push "${IMAGE_BASE}:${GIT_SHA}"
          echo "::notice::Pushed ${IMAGE_BASE}:latest and :${GIT_SHA}"
