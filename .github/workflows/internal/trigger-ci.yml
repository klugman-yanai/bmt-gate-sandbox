# Thin trigger — same *shape* as the release template, but for bmt-gcloud:
# - `pull_request` (not `pull_request_target`): same-repo PRs; bases below match build-and-test-dev.
# - `workflow_dispatch`: manual runs from the selected ref.
# Calls `build-and-test-dev.yml` at the PR head (or dispatch ref) so job definitions come from the branch under test.
# The bundle’s `internal/trigger-ci.yml` is still the **template** copy (pull_request_target → build-and-test.yml) for core-main.
name: Trigger CI (from branch)

on:
  workflow_dispatch:
  pull_request:
    branches:
      - dev
      - ci/check-bmt-gate
      - test/*

permissions:
  contents: read
  actions: read

jobs:
  ci:
    name: Run CI from source branch
    runs-on: ubuntu-22.04
    uses: ./.github/workflows/build-and-test-dev.yml@${{ github.event_name == 'pull_request' && github.head_ref || github.ref_name }}
    secrets: inherit
