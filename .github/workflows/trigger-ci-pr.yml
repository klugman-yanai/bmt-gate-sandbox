# Thin trigger — PRs to dev / ci/check-bmt-gate run full CI + BMT handoff.
# Push-only build trigger lives in trigger-ci.yml.
name: CI (PR)

on:
  pull_request:
    branches:
      - dev
      - ci/check-bmt-gate

permissions:
  contents: read
  actions: write
  id-token: write
  statuses: write
  pull-requests: read

jobs:
  # PR CI: release presets only (what BMT/handoff consume). Non-release presets run on push
  # via trigger-ci.yml — a second workflow_call here duplicated snapshots, confused the graph,
  # and any non-release failure failed the whole run even though BMT only needed release.
  build_release:
    name: Build (release)
    uses: ./.github/workflows/build-and-test-dev.yml
    with:
      include_non_release: false
    secrets: inherit

  bmt:
    name: BMT
    needs: [build_release]
    if: >-
      (needs.build_release.result == 'success' || needs.build_release.result == 'skipped')
      && github.event.pull_request.head.repo.full_name == github.repository
    permissions:
      contents: read
      actions: read
      id-token: write
      statuses: write
      pull-requests: read
    uses: ./.github/workflows/bmt-handoff.yml
    with:
      ci_run_id: ${{ github.run_id }}
      head_sha: ${{ github.event.pull_request.head.sha }}
      head_branch: ${{ github.event.pull_request.head.ref }}
      head_event: ${{ github.event_name }}
      pr_number: ${{ format('{0}', github.event.pull_request.number) }}
      use_mock_runner: ${{ github.base_ref == 'ci/check-bmt-gate' }}
      skip_missing_runner_artifacts: true
      cloud_run_region: ${{ vars.CLOUD_RUN_REGION }}
      bmt_status_context: ${{ vars.BMT_STATUS_CONTEXT }}
