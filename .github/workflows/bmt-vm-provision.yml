name: BMT VM Provision

on:
  workflow_dispatch:
    inputs:
      image_name:
        description: "Explicit image name to pin (empty = resolve from family)"
        required: false
        default: ""
      image_family:
        description: "Image family (default: bmt-runtime)"
        required: false
        default: "bmt-runtime"
      bmt_vm_name:
        description: "VM name to create/update"
        required: true
      action:
        description: "Terraform action"
        required: true
        type: choice
        options:
          - plan
          - apply
          - destroy

permissions:
  contents: read
  id-token: write

jobs:
  terraform:
    name: Terraform ${{ inputs.action }}
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Authenticate to GCP
        uses: google-github-actions/auth@7c6bc770dae815cd3e89ee6cdf493a5fab2cc093 # v3
        with:
          workload_identity_provider: ${{ vars.GCP_WIF_PROVIDER }}
          service_account: ${{ vars.GCP_SA_EMAIL }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@aa5489c8933f4cc7a4f7d45035b3b1440c9c10db # v3.0.1

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@b9cd54a3c349d3f38e8881555d616ced269862dd # v3
        with:
          terraform_version: "~> 1.7"

      - name: Enforce runtime image policy
        env:
          GCP_PROJECT: ${{ vars.GCP_PROJECT }}
        run: |
          set -euo pipefail
          expected_family="${BMT_EXPECTED_IMAGE_FAMILY:-bmt-runtime}"
          if [[ "${{ inputs.image_family }}" != "${expected_family}" ]]; then
            echo "::error::image_family must be '${expected_family}', got '${{ inputs.image_family }}'"
            exit 1
          fi
          if [[ -n "${{ inputs.image_name }}" ]]; then
            image_ref="${{ inputs.image_name }}"
            image_name="${image_ref##*/}"
            resolved_family="$(gcloud compute images describe "${image_name}" \
              --project="${GCP_PROJECT}" \
              --format='value(family)')"
            if [[ "${resolved_family}" != "${expected_family}" ]]; then
              echo "::error::image_name '${image_ref}' belongs to family '${resolved_family}', expected '${expected_family}'"
              exit 1
            fi
          fi

      - name: Terraform init
        working-directory: infra/terraform
        run: |
          terraform init \
            -backend-config="bucket=${{ vars.GCS_BUCKET }}" \
            -backend-config="prefix=terraform/${{ inputs.bmt_vm_name }}"

      - name: Terraform plan
        working-directory: infra/terraform
        env:
          TF_VAR_gcp_project: ${{ vars.GCP_PROJECT }}
          TF_VAR_gcp_zone: ${{ vars.GCP_ZONE }}
          TF_VAR_gcs_bucket: ${{ vars.GCS_BUCKET }}
          TF_VAR_bmt_vm_name: ${{ inputs.bmt_vm_name }}
          TF_VAR_image_family: ${{ inputs.image_family }}
          TF_VAR_image_name: ${{ inputs.image_name }}
          TF_VAR_service_account: ${{ vars.GCP_SA_EMAIL }}
          TF_VAR_startup_wrapper_script_path: ../../.github/bmt/cli/resources/startup_entrypoint.sh
        run: terraform plan -out=tfplan

      - name: Terraform apply
        if: inputs.action == 'apply'
        working-directory: infra/terraform
        run: terraform apply -auto-approve tfplan

      - name: Update BMT_VM_NAME repo variable after apply
        if: inputs.action == 'apply'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh variable set BMT_VM_NAME \
            --repo "${{ github.repository }}" \
            --body "${{ inputs.bmt_vm_name }}"
          echo "Updated BMT_VM_NAME=${{ inputs.bmt_vm_name }}"

      - name: Terraform destroy (requires explicit action=destroy)
        if: inputs.action == 'destroy'
        working-directory: infra/terraform
        run: |
          echo "::warning::Destroying VM ${{ inputs.bmt_vm_name }}"
          terraform apply -destroy -auto-approve tfplan
