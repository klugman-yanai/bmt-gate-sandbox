name: BMT
run-name: "BMT Handoff • ${{ inputs.head_branch || github.event.inputs.head_branch }} • ${{ inputs.head_sha || github.event.inputs.head_sha || github.sha }}"

on:
  workflow_dispatch:
    inputs:
      ci_run_id:
        description: "Caller run ID (artifact download)"
        required: true
      head_sha:
        description: "Commit SHA to run BMT for"
        required: true
      head_branch:
        description: "Branch name"
        required: true
      head_event:
        description: "push or pull_request"
        required: false
        default: "push"
      pr_number:
        description: "PR number when head_event is pull_request"
        required: false
      available_artifacts:
        description: "JSON array of runner artifact names (e.g. [\"runner-sk_gcc_release\"]) so uploads without artifact show as Skipped"
        required: false
        default: "[]"
  workflow_call:
    inputs:
      ci_run_id:
        description: "Caller run ID (artifact download)"
        required: true
        type: string
      head_sha:
        description: "Commit SHA to run BMT for"
        required: true
        type: string
      head_branch:
        description: "Branch name"
        required: true
        type: string
      head_event:
        description: "push or pull_request"
        required: false
        type: string
        default: "push"
      pr_number:
        description: "PR number when head_event is pull_request"
        required: false
        type: string
        default: ""
      available_artifacts:
        description: "JSON array of runner artifact names (e.g. [\"runner-sk_gcc_release\"]) so uploads without artifact show as Skipped"
        required: false
        type: string
        default: "[]"
    outputs:
      bmt_gate_passed:
        description: "Handoff succeeded (write-summary ran)."
        value: ${{ jobs.bmt-outcome.outputs.bmt_gate_passed }}
      bmt_fallback_run:
        description: "Failure-fallback ran."
        value: ${{ jobs.bmt-outcome.outputs.bmt_fallback_run }}

concurrency:
  group: bmt-${{ github.repository }}-${{ inputs.head_branch || github.event.inputs.head_branch || github.ref_name || github.sha }}
  cancel-in-progress: true

env:
  GCS_BUCKET: ${{ vars.GCS_BUCKET }}
  GCP_WIF_PROVIDER: ${{ vars.GCP_WIF_PROVIDER }}
  GCP_SA_EMAIL: ${{ vars.GCP_SA_EMAIL }}
  GCP_PROJECT: ${{ vars.GCP_PROJECT }}
  GCP_ZONE: ${{ vars.GCP_ZONE }}
  BMT_VM_NAME: ${{ vars.BMT_VM_NAME }}
  BMT_VM_POOL: ${{ vars.BMT_VM_POOL }}  # recommend at least 2 VMs; second stays off until needed; 3rd run gets "No BMT VM is available"
  BMT_PROJECTS: ${{ vars.BMT_PROJECTS }}
  BMT_STATUS_CONTEXT: ${{ vars.BMT_STATUS_CONTEXT }}
  BMT_RUNTIME_CONTEXT: ${{ vars.BMT_RUNTIME_CONTEXT }}
  # Cloud Run (future): uncomment when used
  # BMT_RUNTIME_BACKEND: ${{ vars.BMT_RUNTIME_BACKEND }}
  # BMT_CLOUD_RUN_JOB: ${{ vars.BMT_CLOUD_RUN_JOB }}
  # BMT_CLOUD_RUN_REGION: ${{ vars.BMT_CLOUD_RUN_REGION }}
  BMT_HANDSHAKE_TIMEOUT_SEC: ${{ vars.BMT_HANDSHAKE_TIMEOUT_SEC }}

permissions:
  contents: read
  actions: read

jobs:
  # Success: prepare → upload-runners → handoff (classify + run + summary).
  # Failure: prepare or handoff fails → Gate runs fallback (post status, cleanup) then sets outputs.
  # Gate (bmt-outcome) always runs after handoff and sets workflow outputs.
  prepare:
    name: Prepare
    runs-on: ubuntu-22.04
    permissions:
      contents: read
      actions: read
      id-token: write
    outputs:
      run_id: ${{ steps.prepare.outputs.run_id }}
      head_sha: ${{ steps.prepare.outputs.head_sha }}
      head_branch: ${{ steps.prepare.outputs.head_branch }}
      head_event: ${{ steps.prepare.outputs.head_event }}
      pr_number: ${{ steps.prepare.outputs.pr_number }}
      run_context: ${{ steps.run-context.outputs.run_context }}
      runner_matrix: ${{ steps.prepare.outputs.runner_matrix }}
      matrix_need_upload: ${{ steps.filter.outputs.matrix_need_upload }}
      matrix_need_upload_keys: ${{ steps.filter.outputs.matrix_need_upload_keys }}
    steps:
      - name: Checkout repo (for local actions)
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
        with:
          ref: ${{ inputs.head_sha || github.event.inputs.head_sha || github.sha }}
          fetch-depth: 1
          sparse-checkout: .github

      - uses: ./.github/actions/bmt-job-setup
        with:
          ref: ${{ inputs.head_sha || github.event.inputs.head_sha || github.sha }}
          run-id: ${{ inputs.ci_run_id || github.event.inputs.ci_run_id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - id: prepare
        uses: ./.github/actions/bmt-prepare
        with:
          ci_run_id: ${{ inputs.ci_run_id || github.event.inputs.ci_run_id }}
          head_sha: ${{ inputs.head_sha || github.event.inputs.head_sha || github.sha }}
          head_branch: ${{ inputs.head_branch || github.event.inputs.head_branch }}
          head_event: ${{ inputs.head_event || github.event.inputs.head_event || 'push' }}
          pr_number: ${{ inputs.pr_number || github.event.inputs.pr_number }}

      - name: Set run context
        id: run-context
        shell: bash
        run: |
          pr_number="${{ inputs.pr_number || github.event.inputs.pr_number || '' }}"
          head_event="${{ inputs.head_event || github.event.inputs.head_event || 'push' }}"
          if [[ -n "${pr_number// /}" ]]; then
            echo "run_context=pr" >> "$GITHUB_OUTPUT"
          elif [[ "$head_event" == "pull_request" || "$head_event" == "pull_request_target" ]]; then
            echo "run_context=pr" >> "$GITHUB_OUTPUT"
          else
            echo "run_context=dev" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup GCP and uv
        uses: ./.github/actions/setup-gcp-uv
        with:
          workload_identity_provider: ${{ env.GCP_WIF_PROVIDER }}
          service_account: ${{ env.GCP_SA_EMAIL }}
          python_version: "3.12"

      - id: filter
        env:
          GCS_BUCKET: ${{ env.GCS_BUCKET }}
          RUNNER_MATRIX: ${{ steps.prepare.outputs.runner_matrix }}
          HEAD_SHA: ${{ steps.prepare.outputs.head_sha }}
          GITHUB_RUN_ID: ${{ github.run_id }}
          AVAILABLE_ARTIFACTS: ${{ inputs.available_artifacts || '[]' }}
        run: uv run --project .github/bmt bmt filter-upload-matrix

      - name: Workflow summary notice
        run: echo "::notice::BMT result will appear in the PR Checks tab and Comments, not in this workflow summary."
  upload-runners:
    name: Upload • ${{ matrix.project }}
    needs: prepare
    runs-on: ubuntu-22.04
    continue-on-error: true
    permissions:
      contents: read
      actions: read
      id-token: write
    strategy:
      fail-fast: false
      max-parallel: 3
      matrix: ${{ fromJson(needs.prepare.outputs.matrix_need_upload) }}
    steps:
      - name: Checkout repo (for local actions)
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
        with:
          ref: ${{ inputs.head_sha || github.event.inputs.head_sha || github.sha }}
          fetch-depth: 1
          sparse-checkout: .github

      - uses: ./.github/actions/bmt-job-setup
        with:
          ref: ${{ inputs.head_sha || github.event.inputs.head_sha || github.sha }}
          run-id: ${{ needs.prepare.outputs.run_id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Download runner artifact
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          # Produced by caller build-and-test.yml build-release job (one artifact runner-<preset> per preset).
          name: runner-${{ matrix.preset }}
          path: artifact
          run-id: ${{ needs.prepare.outputs.run_id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: true
        id: download

      - name: Warn and skip if artifact missing
        if: steps.download.outcome == 'failure'
        run: |
          echo "::warning::Runner upload skipped for ${{ matrix.project }} (${{ matrix.preset }}): artifact not found or download failed. BMT will continue with other runners."
          echo "upload_ok=false" >> "$GITHUB_OUTPUT"

      - name: Setup GCP and uv
        if: steps.download.outcome == 'success'
        uses: ./.github/actions/setup-gcp-uv
        with:
          workload_identity_provider: ${{ env.GCP_WIF_PROVIDER }}
          service_account: ${{ env.GCP_SA_EMAIL }}
          python_version: "3.12"

      - name: Upload runner to GCS
        if: steps.download.outcome == 'success'
        id: upload
        env:
          PROJECT: ${{ matrix.project }}
          PRESET: ${{ matrix.preset }}
          SOURCE_REF: ${{ needs.prepare.outputs.head_sha }}
        run: uv run --project .github/bmt bmt upload-runner-to-gcs
        continue-on-error: true

      - name: Warn if GCS upload failed
        if: steps.download.outcome == 'success' && steps.upload.outcome == 'failure'
        run: |
          echo "::warning::Runner upload failed for ${{ matrix.project }} (${{ matrix.preset }}). BMT will continue with other runners."

      - name: Record uploaded project marker
        if: steps.download.outcome == 'success' && steps.upload.outcome == 'success'
        run: |
          echo '{}' | gsutil cp - "gs://${GCS_BUCKET}/runtime/_workflow/uploaded/${{ github.run_id }}/${{ matrix.project }}.json"

  handoff:
    name: Handoff
    needs: [prepare, upload-runners]
    runs-on: ubuntu-22.04
    permissions:
      contents: read
      actions: read
      id-token: write
    outputs:
      # Step-level results for failure-fallback diagnostics
      classify_result: ${{ steps.classify.outcome || 'skipped' }}
      handoff_result: ${{ steps.run.outcome || 'skipped' }}
      # Classify outputs
      classify_path: ${{ steps.classify.outputs.path || 'unknown' }}
      has_legs: ${{ steps.classify.outputs.has_legs || 'false' }}
      accepted_projects: ${{ steps.classify.outputs.accepted_projects || '[]' }}
      filtered_matrix: ${{ steps.classify.outputs.filtered_matrix || '{"include":[]}' }}
      # Handoff-run outputs
      selected_vm: ${{ steps.run.outputs.selected_vm || '' }}
      trigger_written: ${{ steps.run.outputs.trigger_written || 'false' }}
      handshake_ok: ${{ steps.run.outputs.handshake_ok || 'false' }}
      handshake_uri: ${{ steps.run.outputs.handshake_uri || '' }}
      vm_started: ${{ steps.run.outputs.vm_started || 'false' }}
      handoff_reason: ${{ steps.run.outputs.handoff_reason || '' }}
    steps:
      - name: Checkout repo (for local actions)
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
        with:
          ref: ${{ inputs.head_sha || github.event.inputs.head_sha || github.sha }}
          fetch-depth: 1
          sparse-checkout: .github

      - uses: ./.github/actions/bmt-job-setup
        with:
          ref: ${{ inputs.head_sha || github.event.inputs.head_sha || github.sha }}
          run-id: ${{ needs.prepare.outputs.run_id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - id: classify
        uses: ./.github/actions/bmt-classify-handoff
        with:
          head_sha: ${{ needs.prepare.outputs.head_sha }}
          runner_matrix: ${{ needs.prepare.outputs.runner_matrix }}
          workload_identity_provider: ${{ env.GCP_WIF_PROVIDER }}
          service_account: ${{ env.GCP_SA_EMAIL }}

      - id: run
        uses: ./.github/actions/bmt-handoff-run
        with:
          head_sha: ${{ needs.prepare.outputs.head_sha }}
          head_branch: ${{ needs.prepare.outputs.head_branch }}
          head_event: ${{ needs.prepare.outputs.head_event }}
          pr_number: ${{ needs.prepare.outputs.pr_number }}
          run_context: ${{ needs.prepare.outputs.run_context }}
          filtered_matrix: ${{ steps.classify.outputs.filtered_matrix }}
          runner_matrix: ${{ needs.prepare.outputs.runner_matrix }}
          accepted_projects: ${{ steps.classify.outputs.accepted_projects }}
          workload_identity_provider: ${{ env.GCP_WIF_PROVIDER }}
          service_account: ${{ env.GCP_SA_EMAIL }}
          gcp_project: ${{ env.GCP_PROJECT }}
          gcp_zone: ${{ env.GCP_ZONE }}
          gcs_bucket: ${{ env.GCS_BUCKET }}
      # No separate write-summary step needed; bmt-handoff-run already writes
      # the handoff summary internally (bmt-write-summary with if: always()).

  bmt-outcome:
    name: Gate
    needs: [prepare, handoff]
    if: always()
    runs-on: ubuntu-22.04
    permissions:
      contents: read
      actions: read
      id-token: write
      statuses: write
    env:
      BMT_VM_NAME: ${{ needs.handoff.outputs.selected_vm || vars.BMT_VM_NAME }}
    outputs:
      bmt_gate_passed: ${{ steps.outcome.outputs.bmt_gate_passed }}
      bmt_fallback_run: ${{ steps.outcome.outputs.bmt_fallback_run }}
    steps:
      - name: Checkout repo (for local actions)
        if: >-
          always() && needs.prepare.result != 'cancelled' && needs.handoff.result != 'cancelled'
          && (needs.prepare.result == 'failure' || needs.handoff.result == 'failure')
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
        with:
          ref: ${{ inputs.head_sha || github.event.inputs.head_sha || github.sha }}
          fetch-depth: 1
          sparse-checkout: .github

      - uses: ./.github/actions/bmt-job-setup
        if: >-
          always() && needs.prepare.result != 'cancelled' && needs.handoff.result != 'cancelled'
          && (needs.prepare.result == 'failure' || needs.handoff.result == 'failure')
        with:
          ref: ${{ inputs.head_sha || github.event.inputs.head_sha || github.sha }}
          run-id: ${{ inputs.ci_run_id || github.event.inputs.ci_run_id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Build diagnostic context from merged handoff outputs
        if: >-
          always() && needs.prepare.result != 'cancelled' && needs.handoff.result != 'cancelled'
          && (needs.prepare.result == 'failure' || needs.handoff.result == 'failure')
        id: ctx
        shell: bash
        env:
          CLASSIFY_PATH: ${{ needs.handoff.outputs.classify_path || 'unknown' }}
          HAS_LEGS: ${{ needs.handoff.outputs.has_legs || 'false' }}
          ACCEPTED_PROJECTS: ${{ needs.handoff.outputs.accepted_projects || '[]' }}
          FILTERED_MATRIX: ${{ needs.handoff.outputs.filtered_matrix || '{"include":[]}' }}
          TRIGGER_WRITTEN: ${{ needs.handoff.outputs.trigger_written || 'false' }}
          VM_STARTED: ${{ needs.handoff.outputs.vm_started || 'false' }}
          HANDSHAKE_OK: ${{ needs.handoff.outputs.handshake_ok || 'false' }}
          HANDSHAKE_URI: ${{ needs.handoff.outputs.handshake_uri || '' }}
          HANDOFF_REASON: ${{ needs.handoff.outputs.handoff_reason || '' }}
        run: |
          echo "classify_outputs=$(jq -nc --arg path "$CLASSIFY_PATH" --arg has_legs "$HAS_LEGS" \
            --argjson accepted "$ACCEPTED_PROJECTS" --argjson matrix "$FILTERED_MATRIX" \
            '{path:$path, has_legs:$has_legs, accepted_projects:$accepted, filtered_matrix:$matrix}')" >> "$GITHUB_OUTPUT"
          echo "handoff_outputs=$(jq -nc --arg tw "$TRIGGER_WRITTEN" --arg vs "$VM_STARTED" --arg ho "$HANDSHAKE_OK" \
            --arg hu "$HANDSHAKE_URI" --arg hr "$HANDOFF_REASON" \
            '{trigger_written:$tw, vm_started:$vs, handshake_ok:$ho, handshake_uri:$hu, handoff_reason:$hr}')" >> "$GITHUB_OUTPUT"

      - name: Failure fallback
        if: >-
          always() && needs.prepare.result != 'cancelled' && needs.handoff.result != 'cancelled'
          && (needs.prepare.result == 'failure' || needs.handoff.result == 'failure')
        uses: ./.github/actions/bmt-failure-fallback
        with:
          prepare_result: ${{ needs.prepare.result }}
          prepare_outputs: ${{ toJson(needs.prepare.outputs) }}
          classify_result: ${{ needs.handoff.outputs.classify_result }}
          classify_outputs: ${{ steps.ctx.outputs.classify_outputs }}
          handoff_result: ${{ needs.handoff.outputs.handoff_result == 'skipped' && 'success' || needs.handoff.outputs.handoff_result }}
          handoff_outputs: ${{ steps.ctx.outputs.handoff_outputs }}
          dispatch_head_sha: ${{ inputs.head_sha || github.event.inputs.head_sha }}
          dispatch_pr_number: ${{ inputs.pr_number || github.event.inputs.pr_number }}
          fallback_ref: ${{ github.sha }}
          workload_identity_provider: ${{ env.GCP_WIF_PROVIDER }}
          service_account: ${{ env.GCP_SA_EMAIL }}
          bmt_status_context: ${{ vars.BMT_STATUS_CONTEXT }}

      - id: outcome
        run: |
          echo "bmt_gate_passed=${{ needs.handoff.result == 'success' }}" >> "$GITHUB_OUTPUT"
          echo "bmt_fallback_run=${{ needs.prepare.result != 'cancelled' && needs.handoff.result != 'cancelled' && (needs.prepare.result == 'failure' || needs.handoff.result == 'failure') }}" >> "$GITHUB_OUTPUT"
