# BMT workflow: runs after CI (dummy or real build). Triggered by CI via workflow_dispatch.
name: BMT
run-name: "BMT • ${{ github.event.inputs.head_branch }} • ${{ github.event.inputs.head_sha }}"

on:
  workflow_dispatch:
    inputs:
      ci_run_id:
        description: "CI workflow run ID (for artifact download)"
        required: true
      head_sha:
        description: "Head commit SHA"
        required: true
      head_branch:
        description: "Head branch name"
        required: true
      head_event:
        description: "Event that triggered CI (pull_request or push)"
        required: false
        default: "push"
      pr_number:
        description: "PR number (if head_event is pull_request)"
        required: false

concurrency:
  group: bmt-${{ github.event.inputs.head_sha }}

permissions:
  contents: read
  id-token: write
  statuses: write
  actions: read
  checks: write

env:
  GCS_BUCKET: ${{ vars.GCS_BUCKET }}
  GCP_WIF_PROVIDER: ${{ vars.GCP_WIF_PROVIDER }}
  GCP_SA_EMAIL: ${{ vars.GCP_SA_EMAIL }}
  GCP_ZONE: ${{ vars.GCP_ZONE }}
  BMT_VM_NAME: ${{ vars.BMT_VM_NAME }}
  BMT_STATUS_CONTEXT: ${{ vars.BMT_STATUS_CONTEXT }}
  BMT_DESCRIPTION_PENDING: ${{ vars.BMT_DESCRIPTION_PENDING }}
  BMT_PROJECTS: ${{ vars.BMT_PROJECTS }}
  BMT_HANDSHAKE_TIMEOUT_SEC: ${{ vars.BMT_HANDSHAKE_TIMEOUT_SEC }}
  PYTHONPATH: .github/scripts

jobs:
  # ─────────────────── Resolve context (from workflow_dispatch inputs) ───────────────────
  bmt-context:
    name: Resolve context
    runs-on: ubuntu-22.04
    outputs:
      run_id: ${{ steps.ctx.outputs.run_id }}
      head_sha: ${{ steps.ctx.outputs.head_sha }}
      head_branch: ${{ steps.ctx.outputs.head_branch }}
      head_event: ${{ steps.ctx.outputs.head_event }}
      pr_number: ${{ steps.ctx.outputs.pr_number }}
    steps:
      - id: ctx
        run: |
          echo "run_id=${{ github.event.inputs.ci_run_id }}" >>"$GITHUB_OUTPUT"
          echo "head_sha=${{ github.event.inputs.head_sha }}" >>"$GITHUB_OUTPUT"
          echo "head_branch=${{ github.event.inputs.head_branch }}" >>"$GITHUB_OUTPUT"
          echo "head_event=${{ github.event.inputs.head_event }}" >>"$GITHUB_OUTPUT"
          echo "pr_number=${{ github.event.inputs.pr_number }}" >>"$GITHUB_OUTPUT"

  # ─────────────────── 00 Guard ───────────────────
  guard:
    name: 00 Guard
    needs: bmt-context
    runs-on: ubuntu-22.04
    steps:
      - run: echo "Proceeding with BMT"

  # ─────────────────── 01 Matrix: which BMTs requested (from presets; filtered by BMT_PROJECTS) ───────────────────
  extract-bmt-presets:
    name: 01 Matrix (BMTs requested)
    needs: [guard, bmt-context]
    runs-on: ubuntu-22.04
    outputs:
      runner-matrix: ${{ steps.parse.outputs.runner_matrix }}
    steps:
      - name: Checkout (source branch)
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.bmt-context.outputs.head_sha }}

      - name: Parse gcc_Release presets (filtered by BMT_PROJECTS; default sk for test env)
        id: parse
        run: |
          ALLOWED="${BMT_PROJECTS:-sk}"
          ALLOWED_JSON=$(echo "$ALLOWED" | jq -Rc 'split(",") | map(gsub("^ +| +$"; "") | ascii_downcase)')
          runner_matrix=$(jq -c --argjson allowed "$ALLOWED_JSON" '
            { include:
              [ .configurePresets[]
                | select(.name | test("_gcc_Release$"))
                | select(.name | test("xtensa|hexagon") | not)
                | (.name | sub("_gcc_Release$"; "") | ascii_downcase) as $proj
                | select($allowed | index($proj))
                | { configure: .name,
                    preset: (.name | ascii_downcase),
                    project: $proj,
                    binary_dir: (.binaryDir | sub("\\$\\{sourceDir\\}/"; "")) }
              ] }' CMakePresets.json)
          echo "runner_matrix=$runner_matrix" >>"$GITHUB_OUTPUT"
          echo "::notice::Runner matrix (BMT_PROJECTS=${ALLOWED}): $runner_matrix"

  # ─────────────────── 02 GCP auth + runners pushed to GCS (from build artifacts) ───────────────────
  # On artifact download or upload failure we warn and continue; only successfully uploaded runners are used for the trigger.
  upload-runners:
    name: 02 Auth & Runners ${{ matrix.project }}
    needs: [extract-bmt-presets, bmt-context]
    runs-on: ubuntu-22.04
    continue-on-error: true
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.extract-bmt-presets.outputs.runner-matrix) }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.bmt-context.outputs.head_sha }}

      - name: Download runner artifact
        uses: actions/download-artifact@v4
        with:
          name: runner-${{ matrix.preset }}
          path: artifact
          run-id: ${{ needs.bmt-context.outputs.run_id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: true
        id: download

      - name: Warn and skip if artifact missing
        if: steps.download.outcome == 'failure'
        run: |
          echo "::warning::Runner upload skipped for ${{ matrix.project }} (${{ matrix.preset }}): artifact not found or download failed. BMT will continue with other runners."
          echo "upload_ok=false" >>"$GITHUB_OUTPUT"

      - name: GCP Auth (WIF)
        if: steps.download.outcome == 'success'
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ env.GCP_WIF_PROVIDER }}
          service_account: ${{ env.GCP_SA_EMAIL }}

      - name: Setup Cloud SDK
        if: steps.download.outcome == 'success'
        uses: google-github-actions/setup-gcloud@v2

      - name: Install uv
        if: steps.download.outcome == 'success'
        uses: astral-sh/setup-uv@v4

      - name: Upload runner to GCS
        if: steps.download.outcome == 'success'
        id: upload
        run: |
          set -euo pipefail
          # CI upload-artifact uses LCA of paths as artifact root, so we get artifact/Runners and artifact/Kardome
          RUNNER_DIR="artifact/Runners"
          LIB_DIR="artifact/Kardome"

          LIB_ARG=""
          if [ -d "$LIB_DIR" ]; then
            LIB_ARG="--lib-dir $LIB_DIR"
          fi

          chmod +x "$RUNNER_DIR/kardome_runner" 2>/dev/null || true

          uv run python ./.github/scripts/ci_driver.py upload-runner \
            --bucket "$GCS_BUCKET" \
            --bucket-prefix "${BMT_BUCKET_PREFIX:-}" \
            --runner-dir "$RUNNER_DIR" \
            $LIB_ARG \
            --project "${{ matrix.project }}" \
            --preset "${{ matrix.preset }}" \
            --source-ref "${{ needs.bmt-context.outputs.head_sha }}"
        continue-on-error: true

      - name: Warn if GCS upload failed
        if: steps.download.outcome == 'success' && steps.upload.outcome == 'failure'
        run: |
          echo "::warning::Runner upload failed for ${{ matrix.project }} (${{ matrix.preset }}). BMT will continue with other runners."

      - name: Record uploaded project (marker for send-run-payload)
        if: steps.download.outcome == 'success' && steps.upload.outcome == 'success'
        run: |
          BKT="${GCS_BUCKET}"
          PREF="${BMT_BUCKET_PREFIX:-}"
          ROOT="gs://${BKT}"
          [ -n "$PREF" ] && ROOT="${ROOT}/${PREF}"
          echo '{}' | gcloud storage cp - "${ROOT}/_workflow/uploaded/${{ github.run_id }}/${{ matrix.project }}.json"

  # ─────────────────── Resolve which runners were uploaded (for trigger filtering) ───────────────────
  resolve-uploaded-projects:
    name: 02b Resolve uploaded runners
    needs: [upload-runners, bmt-context]
    runs-on: ubuntu-22.04
    outputs:
      accepted_projects: ${{ steps.list.outputs.accepted_projects }}
    steps:
      - name: GCP Auth (WIF)
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ env.GCP_WIF_PROVIDER }}
          service_account: ${{ env.GCP_SA_EMAIL }}

      - name: Setup Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: List uploaded project markers
        id: list
        run: |
          ROOT="gs://${GCS_BUCKET}"
          [ -n "${BMT_BUCKET_PREFIX:-}" ] && ROOT="${ROOT}/${BMT_BUCKET_PREFIX}"
          PREFIX="${ROOT}/_workflow/uploaded/${{ github.run_id }}/"
          if gcloud storage ls "$PREFIX" 2>/dev/null | grep -q '\.json$'; then
            gcloud storage ls "$PREFIX" 2>/dev/null | sed 's|.*/||;s|\.json$||' | jq -Rsc 'split("\n") | map(select(length>0)) | sort' > accepted.txt
          else
            echo '[]' > accepted.txt
          fi
          echo "accepted_projects=$(cat accepted.txt)" >>"$GITHUB_OUTPUT"
          echo "::notice::Runners uploaded for projects: $(cat accepted.txt)"

  # ─────────────────── 03 Handshake begin (trigger written to GCS) ───────────────────
  send-run-payload:
    name: 03 Handshake begin (trigger to GCS)
    needs: [upload-runners, extract-bmt-presets, bmt-context, resolve-uploaded-projects]
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.bmt-context.outputs.head_sha }}

      - name: GCP Auth (WIF)
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ env.GCP_WIF_PROVIDER }}
          service_account: ${{ env.GCP_SA_EMAIL }}

      - name: Setup Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Build BMT matrix
        id: matrix
        run: uv run python ./.github/scripts/ci_driver.py matrix --config-root remote --project-filter "${BMT_PROJECTS:-}"

      - name: Filter matrix to supported runners only
        id: filter
        env:
          FULL_MATRIX: ${{ steps.matrix.outputs.matrix }}
          ACCEPTED_PROJECTS: ${{ needs.resolve-uploaded-projects.outputs.accepted_projects }}
        run: |
          set -euo pipefail
          echo "$FULL_MATRIX" > /tmp/full.json
          echo "$ACCEPTED_PROJECTS" > /tmp/accepted.json
          FILTERED=$(jq -c --slurpfile acc /tmp/accepted.json '.include = [.include[] | select(.project as $p | $acc[0] | index($p))]' /tmp/full.json)
          echo "matrix<<EOMATRIX" >>"$GITHUB_OUTPUT"
          echo "$FILTERED" >>"$GITHUB_OUTPUT"
          echo "EOMATRIX" >>"$GITHUB_OUTPUT"
          LEGS=$(echo "$FILTERED" | jq '.include | length')
          if [ "$LEGS" -eq 0 ]; then
            echo "::error::No runners were uploaded successfully; cannot trigger BMT."
            exit 1
          fi
          echo "::notice::Triggering BMT for $LEGS leg(s) (supported runners only)."

      - name: Show BMT matrix handshake
        env:
          RUNNER_MATRIX: ${{ needs.extract-bmt-presets.outputs.runner-matrix }}
          ACCEPTED: ${{ needs.resolve-uploaded-projects.outputs.accepted_projects }}
          FILTERED_MATRIX: ${{ steps.filter.outputs.matrix }}
        run: |
          set -euo pipefail
          echo "$RUNNER_MATRIX" > /tmp/runner_matrix.json
          echo "$FILTERED_MATRIX" > /tmp/filtered_matrix.json
          REQUESTED=$(jq -c '[.include[].project] | unique | sort' /tmp/runner_matrix.json)
          BMT_LEGS=$(jq -c '[.include[].project] | unique | sort' /tmp/filtered_matrix.json)

          echo "## BMT Matrix Handshake" >>"$GITHUB_STEP_SUMMARY"
          echo "" >>"$GITHUB_STEP_SUMMARY"
          echo "| Project | Runner uploaded | BMT leg | Status |" >>"$GITHUB_STEP_SUMMARY"
          echo "|---------|----------------|--------|--------|" >>"$GITHUB_STEP_SUMMARY"
          for proj in $(echo "$REQUESTED" | jq -r '.[]'); do
            UP=$(echo "$ACCEPTED" | jq -e --arg p "$proj" 'index($p)' >/dev/null && echo "✓" || echo "⚠ skipped")
            LEG=$(echo "$BMT_LEGS" | jq -e --arg p "$proj" 'index($p)' >/dev/null && echo "✓" || echo "-")
            if [ "$LEG" = "✓" ]; then
              echo "| $proj | $UP | $LEG | Will run |" >>"$GITHUB_STEP_SUMMARY"
            else
              echo "| $proj | $UP | $LEG | $([ "$UP" = "⚠ skipped" ] && echo "Upload failed/warning" || echo "No BMT config") |" >>"$GITHUB_STEP_SUMMARY"
            fi
          done
          echo "" >>"$GITHUB_STEP_SUMMARY"
          echo "**Runners uploaded (supported):** $(echo "$ACCEPTED" | jq 'length')" >>"$GITHUB_STEP_SUMMARY"
          echo "**BMT legs to run:** $(echo "$BMT_LEGS" | jq 'length')" >>"$GITHUB_STEP_SUMMARY"

      - name: Write run trigger to GCS
        id: trigger
        run: |
          set -euo pipefail
          PR_ARGS=""
          if [ "${{ needs.bmt-context.outputs.head_event }}" = "pull_request" ] && [ -n "${{ needs.bmt-context.outputs.pr_number }}" ]; then
            PR_ARGS="--pr-number ${{ needs.bmt-context.outputs.pr_number }}"
          fi

          uv run python ./.github/scripts/ci_driver.py trigger \
            --config-root remote \
            --bucket "$GCS_BUCKET" \
            --bucket-prefix "${BMT_BUCKET_PREFIX:-}" \
            --matrix-json '${{ steps.filter.outputs.matrix }}' \
            --run-context "${{ needs.bmt-context.outputs.head_event == 'pull_request' && 'pr' || 'dev' }}" \
            $PR_ARGS

  # ─────────────────── 04 VM woken up ───────────────────
  start-vm:
    name: 04 VM woken up
    needs: [send-run-payload, bmt-context]
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.bmt-context.outputs.head_sha }}

      - name: GCP Auth (WIF)
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ env.GCP_WIF_PROVIDER }}
          service_account: ${{ env.GCP_SA_EMAIL }}

      - name: Setup Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Start BMT VM
        run: uv run python ./.github/scripts/ci_driver.py start-vm

  # ─────────────────── 05 Matrix: accepted vs unsupported (VM handshake response) ───────────────────
  vm-handshake:
    name: 05 Matrix accepted vs unsupported
    needs: [send-run-payload, start-vm, bmt-context]
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.bmt-context.outputs.head_sha }}

      - name: GCP Auth (WIF)
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ env.GCP_WIF_PROVIDER }}
          service_account: ${{ env.GCP_SA_EMAIL }}

      - name: Setup Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: How to check VM behavior
        run: |
          TIMEOUT="${BMT_HANDSHAKE_TIMEOUT_SEC:-180}"
          ACK_URI="gs://${GCS_BUCKET}/${BMT_BUCKET_PREFIX:+$BMT_BUCKET_PREFIX/}triggers/acks/${{ github.run_id }}.json"
          TRIGGER_URI="gs://${GCS_BUCKET}/${BMT_BUCKET_PREFIX:+$BMT_BUCKET_PREFIX/}triggers/runs/${{ github.run_id }}.json"
          echo "## VM handshake timeout: ${TIMEOUT}s (set repo var BMT_HANDSHAKE_TIMEOUT_SEC to override)" >>"$GITHUB_STEP_SUMMARY"
          echo "" >>"$GITHUB_STEP_SUMMARY"
          echo "### Check VM / GCS while waiting" >>"$GITHUB_STEP_SUMMARY"
          echo "- **Trigger file** (VM reads this): \`$TRIGGER_URI\`" >>"$GITHUB_STEP_SUMMARY"
          echo "- **Ack file** (VM writes this when ready): \`$ACK_URI\`" >>"$GITHUB_STEP_SUMMARY"
          echo "- **GCS:** \`gcloud storage cat \"$ACK_URI\"\` (after VM writes ack)" >>"$GITHUB_STEP_SUMMARY"
          echo "- **VM serial output:** \`gcloud compute instances get-serial-port-output $BMT_VM_NAME --zone=$GCP_ZONE\`" >>"$GITHUB_STEP_SUMMARY"
          echo "- **Local TUI monitor:** \`uv run python devtools/live_monitor.py --run-id ${{ github.run_id }} --bucket $GCS_BUCKET\`" >>"$GITHUB_STEP_SUMMARY"

      - name: Wait for VM handshake ack
        id: handshake
        run: |
          set -euo pipefail
          TIMEOUT="${BMT_HANDSHAKE_TIMEOUT_SEC:-180}"
          uv run python ./.github/scripts/ci_driver.py wait-handshake \
            --bucket "$GCS_BUCKET" \
            --bucket-prefix "${BMT_BUCKET_PREFIX:-}" \
            --workflow-run-id "${{ github.run_id }}" \
            --timeout-sec "$TIMEOUT" \
            --poll-interval-sec 5

      - name: Show VM handshake summary
        run: |
          set -euo pipefail
          ACK_PAYLOAD='${{ steps.handshake.outputs.handshake_payload }}'
          echo "## VM Handshake Response" >>"$GITHUB_STEP_SUMMARY"
          echo "" >>"$GITHUB_STEP_SUMMARY"
          echo "- Ack URI: \`${{ steps.handshake.outputs.handshake_uri }}\`" >>"$GITHUB_STEP_SUMMARY"
          echo "- Requested legs: **${{ steps.handshake.outputs.handshake_requested_leg_count }}**" >>"$GITHUB_STEP_SUMMARY"
          echo "- Accepted legs: **${{ steps.handshake.outputs.handshake_accepted_leg_count }}**" >>"$GITHUB_STEP_SUMMARY"
          echo "" >>"$GITHUB_STEP_SUMMARY"
          echo "| Project | BMT ID | Run ID |" >>"$GITHUB_STEP_SUMMARY"
          echo "|---------|--------|--------|" >>"$GITHUB_STEP_SUMMARY"
          echo "$ACK_PAYLOAD" | jq -r '.accepted_legs[] | "| \(.project) | \(.bmt_id) | \(.run_id) |"' >>"$GITHUB_STEP_SUMMARY"
          if echo "$ACK_PAYLOAD" | jq -e '.rejected_legs | length > 0' >/dev/null; then
            echo "" >>"$GITHUB_STEP_SUMMARY"
            echo "### Rejected Legs" >>"$GITHUB_STEP_SUMMARY"
            echo "" >>"$GITHUB_STEP_SUMMARY"
            echo "| Index | Reason |" >>"$GITHUB_STEP_SUMMARY"
            echo "|-------|--------|" >>"$GITHUB_STEP_SUMMARY"
            echo "$ACK_PAYLOAD" | jq -r '.rejected_legs[] | "| \(.index) | \(.reason) |"' >>"$GITHUB_STEP_SUMMARY"
          fi

  # ─────────────────── 06 Pending VM response → End workflow ───────────────────
  post-pending-status:
    name: 06 Pending VM response
    needs: [vm-handshake, bmt-context]
    runs-on: ubuntu-22.04
    steps:
      - name: Post pending commit status
        run: |
          STATUS_CONTEXT="${BMT_STATUS_CONTEXT:-BMT Gate}"
          STATUS_DESC="${BMT_DESCRIPTION_PENDING:-BMT running on VM; status will update when complete.}"
          curl -sS -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${{ github.token }}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${{ github.repository }}/statuses/${{ needs.bmt-context.outputs.head_sha }}" \
            -d "$(jq -n --arg c "$STATUS_CONTEXT" --arg d "$STATUS_DESC" '{state:"pending",context:$c,description:$d}')"
