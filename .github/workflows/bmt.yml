name: BMT
run-name: "BMT Handoff • ${{ inputs.head_branch || github.event.inputs.head_branch }} • ${{ inputs.head_sha || github.event.inputs.head_sha || github.sha }}"

on:
  workflow_dispatch:
    inputs:
      ci_run_id:
        description: "Caller run ID (artifact download)"
        required: true
      head_sha:
        description: "Commit SHA to run BMT for"
        required: true
      head_branch:
        description: "Branch name"
        required: true
      head_event:
        description: "push or pull_request"
        required: false
        default: "push"
      pr_number:
        description: "PR number when head_event is pull_request"
        required: false
      available_artifacts:
        description: 'JSON array of runner artifact names (e.g. ["runner-sk_gcc_release"]) so uploads without artifact show as Skipped'
        required: false
        default: "[]"
  workflow_call:
    inputs:
      ci_run_id:
        description: "Caller run ID (artifact download)"
        required: true
        type: string
      head_sha:
        description: "Commit SHA to run BMT for"
        required: true
        type: string
      head_branch:
        description: "Branch name"
        required: true
        type: string
      head_event:
        description: "push or pull_request"
        required: false
        type: string
        default: "push"
      pr_number:
        description: "PR number when head_event is pull_request"
        required: false
        type: string
        default: ""
      available_artifacts:
        description: 'JSON array of runner artifact names (e.g. ["runner-sk_gcc_release"]) so uploads without artifact show as Skipped'
        required: false
        type: string
        default: "[]"
    outputs:
      bmt_gate_passed:
        description: "Handoff succeeded (write-summary ran)."
        value: ${{ jobs.handoff.outputs.bmt_gate_passed }}
      bmt_fallback_run:
        description: "Failure-fallback ran."
        value: ${{ jobs.handoff.outputs.bmt_fallback_run }}

concurrency:
  group: bmt-${{ github.repository }}-${{ inputs.head_branch || github.event.inputs.head_branch || github.ref_name || github.sha }}
  cancel-in-progress: true

env:
  GCS_BUCKET: ${{ vars.GCS_BUCKET }}
  GCP_WIF_PROVIDER: ${{ vars.GCP_WIF_PROVIDER }}
  GCP_SA_EMAIL: ${{ vars.GCP_SA_EMAIL }}
  GCP_PROJECT: ${{ vars.GCP_PROJECT }}
  GCP_ZONE: ${{ vars.GCP_ZONE }}
  BMT_VM_NAME: ${{ vars.BMT_VM_NAME }}
  BMT_VM_POOL: ${{ vars.BMT_VM_POOL }}
  BMT_STATUS_CONTEXT: ${{ vars.BMT_STATUS_CONTEXT }}
  BMT_PUBSUB_TOPIC: ${{ vars.BMT_PUBSUB_TOPIC }}
  UV_PROJECT: ".github/bmt"

permissions:
  contents: read
  actions: read

jobs:
  # Ensure VM image was built when image-affecting paths (infra/packer, gcp/code/bootstrap) changed.
  check-image-up-to-date:
    name: Check image up to date
    runs-on: ubuntu-22.04
    outputs:
      image_check_passed: ${{ steps.check.outputs.passed }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: ${{ inputs.head_sha || github.event.inputs.head_sha || github.sha }}
          fetch-depth: 0

      - name: Check image build required and present
        id: check
        env:
          HEAD_SHA: ${{ inputs.head_sha || github.event.inputs.head_sha || github.sha }}
          HEAD_BRANCH: ${{ inputs.head_branch || github.event.inputs.head_branch || github.ref_name }}
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch || 'main' }}
        run: |
          set -euo pipefail
          # Paths that affect the baked VM image; must match bmt-image-build.yml paths.
          AFFECTED_PATHS=("infra/packer" "gcp/code/bootstrap")
          git fetch origin "${DEFAULT_BRANCH}" --depth=1 2>/dev/null || true
          changed="$(git diff --name-only "origin/${DEFAULT_BRANCH}...${HEAD_SHA}" -- "${AFFECTED_PATHS[@]}" 2>/dev/null || true)"
          if [[ -z "${changed//[[:space:]]/}" ]]; then
            echo "No image-affecting paths changed; skip image build check."
            echo "passed=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "Image-affecting paths changed; verifying BMT Image Build ran for this ref."
          runs_json="$(gh run list \
            --workflow "bmt-image-build.yml" \
            --branch "${HEAD_BRANCH}" \
            --limit 30 \
            --json conclusion,headSha,status \
            --jq '[.[] | select(.status=="completed" and .conclusion=="success") | .headSha]' 2>/dev/null || echo '[]')"
          if echo "$runs_json" | jq -e --arg sha "${HEAD_SHA}" 'index($sha) != null' >/dev/null 2>&1; then
            echo "BMT Image Build succeeded for commit ${HEAD_SHA}."
            echo "passed=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "::error::Image-affecting paths changed (infra/packer or gcp/code/bootstrap), but no successful BMT Image Build run found for this ref (branch=${HEAD_BRANCH}, sha=${HEAD_SHA}). Run the BMT Image Build workflow for this branch/commit and re-run BMT."
          echo "passed=false" >> "$GITHUB_OUTPUT"
          exit 1

  # Success: setup (includes VM start) → upload-runners → handshake (classify + trigger + wait ack + summary).
  # Failure: setup or handshake fails → handoff runs fallback (post status, cleanup) then sets outputs.
  setup:
    name: Setup
    needs: check-image-up-to-date
    runs-on: ubuntu-22.04
    permissions:
      id-token: write
    outputs:
      run_id: ${{ steps.prepare.outputs.run_id }}
      head_sha: ${{ steps.prepare.outputs.head_sha }}
      head_branch: ${{ steps.prepare.outputs.head_branch }}
      head_event: ${{ steps.prepare.outputs.head_event }}
      pr_number: ${{ steps.prepare.outputs.pr_number }}
      run_context: ${{ steps.run-context.outputs.run_context }}
      runner_matrix: ${{ steps.prepare.outputs.runner_matrix }}
      matrix_need_upload: ${{ steps.filter.outputs.matrix_need_upload }}
      matrix_need_upload_keys: ${{ steps.filter.outputs.matrix_need_upload_keys }}
      selected_vm: ${{ steps.select-vm.outputs.selected_vm || '' }}
      vm_reused_running: ${{ steps.select-vm.outputs.vm_reused_running || 'false' }}
      restart_vm: ${{ steps.preflight.outputs.restart_vm || 'false' }}
      stale_cleanup_count: ${{ steps.preflight.outputs.stale_cleanup_count || '0' }}
      vm_started: ${{ steps.start-vm.outcome == 'success' || steps.select-vm.outputs.vm_reused_running == 'true' }}
    steps:
      - name: Checkout repo (for local actions)
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: ${{ inputs.head_sha || github.event.inputs.head_sha || github.sha }}
          fetch-depth: 1
          sparse-checkout: .github

      - uses: ./.github/actions/bmt-job-setup
        with:
          ref: ${{ inputs.head_sha || github.event.inputs.head_sha || github.sha }}
          run-id: ${{ inputs.ci_run_id || github.event.inputs.ci_run_id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - id: prepare
        uses: ./.github/actions/bmt-prepare
        with:
          ci_run_id: ${{ inputs.ci_run_id || github.event.inputs.ci_run_id }}
          head_sha: ${{ inputs.head_sha || github.event.inputs.head_sha || github.sha }}
          head_branch: ${{ inputs.head_branch || github.event.inputs.head_branch }}
          head_event: ${{ inputs.head_event || github.event.inputs.head_event || 'push' }}
          pr_number: ${{ inputs.pr_number || github.event.inputs.pr_number }}

      - name: Set run context
        id: run-context
        shell: bash
        run: |
          pr_number="${{ inputs.pr_number || github.event.inputs.pr_number || '' }}"
          head_event="${{ inputs.head_event || github.event.inputs.head_event || 'push' }}"
          if [[ -n "${pr_number// /}" ]]; then
            echo "run_context=pr" >> "$GITHUB_OUTPUT"
          elif [[ "$head_event" == "pull_request" || "$head_event" == "pull_request_target" ]]; then
            echo "run_context=pr" >> "$GITHUB_OUTPUT"
          else
            echo "run_context=dev" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup GCP and uv
        uses: ./.github/actions/setup-gcp-uv
        with:
          workload_identity_provider: ${{ env.GCP_WIF_PROVIDER }}
          service_account: ${{ env.GCP_SA_EMAIL }}
          python_version: "3.12"

      - id: filter
        env:
          GCS_BUCKET: ${{ env.GCS_BUCKET }}
          RUNNER_MATRIX: ${{ steps.prepare.outputs.runner_matrix }}
          HEAD_SHA: ${{ steps.prepare.outputs.head_sha }}
          GITHUB_RUN_ID: ${{ github.run_id }}
          AVAILABLE_ARTIFACTS: ${{ inputs.available_artifacts || '[]' }}
        run: uv run bmt write-context && uv run bmt filter-upload-matrix

      - name: Select available VM from pool
        id: select-vm
        shell: bash
        run: |
          uv run bmt select-available-vm
          selected_vm="$(grep '^selected_vm=' "$GITHUB_OUTPUT" | tail -1 | cut -d= -f2-)"
          echo "BMT_VM_NAME=${selected_vm}" >> "$GITHUB_ENV"

      - name: Preflight runtime trigger queue (stale cleanup)
        id: preflight
        shell: bash
        env:
          RUN_CONTEXT: ${{ steps.run-context.outputs.run_context }}
          PR_NUMBER: ${{ steps.prepare.outputs.pr_number }}
        run: uv run bmt preflight-trigger-queue

      - name: Sync VM metadata from workflow config
        shell: bash
        run: uv run bmt sync-vm-metadata

      - name: Force clean VM restart after stale-trigger cleanup
        if: steps.preflight.outputs.restart_vm == 'true'
        shell: bash
        env:
          STALE_CLEANUP_COUNT: ${{ steps.preflight.outputs.stale_cleanup_count }}
        run: uv run bmt write-context && uv run bmt force-clean-vm-restart

      - name: Start BMT VM
        id: start-vm
        if: steps.select-vm.outputs.vm_reused_running != 'true'
        shell: bash
        run: uv run start

      - name: Workflow summary notice
        run: echo "::notice::BMT result will appear in the PR Checks tab and Comments, not in this workflow summary."
  upload-runners:
    name: Upload • ${{ matrix.project }}
    needs: setup
    runs-on: ubuntu-22.04
    continue-on-error: true
    permissions:
      id-token: write
    strategy:
      fail-fast: false
      max-parallel: 3
      matrix: ${{ fromJson(needs.setup.outputs.matrix_need_upload) }}
    steps:
      - name: Checkout repo (for local actions)
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: ${{ inputs.head_sha || github.event.inputs.head_sha || github.sha }}
          fetch-depth: 1
          sparse-checkout: .github

      - uses: ./.github/actions/bmt-job-setup
        with:
          ref: ${{ inputs.head_sha || github.event.inputs.head_sha || github.sha }}
          run-id: ${{ needs.setup.outputs.run_id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Download runner artifact
        uses: actions/download-artifact@70fc10c6e5e1ce46ad2ea6f2b72d43f7d47b13c3 # v8
        with:
          # Produced by caller build-and-test.yml build-release job (one artifact runner-<preset> per preset).
          name: runner-${{ matrix.preset }}
          path: artifact
          run-id: ${{ needs.setup.outputs.run_id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: true
        id: download

      - name: Warn and skip if artifact missing
        if: steps.download.outcome == 'failure'
        run: |
          echo "::warning::Runner upload skipped for ${{ matrix.project }} (${{ matrix.preset }}): artifact not found or download failed. BMT will continue with other runners."
          echo "upload_ok=false" >> "$GITHUB_OUTPUT"

      - name: Setup GCP and uv
        if: steps.download.outcome == 'success'
        uses: ./.github/actions/setup-gcp-uv
        with:
          workload_identity_provider: ${{ env.GCP_WIF_PROVIDER }}
          service_account: ${{ env.GCP_SA_EMAIL }}
          python_version: "3.12"

      - name: Upload runner to GCS
        if: steps.download.outcome == 'success'
        id: upload
        env:
          PROJECT: ${{ matrix.project }}
          PRESET: ${{ matrix.preset }}
          SOURCE_REF: ${{ needs.setup.outputs.head_sha }}
        run: uv run bmt upload-runner-to-gcs
        continue-on-error: true

      - name: Warn if GCS upload failed
        if: steps.download.outcome == 'success' && steps.upload.outcome == 'failure'
        run: |
          echo "::warning::Runner upload failed for ${{ matrix.project }} (${{ matrix.preset }}). BMT will continue with other runners."

      - name: Record uploaded project marker
        if: steps.download.outcome == 'success' && steps.upload.outcome == 'success'
        run: |
          echo '{}' | gsutil cp - "gs://${GCS_BUCKET}/runtime/_workflow/uploaded/${{ github.run_id }}/${{ matrix.project }}.json"

  handshake:
    name: Handshake
    needs: [setup, upload-runners]
    runs-on: ubuntu-22.04
    permissions:
      id-token: write
    outputs:
      # Step-level results for failure-fallback diagnostics
      classify_result: ${{ steps.classify.outcome || 'skipped' }}
      handoff_result: ${{ steps.run.outcome || 'skipped' }}
      # Classify outputs
      classify_path: ${{ steps.classify.outputs.path || 'unknown' }}
      has_legs: ${{ steps.classify.outputs.has_legs || 'false' }}
      accepted_projects: ${{ steps.classify.outputs.accepted_projects || '[]' }}
      filtered_matrix: ${{ steps.classify.outputs.filtered_matrix || '{"include":[]}' }}
      # Handshake-run outputs (VM ack, trigger, etc.)
      selected_vm: ${{ steps.run.outputs.selected_vm || '' }}
      trigger_written: ${{ steps.run.outputs.trigger_written || 'false' }}
      handshake_ok: ${{ steps.run.outputs.handshake_ok || 'false' }}
      handshake_uri: ${{ steps.run.outputs.handshake_uri || '' }}
      vm_started: ${{ steps.run.outputs.vm_started || 'false' }}
      handoff_reason: ${{ steps.run.outputs.handoff_reason || '' }}
    steps:
      - name: Checkout repo (for local actions)
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: ${{ inputs.head_sha || github.event.inputs.head_sha || github.sha }}
          fetch-depth: 1
          sparse-checkout: .github

      - uses: ./.github/actions/bmt-job-setup
        with:
          ref: ${{ inputs.head_sha || github.event.inputs.head_sha || github.sha }}
          run-id: ${{ needs.setup.outputs.run_id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - id: classify
        uses: ./.github/actions/bmt-classify-handoff
        with:
          head_sha: ${{ needs.setup.outputs.head_sha }}
          runner_matrix: ${{ needs.setup.outputs.runner_matrix }}
          workload_identity_provider: ${{ env.GCP_WIF_PROVIDER }}
          service_account: ${{ env.GCP_SA_EMAIL }}

      - id: run
        uses: ./.github/actions/bmt-handoff-run
        with:
          head_sha: ${{ needs.setup.outputs.head_sha }}
          head_branch: ${{ needs.setup.outputs.head_branch }}
          head_event: ${{ needs.setup.outputs.head_event }}
          pr_number: ${{ needs.setup.outputs.pr_number }}
          run_context: ${{ needs.setup.outputs.run_context }}
          filtered_matrix: ${{ steps.classify.outputs.filtered_matrix }}
          runner_matrix: ${{ needs.setup.outputs.runner_matrix }}
          accepted_projects: ${{ steps.classify.outputs.accepted_projects }}
          workload_identity_provider: ${{ env.GCP_WIF_PROVIDER }}
          service_account: ${{ env.GCP_SA_EMAIL }}
          gcp_project: ${{ env.GCP_PROJECT }}
          gcp_zone: ${{ env.GCP_ZONE }}
          gcs_bucket: ${{ env.GCS_BUCKET }}
          vm_pre_started: "true"
          pre_started_selected_vm: ${{ needs.setup.outputs.selected_vm }}
          pre_started_vm_reused_running: ${{ needs.setup.outputs.vm_reused_running }}
          pre_started_restart_vm: ${{ needs.setup.outputs.restart_vm }}
          pre_started_stale_cleanup_count: ${{ needs.setup.outputs.stale_cleanup_count }}
          pre_started_vm_started: ${{ needs.setup.outputs.vm_started }}
      # No separate write-summary step needed; bmt-handoff-run already writes
      # the handoff summary internally (bmt-write-summary with if: always()).

  handoff:
    name: Handoff
    needs: [setup, handshake]
    if: always()
    runs-on: ubuntu-22.04
    permissions:
      id-token: write
      statuses: write
    env:
      BMT_VM_NAME: ${{ needs.handshake.outputs.selected_vm || vars.BMT_VM_NAME }}
    outputs:
      bmt_gate_passed: ${{ steps.outcome.outputs.bmt_gate_passed }}
      bmt_fallback_run: ${{ steps.outcome.outputs.bmt_fallback_run }}
    steps:
      - name: Checkout repo (for local actions)
        if: >-
          always()
          && (needs.setup.result == 'failure' || needs.handshake.result == 'failure'
              || needs.setup.result == 'cancelled' || needs.handshake.result == 'cancelled')
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: ${{ inputs.head_sha || github.event.inputs.head_sha || github.sha }}
          fetch-depth: 1
          sparse-checkout: .github

      - uses: ./.github/actions/bmt-job-setup
        if: >-
          always()
          && (needs.setup.result == 'failure' || needs.handshake.result == 'failure'
              || needs.setup.result == 'cancelled' || needs.handshake.result == 'cancelled')
        with:
          ref: ${{ inputs.head_sha || github.event.inputs.head_sha || github.sha }}
          run-id: ${{ inputs.ci_run_id || github.event.inputs.ci_run_id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Build diagnostic context from merged handoff outputs
        if: >-
          always()
          && (needs.setup.result == 'failure' || needs.handshake.result == 'failure'
              || needs.setup.result == 'cancelled' || needs.handshake.result == 'cancelled')
        id: ctx
        shell: bash
        env:
          CLASSIFY_PATH: ${{ needs.handshake.outputs.classify_path || 'unknown' }}
          HAS_LEGS: ${{ needs.handshake.outputs.has_legs || 'false' }}
          ACCEPTED_PROJECTS: ${{ needs.handshake.outputs.accepted_projects || '[]' }}
          FILTERED_MATRIX: ${{ needs.handshake.outputs.filtered_matrix || '{"include":[]}' }}
          TRIGGER_WRITTEN: ${{ needs.handshake.outputs.trigger_written || 'false' }}
          VM_STARTED: ${{ needs.handshake.outputs.vm_started || 'false' }}
          HANDSHAKE_OK: ${{ needs.handshake.outputs.handshake_ok || 'false' }}
          HANDSHAKE_URI: ${{ needs.handshake.outputs.handshake_uri || '' }}
          HANDOFF_REASON: ${{ needs.handshake.outputs.handoff_reason || '' }}
        run: |
          echo "classify_outputs=$(jq -nc --arg path "$CLASSIFY_PATH" --arg has_legs "$HAS_LEGS" \
            --argjson accepted "$ACCEPTED_PROJECTS" --argjson matrix "$FILTERED_MATRIX" \
            '{path:$path, has_legs:$has_legs, accepted_projects:$accepted, filtered_matrix:$matrix}')" >> "$GITHUB_OUTPUT"
          echo "handoff_outputs=$(jq -nc --arg tw "$TRIGGER_WRITTEN" --arg vs "$VM_STARTED" --arg ho "$HANDSHAKE_OK" \
            --arg hu "$HANDSHAKE_URI" --arg hr "$HANDOFF_REASON" \
            '{trigger_written:$tw, vm_started:$vs, handshake_ok:$ho, handshake_uri:$hu, handoff_reason:$hr}')" >> "$GITHUB_OUTPUT"

      - name: Failure fallback
        if: >-
          always()
          && (needs.setup.result == 'failure' || needs.handshake.result == 'failure'
              || needs.setup.result == 'cancelled' || needs.handshake.result == 'cancelled')
        uses: ./.github/actions/bmt-failure-fallback
        with:
          prepare_result: ${{ needs.setup.result }}
          prepare_outputs: ${{ toJson(needs.setup.outputs) }}
          classify_result: ${{ needs.handshake.outputs.classify_result }}
          classify_outputs: ${{ steps.ctx.outputs.classify_outputs }}
          handoff_result: ${{ needs.handshake.outputs.handoff_result == 'skipped' && 'success' || needs.handshake.outputs.handoff_result }}
          handoff_outputs: ${{ steps.ctx.outputs.handoff_outputs }}
          dispatch_head_sha: ${{ inputs.head_sha || github.event.inputs.head_sha }}
          dispatch_pr_number: ${{ inputs.pr_number || github.event.inputs.pr_number }}
          fallback_ref: ${{ github.sha }}
          workload_identity_provider: ${{ env.GCP_WIF_PROVIDER }}
          service_account: ${{ env.GCP_SA_EMAIL }}
          bmt_status_context: ${{ vars.BMT_STATUS_CONTEXT }}

      - id: outcome
        run: |
          echo "bmt_gate_passed=${{ needs.handshake.result == 'success' }}" >> "$GITHUB_OUTPUT"
          echo "bmt_fallback_run=${{ needs.setup.result != 'cancelled' && needs.handshake.result != 'cancelled' && (needs.setup.result == 'failure' || needs.handshake.result == 'failure') }}" >> "$GITHUB_OUTPUT"
