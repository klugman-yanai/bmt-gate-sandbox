# BMT workflow: runs after CI (dummy or real build). Triggered by CI via workflow_dispatch.
name: BMT
run-name: "BMT • ${{ github.event.inputs.head_branch }} • ${{ github.event.inputs.head_sha }}"

on:
  workflow_dispatch:
    inputs:
      ci_run_id:
        description: "CI workflow run ID (for artifact download)"
        required: true
      head_sha:
        description: "Head commit SHA"
        required: true
      head_branch:
        description: "Head branch name"
        required: true
      head_event:
        description: "Event that triggered CI (pull_request or push)"
        required: false
        default: "push"
      pr_number:
        description: "PR number (if head_event is pull_request)"
        required: false

concurrency:
  group: bmt-${{ github.event.inputs.head_sha }}

# Minimum needed: checkout, GCP WIF, post status, download-artifact
# PR comment on failure. Check Runs are created by the VM only.
permissions:
  contents: read
  id-token: write
  statuses: write
  actions: read
  issues: write

env:
  GCS_BUCKET: ${{ vars.GCS_BUCKET }}
  BMT_BUCKET_PREFIX: ${{ vars.BMT_BUCKET_PREFIX }}
  GCP_WIF_PROVIDER: ${{ vars.GCP_WIF_PROVIDER }}
  GCP_SA_EMAIL: ${{ vars.GCP_SA_EMAIL }}
  GCP_PROJECT: ${{ vars.GCP_PROJECT }}
  GCP_ZONE: ${{ vars.GCP_ZONE }}
  BMT_VM_NAME: ${{ vars.BMT_VM_NAME }}
  BMT_STATUS_CONTEXT: ${{ vars.BMT_STATUS_CONTEXT }}
  BMT_DESCRIPTION_PENDING: ${{ vars.BMT_DESCRIPTION_PENDING }}
  BMT_PROJECTS: ${{ vars.BMT_PROJECTS }}
  BMT_HANDSHAKE_TIMEOUT_SEC: ${{ vars.BMT_HANDSHAKE_TIMEOUT_SEC }}
  BMT_VERDICT_TIMEOUT_SEC: ${{ vars.BMT_VERDICT_TIMEOUT_SEC }}
  PYTHONPATH: .github/scripts

jobs:
  # ─────────────────── Resolve context (from workflow_dispatch inputs) ───────────────────
  bmt-context:
    name: Resolve context
    runs-on: ubuntu-22.04
    outputs:
      run_id: ${{ steps.ctx.outputs.run_id }}
      head_sha: ${{ steps.ctx.outputs.head_sha }}
      head_branch: ${{ steps.ctx.outputs.head_branch }}
      head_event: ${{ steps.ctx.outputs.head_event }}
      pr_number: ${{ steps.ctx.outputs.pr_number }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.head_sha || github.sha }}

      - id: ctx
        env:
          DISPATCH_CI_RUN_ID: ${{ github.event.inputs.ci_run_id }}
          DISPATCH_HEAD_SHA: ${{ github.event.inputs.head_sha }}
          DISPATCH_HEAD_BRANCH: ${{ github.event.inputs.head_branch }}
          DISPATCH_HEAD_EVENT: ${{ github.event.inputs.head_event }}
          DISPATCH_PR_NUMBER: ${{ github.event.inputs.pr_number }}
        run: bash .github/scripts/workflows/bmt_workflow.sh emit-bmt-context

  # ─────────────────── 00 Guard ───────────────────
  guard:
    name: 00 Guard
    needs: bmt-context
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.bmt-context.outputs.head_sha }}

      - name: Validate required configuration variables
        run: bash .github/scripts/workflows/bmt_workflow.sh validate-required-vars

  # ─────────────────── 01 Matrix: which BMTs requested (from presets; filtered by BMT_PROJECTS) ───────────────────
  extract-bmt-presets:
    name: 01 Matrix (BMTs requested)
    needs: [guard, bmt-context]
    runs-on: ubuntu-22.04
    outputs:
      runner-matrix: ${{ steps.parse.outputs.runner_matrix }}
    steps:
      - name: Checkout (source branch)
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.bmt-context.outputs.head_sha }}

      - name: Parse gcc_Release presets (filtered by BMT_PROJECTS; default all release runners)
        id: parse
        run: bash .github/scripts/workflows/bmt_workflow.sh parse-release-runner-matrix

  # ─────────────────── 02 GCP auth + runners pushed to GCS (from build artifacts) ───────────────────
  # On artifact download or upload failure we warn and continue; only successfully uploaded runners are used for the trigger.
  upload-runners:
    name: 02 Auth & Runners ${{ matrix.project }}
    needs: [extract-bmt-presets, bmt-context]
    runs-on: ubuntu-22.04
    continue-on-error: true
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.extract-bmt-presets.outputs.runner-matrix) }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.bmt-context.outputs.head_sha }}

      - name: Download runner artifact
        uses: actions/download-artifact@v4
        with:
          name: runner-${{ matrix.preset }}
          path: artifact
          run-id: ${{ needs.bmt-context.outputs.run_id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: true
        id: download

      - name: Warn and skip if artifact missing
        if: steps.download.outcome == 'failure'
        env:
          PROJECT: ${{ matrix.project }}
          PRESET: ${{ matrix.preset }}
        run: bash .github/scripts/workflows/bmt_workflow.sh warn-artifact-missing

      - name: GCP Auth (WIF)
        if: steps.download.outcome == 'success'
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ env.GCP_WIF_PROVIDER }}
          service_account: ${{ env.GCP_SA_EMAIL }}

      - name: Setup Cloud SDK
        if: steps.download.outcome == 'success'
        uses: google-github-actions/setup-gcloud@v2

      - name: Install uv
        if: steps.download.outcome == 'success'
        uses: astral-sh/setup-uv@v4
        with:
          python-version: "3.12"

      - name: Upload runner to GCS
        if: steps.download.outcome == 'success'
        id: upload
        env:
          PROJECT: ${{ matrix.project }}
          PRESET: ${{ matrix.preset }}
          SOURCE_REF: ${{ needs.bmt-context.outputs.head_sha }}
        run: bash .github/scripts/workflows/bmt_workflow.sh upload-runner-to-gcs
        continue-on-error: true

      - name: Warn if GCS upload failed
        if: steps.download.outcome == 'success' && steps.upload.outcome == 'failure'
        env:
          PROJECT: ${{ matrix.project }}
          PRESET: ${{ matrix.preset }}
        run: bash .github/scripts/workflows/bmt_workflow.sh warn-upload-failed

      - name: Record uploaded project (marker for send-run-payload)
        if: steps.download.outcome == 'success' && steps.upload.outcome == 'success'
        env:
          WORKFLOW_RUN_ID: ${{ github.run_id }}
          PROJECT: ${{ matrix.project }}
        run: bash .github/scripts/workflows/bmt_workflow.sh record-uploaded-project-marker

  # ─────────────────── Resolve which runners were uploaded (for trigger filtering) ───────────────────
  resolve-uploaded-projects:
    name: 02b Resolve uploaded runners
    needs: [upload-runners, bmt-context]
    runs-on: ubuntu-22.04
    outputs:
      accepted_projects: ${{ steps.list.outputs.accepted_projects }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.bmt-context.outputs.head_sha }}

      - name: GCP Auth (WIF)
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ env.GCP_WIF_PROVIDER }}
          service_account: ${{ env.GCP_SA_EMAIL }}

      - name: Setup Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: List uploaded project markers
        id: list
        env:
          WORKFLOW_RUN_ID: ${{ github.run_id }}
        run: bash .github/scripts/workflows/bmt_workflow.sh resolve-uploaded-projects

  # ─────────────────── 03 Handshake begin (trigger written to GCS) ───────────────────
  send-run-payload:
    name: 03 Handshake begin (trigger to GCS)
    needs: [upload-runners, extract-bmt-presets, bmt-context, resolve-uploaded-projects]
    runs-on: ubuntu-22.04
    outputs:
      has_legs: ${{ steps.filter.outputs.has_legs }}
      restart_vm: ${{ steps.preflight.outputs.restart_vm || 'false' }}
      stale_cleanup_count: ${{ steps.preflight.outputs.stale_cleanup_count || '0' }}
      trigger_manifest: ${{ steps.trigger.outputs.manifest || '' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.bmt-context.outputs.head_sha }}

      - name: GCP Auth (WIF)
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ env.GCP_WIF_PROVIDER }}
          service_account: ${{ env.GCP_SA_EMAIL }}

      - name: Setup Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          python-version: "3.12"

      - name: Build BMT matrix
        id: matrix
        run: uv run python ./.github/scripts/ci_driver.py matrix --config-root remote/code --project-filter "${BMT_PROJECTS:-}"

      - name: Filter matrix to supported runners only
        id: filter
        env:
          RUNNER_MATRIX: ${{ needs.extract-bmt-presets.outputs.runner-matrix }}
          FULL_MATRIX: ${{ steps.matrix.outputs.matrix }}
          ACCEPTED_PROJECTS: ${{ needs.resolve-uploaded-projects.outputs.accepted_projects }}
        run: bash .github/scripts/workflows/bmt_workflow.sh filter-supported-matrix

      - name: Show BMT matrix handshake
        env:
          RUNNER_MATRIX: ${{ needs.extract-bmt-presets.outputs.runner-matrix }}
          ACCEPTED: ${{ needs.resolve-uploaded-projects.outputs.accepted_projects }}
          FILTERED_MATRIX: ${{ steps.filter.outputs.matrix }}
        run: bash .github/scripts/workflows/bmt_workflow.sh summarize-matrix-handshake

      - name: Preflight runtime trigger queue (stale cleanup)
        id: preflight
        if: steps.filter.outputs.has_legs == 'true'
        env:
          WORKFLOW_RUN_ID: ${{ github.run_id }}
        run: bash .github/scripts/workflows/bmt_workflow.sh preflight-trigger-queue

      - name: Write run trigger to GCS
        id: trigger
        if: steps.filter.outputs.has_legs == 'true'
        env:
          FILTERED_MATRIX_JSON: ${{ steps.filter.outputs.matrix }}
          RUN_CONTEXT: ${{ needs.bmt-context.outputs.head_event == 'pull_request' && 'pr' || 'dev' }}
          HEAD_EVENT: ${{ needs.bmt-context.outputs.head_event }}
          PR_NUMBER: ${{ needs.bmt-context.outputs.pr_number }}
        run: bash .github/scripts/workflows/bmt_workflow.sh write-run-trigger

  # ─────────────────── 04 VM woken up ───────────────────
  start-vm:
    name: 04 VM woken up
    needs: [send-run-payload, bmt-context]
    if: needs.send-run-payload.outputs.has_legs == 'true'
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.bmt-context.outputs.head_sha }}

      - name: GCP Auth (WIF)
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ env.GCP_WIF_PROVIDER }}
          service_account: ${{ env.GCP_SA_EMAIL }}

      - name: Setup Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Sync VM metadata from workflow config
        run: uv run python ./.github/scripts/ci_driver.py sync-vm-metadata

      - name: Force clean VM restart after stale-trigger cleanup
        if: needs.send-run-payload.outputs.restart_vm == 'true'
        env:
          STALE_CLEANUP_COUNT: ${{ needs.send-run-payload.outputs.stale_cleanup_count }}
        run: bash .github/scripts/workflows/bmt_workflow.sh force-clean-vm-restart

      - name: Start BMT VM
        run: uv run python ./.github/scripts/ci_driver.py start-vm

  # ─────────────────── 05 Matrix: accepted vs unsupported (VM handshake response) ───────────────────
  vm-handshake:
    name: 05 Matrix accepted vs unsupported
    needs: [send-run-payload, start-vm, bmt-context]
    if: needs.send-run-payload.outputs.has_legs == 'true'
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.bmt-context.outputs.head_sha }}

      - name: GCP Auth (WIF)
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ env.GCP_WIF_PROVIDER }}
          service_account: ${{ env.GCP_SA_EMAIL }}

      - name: Setup Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          python-version: "3.12"

      - name: How to check VM behavior
        env:
          WORKFLOW_RUN_ID: ${{ github.run_id }}
          RESTART_VM: ${{ needs.send-run-payload.outputs.restart_vm }}
          STALE_CLEANUP_COUNT: ${{ needs.send-run-payload.outputs.stale_cleanup_count }}
        run: bash .github/scripts/workflows/bmt_workflow.sh show-handshake-guidance

      - name: Wait for VM handshake ack
        id: handshake
        env:
          WORKFLOW_RUN_ID: ${{ github.run_id }}
          RESTART_VM: ${{ needs.send-run-payload.outputs.restart_vm }}
          STALE_CLEANUP_COUNT: ${{ needs.send-run-payload.outputs.stale_cleanup_count }}
        run: bash .github/scripts/workflows/bmt_workflow.sh wait-handshake

      - name: Handshake timeout diagnostics
        if: ${{ failure() && steps.handshake.outcome == 'failure' }}
        env:
          WORKFLOW_RUN_ID: ${{ github.run_id }}
        run: bash .github/scripts/workflows/bmt_workflow.sh handshake-timeout-diagnostics

      - name: Show VM handshake summary
        env:
          ACK_PAYLOAD: ${{ steps.handshake.outputs.handshake_payload }}
          HANDSHAKE_URI: ${{ steps.handshake.outputs.handshake_uri }}
          HANDSHAKE_REQUESTED_LEG_COUNT: ${{ steps.handshake.outputs.handshake_requested_leg_count }}
          HANDSHAKE_ACCEPTED_LEG_COUNT: ${{ steps.handshake.outputs.handshake_accepted_leg_count }}
          RESTART_VM: ${{ needs.send-run-payload.outputs.restart_vm }}
          STALE_CLEANUP_COUNT: ${{ needs.send-run-payload.outputs.stale_cleanup_count }}
        run: bash .github/scripts/workflows/bmt_workflow.sh show-handshake-summary

  # ─────────────────── 06 Pending VM response → End workflow ───────────────────
  post-pending-status:
    name: 06 Pending VM response
    needs: [vm-handshake, bmt-context]
    if: needs.vm-handshake.result == 'success'
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.bmt-context.outputs.head_sha }}

      - name: Post pending commit status
        env:
          REPOSITORY: ${{ github.repository }}
          HEAD_SHA: ${{ needs.bmt-context.outputs.head_sha }}
          GITHUB_TOKEN: ${{ github.token }}
        run: bash .github/scripts/workflows/bmt_workflow.sh post-pending-status

  # ─────────────────── 06b Wait for VM verdict and post terminal status ───────────────────
  wait-vm-results:
    name: 06b Wait for VM verdicts
    needs: [send-run-payload, vm-handshake, bmt-context]
    if: needs.send-run-payload.outputs.has_legs == 'true' && needs.vm-handshake.result == 'success'
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.bmt-context.outputs.head_sha }}

      - name: GCP Auth (WIF)
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ env.GCP_WIF_PROVIDER }}
          service_account: ${{ env.GCP_SA_EMAIL }}

      - name: Setup Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          python-version: "3.12"

      - name: Wait for VM verdicts
        id: wait
        env:
          TRIGGER_MANIFEST: ${{ needs.send-run-payload.outputs.trigger_manifest }}
        run: bash .github/scripts/workflows/bmt_workflow.sh wait-verdicts

      - name: Post final commit status
        if: always()
        env:
          REPOSITORY: ${{ github.repository }}
          HEAD_SHA: ${{ needs.bmt-context.outputs.head_sha }}
          GITHUB_TOKEN: ${{ github.token }}
          DECISION: ${{ steps.wait.outputs.decision }}
          PASS_COUNT: ${{ steps.wait.outputs.pass_count }}
          WARNING_COUNT: ${{ steps.wait.outputs.warning_count }}
          FAIL_COUNT: ${{ steps.wait.outputs.fail_count }}
          TIMEOUT_COUNT: ${{ steps.wait.outputs.timeout_count }}
        run: bash .github/scripts/workflows/bmt_workflow.sh post-final-status-from-decision

      - name: Evaluate merge gate decision (non-blocking job status)
        if: steps.wait.outcome == 'success'
        continue-on-error: true
        run: |
          uv run python ./.github/scripts/ci_driver.py gate \
            --decision "${{ steps.wait.outputs.decision }}" \
            --pass-count "${{ steps.wait.outputs.pass_count }}" \
            --warning-count "${{ steps.wait.outputs.warning_count }}" \
            --fail-count "${{ steps.wait.outputs.fail_count }}" \
            --timeout-count "${{ steps.wait.outputs.timeout_count }}" \
            --blocked-legs "${{ steps.wait.outputs.blocked_legs }}" \
            --blocked-reasons "${{ steps.wait.outputs.blocked_reasons }}"

  # ─────────────────── Early pending: show BMT started before handshake ───────────────────
  post-started-pending:
    name: 01 Post BMT started
    needs: [bmt-context, send-run-payload]
    if: needs.send-run-payload.outputs.has_legs == 'true'
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.bmt-context.outputs.head_sha }}

      - name: Post pending (BMT started)
        env:
          REPOSITORY: ${{ github.repository }}
          HEAD_SHA: ${{ needs.bmt-context.outputs.head_sha }}
          GITHUB_TOKEN: ${{ github.token }}
        run: bash .github/scripts/workflows/bmt_workflow.sh post-started-pending

  # ─────────────────── No supported legs: post success skip status ───────────────────
  post-skipped-status:
    name: 03b Post skipped status (no supported BMT)
    needs: [bmt-context, send-run-payload]
    if: needs.send-run-payload.outputs.has_legs != 'true'
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.bmt-context.outputs.head_sha }}

      - name: Post success commit status (no supported BMT legs)
        env:
          REPOSITORY: ${{ github.repository }}
          HEAD_SHA: ${{ needs.bmt-context.outputs.head_sha }}
          GITHUB_TOKEN: ${{ github.token }}
        run: bash .github/scripts/workflows/bmt_workflow.sh post-skipped-success-status

  # ─────────────────── On workflow failure: post failure status so PR is not stuck pending ───────────────────
  post-failure-status:
    name: 07 Post failure status (workflow failed)
    needs: [bmt-context, vm-handshake]
    if: failure() && needs.bmt-context.result == 'success'
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.bmt-context.outputs.head_sha }}

      - name: GCP Auth (WIF)
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ env.GCP_WIF_PROVIDER }}
          service_account: ${{ env.GCP_SA_EMAIL }}

      - name: Setup Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Post failure commit status
        env:
          REPOSITORY: ${{ github.repository }}
          HEAD_SHA: ${{ needs.bmt-context.outputs.head_sha }}
          GITHUB_TOKEN: ${{ github.token }}
          VM_HANDSHAKE_RESULT: ${{ needs.vm-handshake.result }}
          RUN_ID: ${{ github.run_id }}
        run: bash .github/scripts/workflows/bmt_workflow.sh post-failure-status

      - name: Post PR comment (did not run)
        if: needs.bmt-context.outputs.pr_number != ''
        env:
          REPOSITORY: ${{ github.repository }}
          PR_NUMBER: ${{ needs.bmt-context.outputs.pr_number }}
          GITHUB_TOKEN: ${{ github.token }}
          VM_HANDSHAKE_RESULT: ${{ needs.vm-handshake.result }}
        run: bash .github/scripts/workflows/bmt_workflow.sh post-failure-pr-comment

      - name: Cleanup failed run trigger artifacts (best effort)
        env:
          WORKFLOW_RUN_ID: ${{ github.run_id }}
        run: bash .github/scripts/workflows/bmt_workflow.sh cleanup-failed-trigger-artifacts

      - name: Stop VM after workflow failure (best effort)
        run: bash .github/scripts/workflows/bmt_workflow.sh stop-vm-best-effort

  # ─────────────────── When bmt-context (or earlier) failed: post failure using workflow_dispatch inputs ───────────────────
  post-failure-status-no-context:
    name: 08 Post failure status (no context)
    needs: [bmt-context]
    if: failure() && needs.bmt-context.result == 'failure'
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.head_sha || github.sha }}

      - name: Post failure commit status
        env:
          REPOSITORY: ${{ github.repository }}
          HEAD_SHA: ${{ github.event.inputs.head_sha || github.sha }}
          GITHUB_TOKEN: ${{ github.token }}
        run: bash .github/scripts/workflows/bmt_workflow.sh post-no-context-failure-status

      - name: Post PR comment (did not run)
        if: needs.bmt-context.outputs.pr_number != ''
        env:
          REPOSITORY: ${{ github.repository }}
          PR_NUMBER: ${{ needs.bmt-context.outputs.pr_number }}
          GITHUB_TOKEN: ${{ github.token }}
        run: bash .github/scripts/workflows/bmt_workflow.sh post-no-context-pr-comment
