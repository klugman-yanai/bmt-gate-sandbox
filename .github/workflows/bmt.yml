# Single BMT workflow: runs after the build workflow ("CI") succeeds.
# Downloads runner artifacts from that run, pushes to GCS, triggers VM, handshake, posts pending.
# For prod: add this alongside the main build workflow (e.g. resources/core-main-workflow.yml);
# the build workflow must upload runner artifacts so this workflow can push them.
name: BMT
run-name: "BMT • ${{ github.event.workflow_run.head_branch }} • ${{ github.event.workflow_run.head_sha }}"

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    # No branch filter - allows PRs targeting dev to trigger BMT

concurrency:
  group: bmt-${{ github.event.workflow_run.head_sha }}
  cancel-in-progress: true

permissions:
  contents: read
  id-token: write
  statuses: write
  actions: read

env:
  GCS_BUCKET: ${{ vars.GCS_BUCKET }}
  GCP_WIF_PROVIDER: ${{ vars.GCP_WIF_PROVIDER }}
  GCP_SA_EMAIL: ${{ vars.GCP_SA_EMAIL }}
  GCP_ZONE: ${{ vars.GCP_ZONE }}
  BMT_VM_NAME: ${{ vars.BMT_VM_NAME }}
  BMT_STATUS_CONTEXT: ${{ vars.BMT_STATUS_CONTEXT }}
  BMT_DESCRIPTION_PENDING: ${{ vars.BMT_DESCRIPTION_PENDING }}
  PYTHONPATH: .github/scripts

jobs:
  # ─────────────────── 00 Gate on build success ───────────────────
  guard:
    name: 00 Guard
    runs-on: ubuntu-22.04
    if: |
      github.event.workflow_run.conclusion == 'success' && (
        github.event.workflow_run.head_branch == 'dev' ||
        (github.event.workflow_run.event == 'pull_request' &&
         github.event.workflow_run.pull_requests != null &&
         github.event.workflow_run.pull_requests[0].base.ref == 'dev')
      )
    steps:
      - run: echo "Build succeeded (dev branch or PR to dev) — proceeding with BMT"

  # ─────────────────── 01 Matrix: which BMTs requested (from presets) ───────────────────
  extract-bmt-presets:
    name: 01 Matrix (BMTs requested)
    needs: guard
    runs-on: ubuntu-22.04
    outputs:
      runner-matrix: ${{ steps.parse.outputs.runner_matrix }}
    steps:
      - name: Checkout (source branch)
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Parse gcc_Release presets
        id: parse
        run: |
          runner_matrix=$(jq -c '{include:
            [ .configurePresets[]
              | select(.name | test("_gcc_Release$"))
              | select(.name | test("xtensa|hexagon") | not)
              | { configure: .name,
                  preset: (.name | ascii_downcase),
                  project: (.name | sub("_gcc_Release$"; "") | ascii_downcase),
                  binary_dir: (.binaryDir | sub("\\$\\{sourceDir\\}/"; "")) }
            ]}' CMakePresets.json)
          echo "runner_matrix=$runner_matrix" >>"$GITHUB_OUTPUT"
          echo "::notice::Runner matrix: $runner_matrix"

  # ─────────────────── 02 GCP auth + runners pushed to GCS (from build artifacts) ───────────────────
  upload-runners:
    name: 02 Auth & Runners ${{ matrix.project }}
    needs: extract-bmt-presets
    runs-on: ubuntu-22.04
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.extract-bmt-presets.outputs.runner-matrix) }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Download runner artifact
        uses: actions/download-artifact@v4
        with:
          name: runner-${{ matrix.preset }}
          path: artifact
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: GCP Auth (WIF)
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ env.GCP_WIF_PROVIDER }}
          service_account: ${{ env.GCP_SA_EMAIL }}

      - name: Setup Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Gcloud auth status
        run: gcloud auth list

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Upload runner to GCS
        run: |
          set -euo pipefail
          RUNNER_DIR="artifact/${{ matrix.binary_dir }}/Runners"
          LIB_DIR="artifact/${{ matrix.binary_dir }}/Kardome"

          LIB_ARG=""
          if [ -d "$LIB_DIR" ]; then
            LIB_ARG="--lib-dir $LIB_DIR"
          fi

          chmod +x "$RUNNER_DIR/kardome_runner" 2>/dev/null || true

          uv run python ./.github/scripts/ci_driver.py upload-runner \
            --bucket "$GCS_BUCKET" \
            --bucket-prefix "${BMT_BUCKET_PREFIX:-}" \
            --runner-dir "$RUNNER_DIR" \
            $LIB_ARG \
            --project "${{ matrix.project }}" \
            --preset "${{ matrix.preset }}" \
            --source-ref "${{ github.event.workflow_run.head_sha }}"

  # ─────────────────── 03 Handshake begin (trigger written to GCS) ───────────────────
  send-run-payload:
    name: 03 Handshake begin (trigger to GCS)
    needs: [upload-runners, extract-bmt-presets]
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: GCP Auth (WIF)
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ env.GCP_WIF_PROVIDER }}
          service_account: ${{ env.GCP_SA_EMAIL }}

      - name: Setup Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Build BMT matrix
        id: matrix
        run: uv run python ./.github/scripts/ci_driver.py matrix --config-root remote --project-filter "${BMT_PROJECTS:-}"

      - name: Show BMT matrix handshake
        run: |
          set -euo pipefail

          ALL_RUNNERS=$(jq -c '[.include[].project] | unique | sort' <<'EOF'
          ${{ needs.extract-bmt-presets.outputs.runner-matrix }}
          EOF
          )

          BMT_PROJECTS=$(jq -c '[.include[].project] | unique | sort' <<'EOF'
          ${{ steps.matrix.outputs.matrix }}
          EOF
          )

          echo "## BMT Matrix Handshake" >>"$GITHUB_STEP_SUMMARY"
          echo "" >>"$GITHUB_STEP_SUMMARY"
          echo "| Project | Runners Uploaded | BMT Enabled | Status |" >>"$GITHUB_STEP_SUMMARY"
          echo "|---------|------------------|-------------|--------|" >>"$GITHUB_STEP_SUMMARY"

          echo "$ALL_RUNNERS" | jq -r '.[]' | while read -r proj; do
            if echo "$BMT_PROJECTS" | jq -e --arg p "$proj" 'index($p)' >/dev/null; then
              echo "| $proj | ✓ | ✓ | Will run |" >>"$GITHUB_STEP_SUMMARY"
            else
              echo "| $proj | ✓ | - | Skipped (no BMT config) |" >>"$GITHUB_STEP_SUMMARY"
            fi
          done

          echo "" >>"$GITHUB_STEP_SUMMARY"
          echo "**Total runners uploaded:** $(echo "$ALL_RUNNERS" | jq 'length')" >>"$GITHUB_STEP_SUMMARY"
          echo "**BMT legs to run:** $(echo "$BMT_PROJECTS" | jq 'length')" >>"$GITHUB_STEP_SUMMARY"

      - name: Write run trigger to GCS
        id: trigger
        run: |
          set -euo pipefail
          PR_ARGS=""
          if [ "${{ github.event.workflow_run.event }}" = "pull_request" ] && [ "${{ github.event.workflow_run.pull_requests != null }}" = "true" ]; then
            PR_NUM="${{ github.event.workflow_run.pull_requests[0].number }}"
            if [ -n "$PR_NUM" ]; then
              PR_ARGS="--pr-number $PR_NUM"
            fi
          fi

          uv run python ./.github/scripts/ci_driver.py trigger \
            --config-root remote \
            --bucket "$GCS_BUCKET" \
            --bucket-prefix "${BMT_BUCKET_PREFIX:-}" \
            --matrix-json '${{ steps.matrix.outputs.matrix }}' \
            --run-context "${{ github.event.workflow_run.event == 'pull_request' && 'pr' || 'dev' }}" \
            $PR_ARGS

  # ─────────────────── 04 VM woken up ───────────────────
  start-vm:
    name: 04 VM woken up
    needs: send-run-payload
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: GCP Auth (WIF)
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ env.GCP_WIF_PROVIDER }}
          service_account: ${{ env.GCP_SA_EMAIL }}

      - name: Setup Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Start BMT VM
        run: uv run python ./.github/scripts/ci_driver.py start-vm

  # ─────────────────── 05 Matrix: accepted vs unsupported (VM handshake response) ───────────────────
  vm-handshake:
    name: 05 Matrix accepted vs unsupported
    needs: [send-run-payload, start-vm]
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: GCP Auth (WIF)
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ env.GCP_WIF_PROVIDER }}
          service_account: ${{ env.GCP_SA_EMAIL }}

      - name: Setup Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Wait for VM handshake ack
        id: handshake
        run: |
          set -euo pipefail
          uv run python ./.github/scripts/ci_driver.py wait-handshake \
            --bucket "$GCS_BUCKET" \
            --bucket-prefix "${BMT_BUCKET_PREFIX:-}" \
            --workflow-run-id "${{ github.run_id }}" \
            --timeout-sec "${BMT_HANDSHAKE_TIMEOUT_SEC:-180}" \
            --poll-interval-sec 5

      - name: Show VM handshake summary
        run: |
          set -euo pipefail
          ACK_PAYLOAD='${{ steps.handshake.outputs.handshake_payload }}'
          echo "## VM Handshake Response" >>"$GITHUB_STEP_SUMMARY"
          echo "" >>"$GITHUB_STEP_SUMMARY"
          echo "- Ack URI: \`${{ steps.handshake.outputs.handshake_uri }}\`" >>"$GITHUB_STEP_SUMMARY"
          echo "- Requested legs: **${{ steps.handshake.outputs.handshake_requested_leg_count }}**" >>"$GITHUB_STEP_SUMMARY"
          echo "- Accepted legs: **${{ steps.handshake.outputs.handshake_accepted_leg_count }}**" >>"$GITHUB_STEP_SUMMARY"
          echo "" >>"$GITHUB_STEP_SUMMARY"
          echo "| Project | BMT ID | Run ID |" >>"$GITHUB_STEP_SUMMARY"
          echo "|---------|--------|--------|" >>"$GITHUB_STEP_SUMMARY"
          echo "$ACK_PAYLOAD" | jq -r '.accepted_legs[] | "| \(.project) | \(.bmt_id) | \(.run_id) |"' >>"$GITHUB_STEP_SUMMARY"
          if echo "$ACK_PAYLOAD" | jq -e '.rejected_legs | length > 0' >/dev/null; then
            echo "" >>"$GITHUB_STEP_SUMMARY"
            echo "### Rejected Legs" >>"$GITHUB_STEP_SUMMARY"
            echo "" >>"$GITHUB_STEP_SUMMARY"
            echo "| Index | Reason |" >>"$GITHUB_STEP_SUMMARY"
            echo "|-------|--------|" >>"$GITHUB_STEP_SUMMARY"
            echo "$ACK_PAYLOAD" | jq -r '.rejected_legs[] | "| \(.index) | \(.reason) |"' >>"$GITHUB_STEP_SUMMARY"
          fi

  # ─────────────────── 06 Pending VM response → End workflow ───────────────────
  post-pending-status:
    name: 06 Pending VM response
    needs: vm-handshake
    runs-on: ubuntu-22.04
    steps:
      - name: Post pending commit status
        run: |
          STATUS_CONTEXT="${BMT_STATUS_CONTEXT:-BMT Gate}"
          STATUS_DESC="${BMT_DESCRIPTION_PENDING:-BMT running on VM; status will update when complete.}"
          curl -sS -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${{ github.token }}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${{ github.repository }}/statuses/${{ github.event.workflow_run.head_sha }}" \
            -d "$(jq -n --arg c "$STATUS_CONTEXT" --arg d "$STATUS_DESC" '{state:"pending",context:$c,description:$d}')"
