name: BMT Handoff
run-name: "BMT Handoff • ${{ inputs.head_branch || github.event.inputs.head_branch }} • ${{ inputs.head_sha || github.event.inputs.head_sha || github.sha }}"

on:
  workflow_dispatch:
    inputs:
      ci_run_id:
        description: "CI workflow run ID (for artifact download)"
        required: true
      head_sha:
        description: "Head commit SHA"
        required: true
      head_branch:
        description: "Head branch name"
        required: true
      head_event:
        description: "Event that triggered CI (pull_request or push)"
        required: false
        default: "push"
      pr_number:
        description: "PR number (if head_event is pull_request)"
        required: false
  workflow_call:
    inputs:
      ci_run_id:
        description: "CI workflow run ID (for artifact download)"
        required: true
        type: string
      head_sha:
        description: "Head commit SHA"
        required: true
        type: string
      head_branch:
        description: "Head branch name"
        required: true
        type: string
      head_event:
        description: "Event that triggered CI (pull_request or push)"
        required: false
        type: string
        default: "push"
      pr_number:
        description: "PR number (if head_event is pull_request)"
        required: false
        type: string
        default: ""

concurrency:
  group: bmt-${{ github.repository }}-${{ inputs.head_branch || github.event.inputs.head_branch || github.ref_name || github.sha }}
  cancel-in-progress: true

env:
  GCS_BUCKET: ${{ vars.GCS_BUCKET }}
  GCP_WIF_PROVIDER: ${{ vars.GCP_WIF_PROVIDER }}
  GCP_SA_EMAIL: ${{ vars.GCP_SA_EMAIL }}
  GCP_PROJECT: ${{ vars.GCP_PROJECT }}
  GCP_ZONE: ${{ vars.GCP_ZONE }}
  BMT_VM_NAME: ${{ vars.BMT_VM_NAME }}
  BMT_PROJECTS: ${{ vars.BMT_PROJECTS }}
  BMT_STATUS_CONTEXT: ${{ vars.BMT_STATUS_CONTEXT }}
  BMT_RUNTIME_CONTEXT: ${{ vars.BMT_RUNTIME_CONTEXT }}
  BMT_RUNTIME_BACKEND: ${{ vars.BMT_RUNTIME_BACKEND }}
  BMT_CLOUD_RUN_JOB: ${{ vars.BMT_CLOUD_RUN_JOB }}
  BMT_CLOUD_RUN_REGION: ${{ vars.BMT_CLOUD_RUN_REGION }}
  BMT_HANDSHAKE_TIMEOUT_SEC: ${{ vars.BMT_HANDSHAKE_TIMEOUT_SEC }}

jobs:
  prepare:
    name: 01 Prepare Context
    runs-on: ubuntu-22.04
    permissions:
      contents: read
    outputs:
      run_id: ${{ steps.prepare.outputs.run_id }}
      head_sha: ${{ steps.prepare.outputs.head_sha }}
      head_branch: ${{ steps.prepare.outputs.head_branch }}
      head_event: ${{ steps.prepare.outputs.head_event }}
      pr_number: ${{ steps.prepare.outputs.pr_number }}
      runner_matrix: ${{ steps.prepare.outputs.runner_matrix }}
    steps:
      - name: Checkout (attempt 1)
        id: checkout-prepare-1
        uses: actions/checkout@v4
        continue-on-error: true
        with:
          repository: ${{ github.repository }}
          ref: ${{ inputs.head_sha || github.event.inputs.head_sha || github.sha }}
          fetch-depth: 1
          submodules: false
          lfs: false
          persist-credentials: false

      - name: Backoff before checkout retry
        if: steps.checkout-prepare-1.outcome == 'failure'
        run: sleep 10

      - name: Checkout (attempt 2, full clone)
        if: steps.checkout-prepare-1.outcome == 'failure'
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository }}
          ref: ${{ inputs.head_sha || github.event.inputs.head_sha || github.sha }}
          fetch-depth: 0
          submodules: false
          lfs: false
          persist-credentials: false

      - name: Verify checkout ref
        shell: bash
        run: |
          echo "::notice::Checkout HEAD=$(git rev-parse HEAD) requested_ref=${{ inputs.head_sha || github.event.inputs.head_sha || github.sha }}"

      - id: prepare
        uses: ./.github/actions/bmt-prepare
        with:
          ci_run_id: ${{ inputs.ci_run_id || github.event.inputs.ci_run_id }}
          head_sha: ${{ inputs.head_sha || github.event.inputs.head_sha || github.sha }}
          head_branch: ${{ inputs.head_branch || github.event.inputs.head_branch }}
          head_event: ${{ inputs.head_event || github.event.inputs.head_event || 'push' }}
          pr_number: ${{ inputs.pr_number || github.event.inputs.pr_number }}

  upload-runners:
    name: 02 Upload Runners • ${{ matrix.project }}
    needs: prepare
    runs-on: ubuntu-22.04
    continue-on-error: true
    permissions:
      contents: read
      actions: read
      id-token: write
    strategy:
      fail-fast: false
      max-parallel: 3
      matrix: ${{ fromJson(needs.prepare.outputs.runner_matrix) }}
    steps:
      - name: Checkout (attempt 1)
        id: checkout-upload-1
        uses: actions/checkout@v4
        continue-on-error: true
        with:
          repository: ${{ github.repository }}
          ref: ${{ needs.prepare.outputs.head_sha }}
          fetch-depth: 1
          submodules: false
          lfs: false
          persist-credentials: false

      - name: Backoff before checkout retry
        if: steps.checkout-upload-1.outcome == 'failure'
        run: sleep 10

      - name: Checkout (attempt 2, full clone)
        if: steps.checkout-upload-1.outcome == 'failure'
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository }}
          ref: ${{ needs.prepare.outputs.head_sha }}
          fetch-depth: 0
          submodules: false
          lfs: false
          persist-credentials: false

      - name: Download runner artifact
        uses: actions/download-artifact@v4
        with:
          name: runner-${{ matrix.preset }}
          path: artifact
          run-id: ${{ needs.prepare.outputs.run_id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: true
        id: download

      - name: Warn and skip if artifact missing
        if: steps.download.outcome == 'failure'
        env:
          PROJECT: ${{ matrix.project }}
          PRESET: ${{ matrix.preset }}
        run: bash .github/bmt/scripts/bmt_workflow.sh warn-artifact-missing

      - name: Setup GCP and uv
        if: steps.download.outcome == 'success'
        uses: ./.github/actions/setup-gcp-uv
        with:
          workload_identity_provider: ${{ env.GCP_WIF_PROVIDER }}
          service_account: ${{ env.GCP_SA_EMAIL }}
          python_version: "3.12"

      - name: Upload runner to GCS
        if: steps.download.outcome == 'success'
        id: upload
        env:
          PROJECT: ${{ matrix.project }}
          PRESET: ${{ matrix.preset }}
          SOURCE_REF: ${{ needs.prepare.outputs.head_sha }}
        run: bash .github/bmt/scripts/bmt_workflow.sh upload-runner-to-gcs
        continue-on-error: true

      - name: Warn if GCS upload failed
        if: steps.download.outcome == 'success' && steps.upload.outcome == 'failure'
        env:
          PROJECT: ${{ matrix.project }}
          PRESET: ${{ matrix.preset }}
        run: bash .github/bmt/scripts/bmt_workflow.sh warn-upload-failed

      - name: Record uploaded project marker
        if: steps.download.outcome == 'success' && steps.upload.outcome == 'success'
        env:
          WORKFLOW_RUN_ID: ${{ github.run_id }}
          PROJECT: ${{ matrix.project }}
        run: bash .github/bmt/scripts/bmt_workflow.sh record-uploaded-project-marker

  classify-handoff:
    name: 03 Classify Handoff Path
    needs: [prepare, upload-runners]
    if: ${{ needs.prepare.result == 'success' }}
    runs-on: ubuntu-22.04
    permissions:
      contents: read
      id-token: write
    outputs:
      path: ${{ steps.classify.outputs.path }}
      has_legs: ${{ steps.classify.outputs.has_legs || 'false' }}
      accepted_projects: ${{ steps.classify.outputs.accepted_projects || '[]' }}
      filtered_matrix: ${{ steps.classify.outputs.filtered_matrix || '{"include":[]}' }}
      runner_matrix: ${{ needs.prepare.outputs.runner_matrix }}
      head_sha: ${{ needs.prepare.outputs.head_sha }}
      head_branch: ${{ needs.prepare.outputs.head_branch }}
      head_event: ${{ needs.prepare.outputs.head_event }}
      pr_number: ${{ needs.prepare.outputs.pr_number }}
    steps:
      - name: Checkout (attempt 1)
        id: checkout-classify-1
        uses: actions/checkout@v4
        continue-on-error: true
        with:
          repository: ${{ github.repository }}
          ref: ${{ needs.prepare.outputs.head_sha }}
          fetch-depth: 1
          submodules: false
          lfs: false
          persist-credentials: false

      - name: Backoff before checkout retry
        if: steps.checkout-classify-1.outcome == 'failure'
        run: sleep 10

      - name: Checkout (attempt 2, full clone)
        if: steps.checkout-classify-1.outcome == 'failure'
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository }}
          ref: ${{ needs.prepare.outputs.head_sha }}
          fetch-depth: 0
          submodules: false
          lfs: false
          persist-credentials: false

      - id: classify
        uses: ./.github/actions/bmt-classify-handoff
        with:
          head_sha: ${{ needs.prepare.outputs.head_sha }}
          runner_matrix: ${{ needs.prepare.outputs.runner_matrix }}
          workload_identity_provider: ${{ env.GCP_WIF_PROVIDER }}
          service_account: ${{ env.GCP_SA_EMAIL }}

  handoff:
    name: 04 Handoff (Run or Skip)
    needs: [prepare, classify-handoff]
    if: ${{ always() && needs.prepare.result != 'cancelled' }}
    runs-on: ubuntu-22.04
    permissions:
      contents: read
      id-token: write
      actions: read
    outputs:
      path: ${{ steps.route.outputs.path }}
      trigger_written: ${{ steps.normalize.outputs.trigger_written }}
      handshake_ok: ${{ steps.normalize.outputs.handshake_ok }}
      handshake_uri: ${{ steps.normalize.outputs.handshake_uri }}
      vm_started: ${{ steps.normalize.outputs.vm_started }}
      handoff_reason: ${{ steps.normalize.outputs.handoff_reason }}
      run_step_outcome: ${{ steps.normalize.outputs.run_step_outcome }}
    steps:
      - name: Checkout (attempt 1)
        id: checkout-handoff-1
        uses: actions/checkout@v4
        continue-on-error: true
        with:
          repository: ${{ github.repository }}
          ref: ${{ needs.prepare.outputs.head_sha || github.sha }}
          fetch-depth: 1
          submodules: false
          lfs: false
          persist-credentials: false

      - name: Backoff before checkout retry
        if: steps.checkout-handoff-1.outcome == 'failure'
        run: sleep 10

      - name: Checkout (attempt 2, full clone)
        if: steps.checkout-handoff-1.outcome == 'failure'
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository }}
          ref: ${{ needs.prepare.outputs.head_sha || github.sha }}
          fetch-depth: 0
          submodules: false
          lfs: false
          persist-credentials: false

      - name: Resolve classified handoff path
        id: route
        shell: bash
        run: |
          path="${{ needs.classify-handoff.outputs.path }}"
          if [[ -z "$path" ]]; then
            path="unknown"
          fi
          case "$path" in
            run|skip_no_legs|unknown) ;;
            *)
              echo "::warning::Unexpected classify-handoff path '${path}'. Treating as unknown."
              path="unknown"
              ;;
          esac
          echo "path=${path}" >>"$GITHUB_OUTPUT"
          echo "::notice::Handoff route=${path} classify_result=${{ needs.classify-handoff.result }}"

      - name: Write skip summary (No Legs)
        if: ${{ steps.route.outputs.path == 'skip_no_legs' }}
        uses: ./.github/actions/bmt-write-summary
        with:
          mode: skip
          repository: ${{ github.repository }}
          head_sha: ${{ needs.prepare.outputs.head_sha || inputs.head_sha || github.event.inputs.head_sha || github.sha }}
          head_branch: ${{ needs.prepare.outputs.head_branch || inputs.head_branch || github.event.inputs.head_branch || github.ref_name }}
          head_event: ${{ needs.prepare.outputs.head_event || inputs.head_event || github.event.inputs.head_event || 'push' }}
          pr_number: ${{ needs.prepare.outputs.pr_number || inputs.pr_number || github.event.inputs.pr_number }}
          routing_decision: skip_no_legs
          runner_matrix: ${{ needs.classify-handoff.outputs.runner_matrix || needs.prepare.outputs.runner_matrix || '{"include":[]}' }}
          accepted_projects: ${{ needs.classify-handoff.outputs.accepted_projects || '[]' }}
          filtered_matrix: ${{ needs.classify-handoff.outputs.filtered_matrix || '{"include":[]}' }}
          handoff_state_line: "Handoff complete: no supported uploaded legs to hand off."

      - name: Run handoff (Trigger + VM Ack)
        id: run
        if: ${{ steps.route.outputs.path == 'run' }}
        continue-on-error: true
        uses: ./.github/actions/bmt-handoff-run
        with:
          head_sha: ${{ needs.prepare.outputs.head_sha || inputs.head_sha || github.event.inputs.head_sha || github.sha }}
          head_branch: ${{ needs.prepare.outputs.head_branch || inputs.head_branch || github.event.inputs.head_branch || github.ref_name }}
          head_event: ${{ needs.prepare.outputs.head_event || inputs.head_event || github.event.inputs.head_event || 'push' }}
          pr_number: ${{ needs.prepare.outputs.pr_number || inputs.pr_number || github.event.inputs.pr_number }}
          filtered_matrix: ${{ needs.classify-handoff.outputs.filtered_matrix || '{"include":[]}' }}
          runner_matrix: ${{ needs.classify-handoff.outputs.runner_matrix || needs.prepare.outputs.runner_matrix || '{"include":[]}' }}
          accepted_projects: ${{ needs.classify-handoff.outputs.accepted_projects || '[]' }}
          workload_identity_provider: ${{ env.GCP_WIF_PROVIDER }}
          service_account: ${{ env.GCP_SA_EMAIL }}

      - name: Normalize handoff outputs
        id: normalize
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          path="${{ steps.route.outputs.path }}"
          trigger_written="false"
          handshake_ok="false"
          handshake_uri=""
          vm_started="false"
          handoff_reason=""
          run_step_outcome="${{ steps.run.outcome || 'skipped' }}"

          if [[ "$path" == "run" ]]; then
            trigger_written="${{ steps.run.outputs.trigger_written || 'false' }}"
            handshake_ok="${{ steps.run.outputs.handshake_ok || 'false' }}"
            handshake_uri="${{ steps.run.outputs.handshake_uri || '' }}"
            vm_started="${{ steps.run.outputs.vm_started || 'false' }}"
            handoff_reason="${{ steps.run.outputs.handoff_reason || '' }}"
            if [[ -z "$handoff_reason" ]]; then
              if [[ "$run_step_outcome" == "success" ]]; then
                handoff_reason="ok"
              else
                handoff_reason="handoff_run_failed"
              fi
            fi
          elif [[ "$path" == "skip_no_legs" ]]; then
            handoff_reason="skip_no_legs"
            run_step_outcome="skipped"
          else
            handoff_reason="invalid_route"
            run_step_outcome="skipped"
          fi

          {
            echo "trigger_written=${trigger_written}"
            echo "handshake_ok=${handshake_ok}"
            echo "handshake_uri=${handshake_uri}"
            echo "vm_started=${vm_started}"
            echo "handoff_reason=${handoff_reason}"
            echo "run_step_outcome=${run_step_outcome}"
          } >>"$GITHUB_OUTPUT"

  finalize:
    name: 05 Finalize BMT
    needs: [prepare, classify-handoff, handoff]
    if: ${{ always() && needs.prepare.result != 'cancelled' }}
    runs-on: ubuntu-22.04
    permissions:
      contents: read
      id-token: write
      statuses: write
    steps:
      - name: Checkout (attempt 1)
        id: checkout-finalize-1
        uses: actions/checkout@v4
        continue-on-error: true
        with:
          repository: ${{ github.repository }}
          ref: ${{ needs.prepare.outputs.head_sha || github.sha }}
          fetch-depth: 1
          submodules: false
          lfs: false
          persist-credentials: false

      - name: Backoff before checkout retry
        if: steps.checkout-finalize-1.outcome == 'failure'
        run: sleep 10

      - name: Checkout (attempt 2, full clone)
        if: steps.checkout-finalize-1.outcome == 'failure'
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository }}
          ref: ${{ needs.prepare.outputs.head_sha || github.sha }}
          fetch-depth: 0
          submodules: false
          lfs: false
          persist-credentials: false

      - name: Compute final state
        id: final
        shell: bash
        run: |
          set -euo pipefail
          should_fail="false"
          path="${{ needs.handoff.outputs.path || 'unknown' }}"
          run_step_outcome="${{ needs.handoff.outputs.run_step_outcome || 'skipped' }}"
          handoff_reason="${{ needs.handoff.outputs.handoff_reason || '' }}"

          if [[ "${{ needs.prepare.result }}" != "success" ]]; then
            should_fail="true"
          fi
          if [[ "${{ needs.classify-handoff.result }}" == "failure" ]]; then
            should_fail="true"
          fi
          if [[ "$path" == "run" && "$run_step_outcome" != "success" ]]; then
            should_fail="true"
          fi
          if [[ "$path" == "unknown" ]]; then
            should_fail="true"
          fi

          {
            echo "should_fail=${should_fail}"
            echo "path=${path}"
            echo "run_step_outcome=${run_step_outcome}"
            echo "handoff_reason=${handoff_reason}"
          } >>"$GITHUB_OUTPUT"

      - name: Write canonical final summary
        if: always()
        shell: bash
        run: |
          {
            echo "## BMT Final State"
            echo
            echo "| Signal | Value |"
            echo "|---|---|"
            echo "| prepare_result | \`${{ needs.prepare.result }}\` |"
            echo "| classify_result | \`${{ needs.classify-handoff.result }}\` |"
            echo "| routing_path | \`${{ steps.final.outputs.path }}\` |"
            echo "| handoff_step_outcome | \`${{ steps.final.outputs.run_step_outcome }}\` |"
            echo "| handoff_reason | \`${{ steps.final.outputs.handoff_reason || 'n/a' }}\` |"
            echo "| trigger_written | \`${{ needs.handoff.outputs.trigger_written || 'false' }}\` |"
            echo "| vm_started | \`${{ needs.handoff.outputs.vm_started || 'false' }}\` |"
            echo "| handshake_ok | \`${{ needs.handoff.outputs.handshake_ok || 'false' }}\` |"
            echo "| handshake_uri | \`${{ needs.handoff.outputs.handshake_uri || 'n/a' }}\` |"
            echo "| final_result | \`${{ steps.final.outputs.should_fail == 'true' && 'failure' || 'success' }}\` |"
          } >>"$GITHUB_STEP_SUMMARY"

      - name: Failure fallback
        if: steps.final.outputs.should_fail == 'true'
        uses: ./.github/actions/bmt-failure-fallback
        with:
          prepare_result: ${{ needs.prepare.result }}
          prepare_head_sha: ${{ needs.prepare.outputs.head_sha }}
          prepare_head_branch: ${{ needs.prepare.outputs.head_branch }}
          prepare_head_event: ${{ needs.prepare.outputs.head_event }}
          prepare_pr_number: ${{ needs.prepare.outputs.pr_number }}
          prepare_runner_matrix: ${{ needs.prepare.outputs.runner_matrix }}
          classify_path: ${{ needs.handoff.outputs.path || needs.classify-handoff.outputs.path || 'unknown' }}
          classify_has_legs: ${{ needs.classify-handoff.outputs.has_legs || 'false' }}
          classify_accepted_projects: ${{ needs.classify-handoff.outputs.accepted_projects || '[]' }}
          classify_filtered_matrix: ${{ needs.classify-handoff.outputs.filtered_matrix || '{"include":[]}' }}
          classify_result: ${{ needs.classify-handoff.result }}
          handoff_run_trigger_written: ${{ needs.handoff.outputs.trigger_written || 'false' }}
          handoff_run_vm_started: ${{ needs.handoff.outputs.vm_started || 'false' }}
          handoff_run_handshake_ok: ${{ needs.handoff.outputs.handshake_ok || 'false' }}
          handoff_run_handshake_uri: ${{ needs.handoff.outputs.handshake_uri || '' }}
          handoff_run_handoff_reason: ${{ needs.handoff.outputs.handoff_reason || '' }}
          handoff_run_result: ${{ needs.handoff.outputs.path == 'run' && needs.handoff.outputs.run_step_outcome == 'success' && 'success' || needs.handoff.outputs.path == 'run' && 'failure' || 'success' }}
          handoff_skip_result: ${{ needs.handoff.outputs.path == 'skip_no_legs' && 'success' || 'success' }}
          dispatch_head_sha: ${{ inputs.head_sha || github.event.inputs.head_sha }}
          dispatch_pr_number: ${{ inputs.pr_number || github.event.inputs.pr_number }}
          fallback_ref: ${{ github.sha }}
          workload_identity_provider: ${{ env.GCP_WIF_PROVIDER }}
          service_account: ${{ env.GCP_SA_EMAIL }}
          bmt_status_context: ${{ vars.BMT_STATUS_CONTEXT }}

      - name: Set final result
        if: always()
        shell: bash
        run: |
          if [[ "${{ steps.final.outputs.should_fail }}" == "true" ]]; then
            echo "::error::BMT finalize marked this handoff flow as failed."
            exit 1
          fi
          echo "::notice::BMT finalize marked this handoff flow as successful."
