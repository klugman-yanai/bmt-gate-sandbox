# Thin trigger on default branch: runs the image build workflow *from the specified branch*.
# Use this so "just build" can run the workflow file from your current branch (not default).
# Merge this file to the repo's default branch once; then: gh workflow run trigger-image-build.yml -f branch=<your-branch>
name: Trigger Image Build (from branch)

on:
  workflow_dispatch:
    inputs:
      branch:
        description: "Branch whose bmt-vm-image-build.yml to run (default: main)"
        required: false
        default: main
        type: string

permissions:
  contents: read

jobs:
  trigger:
    name: Run image build from branch
    runs-on: ubuntu-latest
    steps:
      - name: Call BMT Image Build from branch
        uses: ./.github/workflows/bmt-vm-image-build.yml@${{ inputs.branch }}
