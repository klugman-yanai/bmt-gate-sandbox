# Dispatches the image build workflow on a given branch (uses run step; ref in uses: cannot be dynamic).
# just build uses: gh workflow run trigger-image-build.yml --ref <current-branch> -f branch=<current-branch>
# Trigger file can live on any branch; --ref makes GitHub use the workflow from that branch.
# Branch input is optional: when omitted (e.g. target repo has older workflow), we use github.ref_name.
name: Trigger Image Build (from branch)

on:
  workflow_dispatch:
    inputs:
      branch:
        description: "Branch to run bmt-vm-image-build.yml from (default: this workflow's ref)"
        required: false
        type: string

permissions:
  contents: read

jobs:
  trigger:
    name: Run image build from branch
    runs-on: ubuntu-latest
    steps:
      - name: Dispatch image build on branch
        id: dispatch
        run: |
          REF="${{ inputs.branch || github.ref_name }}"
          gh workflow run bmt-vm-image-build.yml --repo "${{ github.repository }}" --ref "$REF"
          sleep 5
          RUN_ID=$(gh run list --workflow bmt-vm-image-build.yml --repo "${{ github.repository }}" --branch "$REF" --limit 1 --json databaseId -q '.[0].databaseId')
          echo "run_id=$RUN_ID" >> $GITHUB_OUTPUT
      - name: Watch image build
        run: gh run watch ${{ steps.dispatch.outputs.run_id }} --repo "${{ github.repository }}" --exit-status
