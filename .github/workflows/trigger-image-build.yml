# Thin trigger: runs the image build workflow from the same ref this run was dispatched on.
# just build uses: gh workflow run trigger-image-build.yml --ref <branch> so the run is on your branch.
name: Trigger Image Build (from branch)

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  trigger:
    name: Run image build from branch
    runs-on: ubuntu-latest
    steps:
      - name: Call BMT Image Build from branch
        uses: ./.github/workflows/bmt-vm-image-build.yml@${{ github.ref_name }}
