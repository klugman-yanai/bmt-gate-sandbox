# Dummy "CI" workflow: represents resources/core-main-workflow.yml for this repo only.
# Does not run the real build (not compatible with this repo). Uploads placeholder runner
# artifacts so the BMT workflow can run (runners are already in GCS; BMT just needs
# artifact names to exist). Replace this with the real build workflow in prod.
name: CI

on:
  workflow_dispatch:
  push:
    branches: [dev]
  pull_request:
    branches: [dev]

defaults:
  run:
    shell: bash

jobs:
  # ─────────────────────── 1) Extract preset list (same shape as core-main-workflow) ───────────────────────
  extract-presets:
    name: Extract presets
    runs-on: ubuntu-latest
    outputs:
      runner-matrix: ${{ steps.parse.outputs.runner_matrix }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Parse gcc_Release presets (dummy – for BMT artifact names only)
        id: parse
        run: |
          runner_matrix=$(jq -c '{include:
            [ .configurePresets[]
              | select(.name | test("_gcc_Release$"))
              | select(.name | test("xtensa|hexagon") | not)
              | { configure: .name,
                  preset: (.name | ascii_downcase),
                  project: (.name | sub("_gcc_Release$"; "") | ascii_downcase),
                  binary_dir: (.binaryDir | sub("\\$\\{sourceDir\\}/"; "")) }
            ]}' CMakePresets.json)
          echo "runner_matrix=$runner_matrix" >>"$GITHUB_OUTPUT"
          echo "::notice::Dummy CI runner matrix: $runner_matrix"

  # ─────────────────────── 2) Dummy build (represents all build jobs in core-main-workflow) ───────────────────────
  build:
    name: Dummy build ${{ matrix.project }}
    needs: extract-presets
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.extract-presets.outputs.runner-matrix) }}
    steps:
      - name: Dummy build step (no real compile)
        run: echo "Dummy build for ${{ matrix.preset }} — runners already in GCS"

      - name: Upload placeholder runner artifact (for BMT workflow)
        run: |
          set -euo pipefail
          BD="${{ matrix.binary_dir }}"
          mkdir -p "staging/$BD/Runners" "staging/$BD/Kardome"
          touch "staging/$BD/Runners/kardome_runner"
          touch "staging/$BD/Kardome/libKardome.so"
          chmod +x "staging/$BD/Runners/kardome_runner"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: runner-${{ matrix.preset }}
          path: staging
          retention-days: 1
