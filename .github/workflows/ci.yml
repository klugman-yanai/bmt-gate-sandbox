# Dummy "CI" workflow: mirrors job/step structure of resources/core-main-workflow.yml
# (which cannot be modified). Runs on push or PR to dev; BMT runs after this completes.
# Dummy builds one job per project (filtered by BMT_PROJECTS; default "sk" for test env).
name: CI

on:
  workflow_dispatch:
  push:
    branches: [dev]
  pull_request:
    branches: [dev]

defaults:
  run:
    shell: bash

env:
  # One build job per project; default "sk" for test env. Set repo var BMT_PROJECTS to override.
  BMT_PROJECTS: ${{ vars.BMT_PROJECTS }}

jobs:
  # ─────────────────────── 1) one preset per project (gcc_Release only; filtered) ───────────────────────
  extract-presets:
    runs-on: ubuntu-latest
    outputs:
      presets: ${{ steps.parse.outputs.presets }}
    steps:
      - name: Checkout source for preset parsing
        uses: actions/checkout@v4
        with:
          repository: ${{ github.event_name == 'pull_request_target' && github.event.pull_request.head.repo.full_name || github.repository }}
          ref: ${{ github.event_name == 'pull_request_target' && github.event.pull_request.head_sha || github.sha }}
          fetch-depth: 1

      - name: Parse CMakePresets.json (one preset per project, gcc_Release only)
        id: parse
        run: |
          ALLOWED="${BMT_PROJECTS:-sk}"
          ALLOWED_JSON=$(echo "$ALLOWED" | jq -Rc 'split(",") | map(gsub("^ +| +$"; "") | ascii_downcase)')
          presets=$(jq -c --argjson allowed "$ALLOWED_JSON" '
            [ .configurePresets[]
              | select(.name | test("_gcc_Release$"))
              | select(.name | test("xtensa|hexagon") | not)
              | (.name | sub("_gcc_Release$"; "") | ascii_downcase) as $proj
              | select($allowed | index($proj))
              | { configure: .name, build: (.name + "-build"), short: .name }
            ] | unique_by(.configure)' CMakePresets.json)
          echo "presets=$presets" >>"$GITHUB_OUTPUT"
          echo "::notice::Building one job per project (BMT_PROJECTS=${ALLOWED}): $presets"

  # ─────────────────────── 2) build every preset ────────────────────────
  build:
    needs: extract-presets
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJson(needs.extract-presets.outputs.presets) }}

    env:
      GRADLE_USER_HOME: ${{ github.workspace }}/.gradle

    steps:
      - name: Checkout source to build
        uses: actions/checkout@v4
        with:
          repository: ${{ github.event_name == 'pull_request_target' && github.event.pull_request.head.repo.full_name || github.repository }}
          ref: ${{ github.event_name == 'pull_request_target' && github.event.pull_request.head_sha        || github.sha }}
          fetch-depth: 1
          submodules: false
          lfs: false
          persist-credentials: false

      - name: Disk space (before)
        run: df -h

      - name: Free disk space on runner
        run: "true"

      - name: Fix Hardcoded Paths and Install Deps for webOS Toolchains
        run: "true"

      - name: Install CMake 3.29.3
        run: "true"

      - name: Install MinGW (64-bit)
        if: contains(matrix.configure, 'mingw') || contains(matrix.build, 'mingw')
        run: "true"

      - name: Configure ( ${{ matrix.configure }} )
        continue-on-error: ${{ contains(matrix.configure, 'xtensa') || contains(matrix.build, 'xtensa') || contains(matrix.configure, 'hexagon') || contains(matrix.build, 'hexagon') }}
        run: "true"

      - name: Build ( ${{ matrix.short }} )
        continue-on-error: ${{ contains(matrix.configure, 'xtensa') || contains(matrix.build, 'xtensa') || contains(matrix.configure, 'hexagon') || contains(matrix.build, 'hexagon') }}
        run: |
          set -euo pipefail
          # In the real workflow the build produces runners at build/<Project>/gcc_Release/Runners/kardome_runner.
          # For the dummy we create the same layout so "Upload runner artifact" can upload from those paths.
          cfg="${{ matrix.configure }}"
          if [[ "$cfg" == *"_gcc_Release"* ]] && [[ "$cfg" != *"xtensa"* ]] && [[ "$cfg" != *"hexagon"* ]]; then
            binary_dir=$(jq -r --arg name "$cfg" '.configurePresets[] | select(.name==$name) | .binaryDir' CMakePresets.json | sed 's|\${sourceDir}|.|')
            mkdir -p "$binary_dir/Runners" "$binary_dir/Kardome"
            touch "$binary_dir/Runners/kardome_runner" "$binary_dir/Kardome/libKardome.so"
            chmod +x "$binary_dir/Runners/kardome_runner"
          else
            true
          fi

      - name: Soft check (Xtensa/Hexagon)
        if: ${{ contains(matrix.configure, 'xtensa') || contains(matrix.build, 'xtensa') || contains(matrix.configure, 'hexagon') || contains(matrix.build, 'hexagon') }}
        run: "true"

      - name: Strict check (non-embedded)
        if: ${{ ! (contains(matrix.configure, 'xtensa') || contains(matrix.build, 'xtensa') || contains(matrix.configure, 'hexagon') || contains(matrix.build, 'hexagon')) }}
        run: "true"

      - name: Compute preset info
        id: preset-info
        if: contains(matrix.configure, '_gcc_Release') && !contains(matrix.configure, 'xtensa') && !contains(matrix.configure, 'hexagon')
        run: |
          set -euo pipefail
          preset=$(echo "${{ matrix.configure }}" | tr '[:upper:]' '[:lower:]')
          project=$(echo "${{ matrix.configure }}" | sed 's/_gcc_Release$//' | tr '[:upper:]' '[:lower:]')
          binary_dir=$(jq -r --arg name "${{ matrix.configure }}" \
            '.configurePresets[] | select(.name==$name) | .binaryDir' CMakePresets.json \
            | sed 's|\${sourceDir}|.|')
          echo "preset=$preset" >>"$GITHUB_OUTPUT"
          echo "project=$project" >>"$GITHUB_OUTPUT"
          echo "runners_dir=${binary_dir}/Runners" >>"$GITHUB_OUTPUT"
          echo "lib_dir=${binary_dir}/Kardome" >>"$GITHUB_OUTPUT"

      - name: Upload runner artifact
        if: steps.preset-info.outcome == 'success'
        uses: actions/upload-artifact@v4
        with:
          name: runner-${{ steps.preset-info.outputs.preset }}
          path: |
            ${{ steps.preset-info.outputs.runners_dir }}/kardome_runner
            ${{ steps.preset-info.outputs.lib_dir }}/libKardome.so
          retention-days: 1
          if-no-files-found: warn

      - name: Disk space (after)
        if: always()
        run: "true"

      - name: Cleanup heavy dirs
        if: always()
        run: "true"

  # ─────────────────────── 3) Trigger BMT via workflow_dispatch (using GitHub App token) ───────────────────────
  trigger-bmt:
    name: Trigger BMT
    needs: build
    if: success()
    runs-on: ubuntu-latest
    steps:
      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ secrets.APP_TEST_ID }}
          private-key: ${{ secrets.APP_TEST_PRIVATE_KEY }}
          permission-actions: write

      - name: Resolve head ref and event
        id: head
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            echo "head_sha=${{ github.event.pull_request.head.sha }}" >>"$GITHUB_OUTPUT"
            echo "head_branch=${{ github.event.pull_request.head.ref }}" >>"$GITHUB_OUTPUT"
            echo "head_event=pull_request" >>"$GITHUB_OUTPUT"
            echo "pr_number=${{ github.event.pull_request.number }}" >>"$GITHUB_OUTPUT"
          else
            echo "head_sha=${{ github.sha }}" >>"$GITHUB_OUTPUT"
            echo "head_branch=${{ github.ref_name }}" >>"$GITHUB_OUTPUT"
            echo "head_event=push" >>"$GITHUB_OUTPUT"
            echo "pr_number=" >>"$GITHUB_OUTPUT"
          fi

      - name: Trigger BMT workflow
        run: |
          REF="refs/heads/${{ steps.head.outputs.head_branch }}"
          URL="https://api.github.com/repos/${{ github.repository }}/actions/workflows/bmt.yml/dispatches"
          BODY=$(jq -n \
            --arg ref "$REF" \
            --arg run_id "${{ github.run_id }}" \
            --arg head_sha "${{ steps.head.outputs.head_sha }}" \
            --arg head_branch "${{ steps.head.outputs.head_branch }}" \
            --arg head_event "${{ steps.head.outputs.head_event }}" \
            --arg pr_number "${{ steps.head.outputs.pr_number }}" \
            '{ref: $ref, inputs: {ci_run_id: $run_id, head_sha: $head_sha, head_branch: $head_branch, head_event: $head_event, pr_number: $pr_number}}')
          HTTP=$(curl -sS -w '%{http_code}' -o /tmp/dispatch_resp -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${{ steps.app-token.outputs.token }}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "$URL" -d "$BODY")
          if [ "$HTTP" != "204" ]; then
            echo "Workflow dispatch returned HTTP $HTTP. Response:"
            cat /tmp/dispatch_resp
            exit 1
          fi
