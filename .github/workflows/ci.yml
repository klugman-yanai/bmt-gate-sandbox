name: Sandbox CI
run-name: "BMT Gate • ${{ github.event_name }} • ${{ github.ref_name }}"

on:
  pull_request:
    branches: [dev]
  push:
    branches: [dev]

concurrency:
  group: bmt-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  id-token: write

env:
  GCS_BUCKET: ${{ vars.GCS_BUCKET }}
  GCP_WIF_PROVIDER: ${{ vars.GCP_WIF_PROVIDER }}
  GCP_SA_EMAIL: ${{ vars.GCP_SA_EMAIL }}
  GCP_ZONE: ${{ vars.GCP_ZONE }}
  VM_NAME: ${{ vars.BMT_VM_NAME }}
  BMT_BUCKET_PREFIX: ${{ vars.BMT_BUCKET_PREFIX || '' }}
  BMT_PROJECTS: ${{ vars.BMT_PROJECTS || '' }}
  BMT_TIMEOUT_SEC: ${{ vars.BMT_TIMEOUT_SEC || '2700' }}
  BMT_MAX_PARALLEL: ${{ vars.BMT_MAX_PARALLEL || '1' }}

jobs:
  prepare-matrix:
    name: 01 Discover Matrix
    runs-on: ubuntu-22.04
    outputs:
      matrix: ${{ steps.matrix.outputs.matrix }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build project+BMT matrix
        id: matrix
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import json
          import os
          from pathlib import Path

          root = Path("remote")
          projects_cfg = json.loads((root / "bmt_projects.json").read_text(encoding="utf-8")).get("projects", {})

          project_filter_raw = os.environ.get("BMT_PROJECTS", "").replace(",", " ").split()
          project_filter = set(item.strip() for item in project_filter_raw if item.strip())

          include = []
          for project_id, project_cfg in projects_cfg.items():
              if not isinstance(project_cfg, dict):
                  continue
              if not bool(project_cfg.get("enabled", True)):
                  continue
              if project_filter and project_id not in project_filter:
                  continue

              jobs_rel = str(project_cfg.get("jobs_config", "")).strip()
              if not jobs_rel:
                  continue
              jobs_path = root / jobs_rel
              if not jobs_path.is_file():
                  raise SystemExit(f"Missing jobs config: {jobs_path}")

              jobs_cfg = json.loads(jobs_path.read_text(encoding="utf-8"))
              for bmt_id, bmt_cfg in jobs_cfg.get("bmts", {}).items():
                  if isinstance(bmt_cfg, dict) and bool(bmt_cfg.get("enabled", True)):
                      include.append({"project": project_id, "bmt_id": bmt_id})

          if not include:
              raise SystemExit("No enabled project+BMT rows found for CI matrix")

          matrix = json.dumps({"include": include}, separators=(",", ":"))
          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as fh:
              fh.write(f"matrix={matrix}\\n")
          PY

  bmt:
    needs: prepare-matrix
    runs-on: ubuntu-22.04
    strategy:
      fail-fast: false
      max-parallel: ${{ fromJson(env.BMT_MAX_PARALLEL) }}
      matrix: ${{ fromJson(needs.prepare-matrix.outputs.matrix) }}
    name: 02 BMT / ${{ matrix.project }}.${{ matrix.bmt_id }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Preflight config
        run: |
          set -euo pipefail
          missing=0
          for key in GCS_BUCKET GCP_WIF_PROVIDER GCP_SA_EMAIL GCP_ZONE VM_NAME; do
            if [[ -z "${!key:-}" ]]; then
              echo "::error::Missing required workflow input: ${key}"
              missing=1
            fi
          done
          if [[ "${missing}" -ne 0 ]]; then
            exit 1
          fi

      - name: GCP Auth (WIF)
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ env.GCP_WIF_PROVIDER }}
          service_account: ${{ env.GCP_SA_EMAIL }}

      - name: Setup Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Trigger cloud BMT (timed)
        id: trigger
        if: always()
        run: |
          set -euo pipefail

          set +e
          timeout "${BMT_TIMEOUT_SEC}s" python3 ./.github/scripts/trigger_cloud_bmt.py \
            "$VM_NAME" \
            "$GCP_ZONE" \
            "$GCS_BUCKET" \
            "${{ matrix.project }}" \
            "${{ matrix.bmt_id }}" \
            "${{ github.event_name == 'pull_request' && 'pr' || 'dev' }}" \
            "$BMT_BUCKET_PREFIX"
          rc=$?
          set -e

          result="trigger_fail"
          if [[ "$rc" -eq 0 ]]; then
            result="trigger_pass"
          elif [[ "$rc" -eq 124 || "$rc" -eq 137 ]]; then
            result="trigger_timeout"
          fi

          echo "trigger_result=${result}" >> "$GITHUB_OUTPUT"
          echo "trigger_exit=${rc}" >> "$GITHUB_OUTPUT"
          echo "Trigger result: ${result} (exit=${rc})"

      - name: Collect BMT outcome
        id: collect
        if: always()
        run: |
          set -euo pipefail
          OUTCOME_PATH=".bmt_outcomes/${{ matrix.project }}.${{ matrix.bmt_id }}.json"
          python3 ./.github/scripts/collect_bmt_outcome.py \
            "$GCS_BUCKET" \
            "$BMT_BUCKET_PREFIX" \
            "${{ matrix.project }}" \
            "${{ matrix.bmt_id }}" \
            "${{ steps.trigger.outputs.trigger_result }}" \
            "${{ steps.trigger.outputs.trigger_exit }}" \
            "$OUTCOME_PATH"
          echo "outcome_path=${OUTCOME_PATH}" >> "$GITHUB_OUTPUT"

      - name: Upload BMT outcome artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bmt-outcome-${{ matrix.project }}-${{ matrix.bmt_id }}
          path: ${{ steps.collect.outputs.outcome_path }}
          if-no-files-found: error
          retention-days: 14

      - name: Evaluate matrix leg
        if: always()
        run: |
          set -euo pipefail
          python3 - "${{ steps.collect.outputs.outcome_path }}" "${{ matrix.project }}" "${{ matrix.bmt_id }}" <<'PY'
          import json
          import os
          import sys
          from pathlib import Path

          outcome_path = Path(sys.argv[1])
          project = sys.argv[2]
          bmt_id = sys.argv[3]

          data = json.loads(outcome_path.read_text(encoding="utf-8"))
          status = str(data.get("status", "fail")).lower()
          reason = str(data.get("reason_code", "unknown"))
          score = data.get("scores", {}).get("aggregate_score")
          delta = data.get("scores", {}).get("delta_from_previous")

          step_summary = os.environ.get("GITHUB_STEP_SUMMARY")
          if step_summary:
              with open(step_summary, "a", encoding="utf-8") as fh:
                  fh.write("### Matrix Leg\n")
                  fh.write("| Project.BMT | Status | Reason | Score | Delta |\n")
                  fh.write("|---|---|---|---:|---:|\n")
                  fh.write(
                      f"| {project}.{bmt_id} | {status} | {reason} | "
                      + ("" if score is None else f"{score}")
                      + " | "
                      + ("" if delta is None else f"{delta}")
                      + " |\n"
                  )

          if status == "pass":
              print(f"::notice::{project}.{bmt_id} PASS ({reason})")
              raise SystemExit(0)
          if status == "warning":
              print(f"::warning::{project}.{bmt_id} WARNING ({reason})")
              raise SystemExit(0)
          if status == "timeout":
              print(f"::error::{project}.{bmt_id} TIMEOUT ({reason})")
              raise SystemExit(1)
          if status == "fail":
              print(f"::error::{project}.{bmt_id} FAIL ({reason})")
              raise SystemExit(1)

          print(f"::error::{project}.{bmt_id} unknown status: {status}")
          raise SystemExit(1)
          PY

  aggregate-report:
    name: 03 Aggregate Outcomes
    if: always()
    needs: bmt
    runs-on: ubuntu-22.04
    outputs:
      decision: ${{ steps.aggregate.outputs.decision }}
      pass_count: ${{ steps.aggregate.outputs.pass_count }}
      warning_count: ${{ steps.aggregate.outputs.warning_count }}
      fail_count: ${{ steps.aggregate.outputs.fail_count }}
      timeout_count: ${{ steps.aggregate.outputs.timeout_count }}
      total_count: ${{ steps.aggregate.outputs.total_count }}
      blocked_legs: ${{ steps.aggregate.outputs.blocked_legs }}
    steps:
      - name: Download matrix outcome artifacts
        continue-on-error: true
        uses: actions/download-artifact@v4
        with:
          pattern: bmt-outcome-*
          path: .bmt_outcomes
          merge-multiple: true

      - name: Aggregate outcomes
        id: aggregate
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import json
          import os
          from pathlib import Path

          base = Path(".bmt_outcomes")
          files = sorted(base.rglob("*.json")) if base.exists() else []

          counts = {"pass": 0, "warning": 0, "fail": 0, "timeout": 0}
          rows = []
          blocked_legs = []

          for path in files:
              data = json.loads(path.read_text(encoding="utf-8"))
              project = str(data.get("project", "unknown"))
              bmt_id = str(data.get("bmt_id", "unknown"))
              status = str(data.get("status", "fail")).lower()
              reason = str(data.get("reason_code", "unknown"))
              score = data.get("scores", {}).get("aggregate_score")
              delta = data.get("scores", {}).get("delta_from_previous")

              if status not in counts:
                  status = "fail"
                  reason = "invalid_status"

              counts[status] += 1
              rows.append(
                  {
                      "project": project,
                      "bmt_id": bmt_id,
                      "status": status,
                      "reason": reason,
                      "score": score,
                      "delta": delta,
                  }
              )
              if status in {"fail", "timeout"}:
                  blocked_legs.append(f"{project}.{bmt_id}")

          if counts["timeout"] > 0:
              decision = "timeout"
          elif counts["fail"] > 0:
              decision = "rejected"
          elif counts["warning"] > 0:
              decision = "accepted_with_warnings"
          elif sum(counts.values()) > 0:
              decision = "accepted"
          else:
              decision = "timeout"

          summary_lines = [
              "## BMT Matrix Outcomes",
              "",
              f"Final decision: **{decision}**",
              "",
              "| Project | BMT | Status | Reason | Aggregate Score | Delta |",
              "|---|---|---|---|---:|---:|",
          ]

          if rows:
              for row in sorted(rows, key=lambda item: (item["project"], item["bmt_id"])):
                  score = "" if row["score"] is None else f"{row['score']}"
                  delta = "" if row["delta"] is None else f"{row['delta']}"
                  summary_lines.append(
                      f"| {row['project']} | {row['bmt_id']} | {row['status']} | {row['reason']} | {score} | {delta} |"
                  )
          else:
              summary_lines.append("| - | - | timeout | no_outcomes_found |  |  |")

          summary_lines.extend(
              [
                  "",
                  "Execution flow: Discover Matrix -> Matrix BMT legs -> Aggregate Outcomes -> Final Gate",
                  "",
                  f"Pass: {counts['pass']}",
                  f"Warnings: {counts['warning']}",
                  f"Fails: {counts['fail']}",
                  f"Timeouts: {counts['timeout']}",
                  f"Blockers: {', '.join(sorted(blocked_legs)) if blocked_legs else 'none'}",
              ]
          )

          step_summary = os.environ.get("GITHUB_STEP_SUMMARY")
          if step_summary:
              with open(step_summary, "a", encoding="utf-8") as fh:
                  fh.write("\n".join(summary_lines) + "\n")

          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as fh:
              fh.write(f"decision={decision}\n")
              fh.write(f"pass_count={counts['pass']}\n")
              fh.write(f"warning_count={counts['warning']}\n")
              fh.write(f"fail_count={counts['fail']}\n")
              fh.write(f"timeout_count={counts['timeout']}\n")
              fh.write(f"total_count={sum(counts.values())}\n")
              fh.write(f"blocked_legs={','.join(sorted(blocked_legs))}\n")
          PY

  final-gate:
    if: always()
    needs: aggregate-report
    runs-on: ubuntu-22.04
    name: final-gate
    steps:
      - name: Enforce final gate decision
        run: |
          set -euo pipefail
          decision="${{ needs.aggregate-report.outputs.decision }}"
          pass_count="${{ needs.aggregate-report.outputs.pass_count }}"
          warning_count="${{ needs.aggregate-report.outputs.warning_count }}"
          fail_count="${{ needs.aggregate-report.outputs.fail_count }}"
          timeout_count="${{ needs.aggregate-report.outputs.timeout_count }}"
          blocked_legs="${{ needs.aggregate-report.outputs.blocked_legs }}"

          echo "Final decision: ${decision}"
          echo "Counts -> pass=${pass_count} warning=${warning_count} fail=${fail_count} timeout=${timeout_count}"
          echo "Blocked legs: ${blocked_legs:-none}"

          if [[ "${decision}" == "accepted" ]]; then
            echo "::notice::BMT accepted"
            exit 0
          fi

          if [[ "${decision}" == "accepted_with_warnings" ]]; then
            echo "::warning::BMT accepted with warnings"
            exit 0
          fi

          if [[ "${decision}" == "rejected" ]]; then
            echo "::error::BMT rejected due to failing matrix legs: ${blocked_legs:-unknown}"
            exit 1
          fi

          if [[ "${decision}" == "timeout" ]]; then
            echo "::error::BMT rejected due to timeout legs: ${blocked_legs:-unknown}"
            exit 1
          fi

          echo "::error::Unknown final decision: ${decision}"
          exit 1
