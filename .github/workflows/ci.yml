name: Sandbox CI
# run-name: match BMT_STATUS_CONTEXT (set via gh variable set)
run-name: "BMT Gate • ${{ github.event_name }} • ${{ github.ref_name }}"

on:
  pull_request:
    branches: [dev]
  push:
    branches: [dev]

concurrency:
  group: bmt-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  id-token: write
  statuses: write

env:
  GCS_BUCKET: ${{ vars.GCS_BUCKET }}
  GCP_WIF_PROVIDER: ${{ vars.GCP_WIF_PROVIDER }}
  GCP_SA_EMAIL: ${{ vars.GCP_SA_EMAIL }}
  GCP_ZONE: ${{ vars.GCP_ZONE }}
  BMT_VM_NAME: ${{ vars.BMT_VM_NAME }}
  BMT_STATUS_CONTEXT: ${{ vars.BMT_STATUS_CONTEXT || 'BMT Gate' }}
  BMT_DESCRIPTION_PENDING: ${{ vars.BMT_DESCRIPTION_PENDING || 'BMT running on VM; status will update when complete.' }}
  PYTHONPATH: .github/scripts

jobs:
  prepare-matrix:
    name: 01 Discover Matrix
    runs-on: ubuntu-22.04
    outputs:
      matrix: ${{ steps.matrix.outputs.matrix }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Build project+BMT matrix
        id: matrix
        run: |
          uv run --with click python ./.github/scripts/ci_driver.py matrix \
            --config-root remote \
            --project-filter "${BMT_PROJECTS:-}"

  trigger-legs:
    name: 02 Trigger All Legs
    needs: prepare-matrix
    runs-on: ubuntu-22.04
    outputs:
      manifest: ${{ steps.trigger.outputs.manifest }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: GCP Auth (WIF)
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ env.GCP_WIF_PROVIDER }}
          service_account: ${{ env.GCP_SA_EMAIL }}

      - name: Setup Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Write run trigger to GCS
        id: trigger
        run: |
          set -euo pipefail
          PR_ARGS=""
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            PR_ARGS="--pr-number ${{ github.event.pull_request.number }}"
          fi
          uv run --with click python ./.github/scripts/ci_driver.py trigger \
            --config-root remote \
            --bucket "$GCS_BUCKET" \
            --bucket-prefix "${BMT_BUCKET_PREFIX:-}" \
            --matrix-json '${{ needs.prepare-matrix.outputs.matrix }}' \
            --run-context "${{ github.event_name == 'pull_request' && 'pr' || 'dev' }}" \
            $PR_ARGS

      - name: Start BMT VM
        run: uv run --with click python ./.github/scripts/ci_driver.py start-vm

      - name: Post pending commit status
        run: |
          curl -sS -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${{ github.token }}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${{ github.repository }}/statuses/${{ github.sha }}" \
            -d "$(jq -n --arg c "$BMT_STATUS_CONTEXT" --arg d "$BMT_DESCRIPTION_PENDING" '{state:"pending",context:$c,description:$d}')"
