name: BMT Cloud Jobs Handoff
run-name: "BMT Cloud Jobs Handoff • ${{ inputs.head_branch || github.event.inputs.head_branch }} • ${{ inputs.head_sha || github.event.inputs.head_sha || github.sha }}"

on:
  workflow_dispatch:
    inputs:
      ci_run_id:
        description: >
          GitHub run ID of the workflow that triggered this handoff (e.g. build-and-test).
          Used to download runner artifacts from that run.
        required: true
        type: string
      head_sha:
        description: "Full commit SHA that BMT will run against (the ref under test)."
        required: true
        type: string
      head_branch:
        description: >
          Branch name containing head_sha; used for run list, status checks, and display.
        required: true
        type: string
      head_event:
        description: "Event that triggered the caller: push or pull_request."
        required: false
        type: string
        default: "push"
      pr_number:
        description: "PR number when head_event is pull_request; leave empty for push."
        required: false
        type: string
        default: ""
      available_artifacts:
        description: >
          JSON array of artifact names the caller uploaded (e.g. ["runner-sk_gcc_release"]).
          Upload steps for names not in this list are skipped instead of failing.
        required: false
        type: string
        default: "[]"
  workflow_call:
    inputs:
      ci_run_id:
        description: >
          GitHub run ID of the workflow that triggered this handoff (e.g. build-and-test).
          Used to download runner artifacts from that run.
        required: true
        type: string
      head_sha:
        description: "Full commit SHA that BMT will run against (the ref under test)."
        required: true
        type: string
      head_branch:
        description: >
          Branch name containing head_sha; used for run list, status checks, and display.
        required: true
        type: string
      head_event:
        description: "Event that triggered the caller: push or pull_request."
        required: false
        type: string
        default: "push"
      pr_number:
        description: "PR number when head_event is pull_request; leave empty for push."
        required: false
        type: string
        default: ""
      available_artifacts:
        description: >
          JSON array of artifact names the caller uploaded (e.g. ["runner-sk_gcc_release"]).
          Upload steps for names not in this list are skipped instead of failing.
        required: false
        type: string
        default: "[]"
    outputs:
      bmt_gate_passed:
        description: "True only when trigger dispatch succeeded and final BMT status context is success."
        value: ${{ jobs.report_gate.outputs.bmt_gate_passed }}
      bmt_fallback_run:
        description: "True if context/dispatch failed and failure-fallback path ran."
        value: ${{ jobs.report_gate.outputs.bmt_fallback_run }}

concurrency:
  group: bmt-${{ github.repository }}-${{ inputs.head_branch || github.event.inputs.head_branch || github.ref_name || github.sha }}
  cancel-in-progress: true

# Canonical input resolution (workflow_dispatch + workflow_call). Use these expressions when passing ref/run-id to steps:
#   head_sha:    inputs.head_sha || github.event.inputs.head_sha || github.sha
#   head_branch: inputs.head_branch || github.event.inputs.head_branch || github.ref_name
#   ci_run_id:   inputs.ci_run_id || github.event.inputs.ci_run_id
env:
  GCS_BUCKET: ${{ vars.GCS_BUCKET }}
  GCP_WIF_PROVIDER: ${{ vars.GCP_WIF_PROVIDER }}
  GCP_SA_EMAIL: ${{ vars.GCP_SA_EMAIL }}
  GCP_PROJECT: ${{ vars.GCP_PROJECT }}
  GCP_ZONE: ${{ vars.GCP_ZONE || 'europe-west4-a' }}
  BMT_STATUS_CONTEXT: ${{ vars.BMT_STATUS_CONTEXT || 'BMT Gate' }}

permissions:
  contents: read
  actions: read

jobs:
  # Eventarc DAG: resolve_context -> validate_runners -> dispatch_eventarc -> report_gate (waits final BMT verdict).
  resolve_context:
    name: Resolve BMT Context
    runs-on: ubuntu-22.04
    permissions:
      id-token: write
    outputs:
      run_id: ${{ steps.prepare.outputs.run_id }}
      head_sha: ${{ steps.prepare.outputs.head_sha }}
      head_branch: ${{ steps.prepare.outputs.head_branch }}
      head_event: ${{ steps.prepare.outputs.head_event }}
      pr_number: ${{ steps.prepare.outputs.pr_number }}
      run_context: ${{ steps.prepare.outputs.run_context }}
      runner_matrix: ${{ steps.prepare.outputs.runner_matrix }}
      matrix_need_upload: ${{ steps.filter.outputs.matrix_need_upload }}
      matrix_need_upload_keys: ${{ steps.filter.outputs.matrix_need_upload_keys }}
      selected_vm: ${{ '' }}
      vm_reused_running: ${{ 'false' }}
      restart_vm: ${{ 'false' }}
      stale_cleanup_count: ${{ '0' }}
      vm_started: ${{ 'false' }}
    steps:
      - name: Checkout repo
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: ${{ inputs.head_sha || github.event.inputs.head_sha || github.sha }}
          fetch-depth: 1

      - id: prepare
        uses: ./.github/actions/bmt-prepare-context
        with:
          ci_run_id: ${{ inputs.ci_run_id || github.event.inputs.ci_run_id }}
          head_sha: ${{ inputs.head_sha || github.event.inputs.head_sha || github.sha }}
          head_branch: ${{ inputs.head_branch || github.event.inputs.head_branch }}
          head_event: ${{ inputs.head_event || github.event.inputs.head_event || 'push' }}
          pr_number: ${{ inputs.pr_number || github.event.inputs.pr_number }}

      - name: Setup GCP and uv
        uses: ./.github/actions/setup-gcp-uv
        with:
          workload_identity_provider: ${{ env.GCP_WIF_PROVIDER }}
          service_account: ${{ env.GCP_SA_EMAIL }}
          python_version: "3.12"

      - id: filter
        env:
          GCS_BUCKET: ${{ env.GCS_BUCKET }}
          RUNNER_MATRIX: ${{ steps.prepare.outputs.runner_matrix }}
          HEAD_SHA: ${{ steps.prepare.outputs.head_sha }}
          GITHUB_RUN_ID: ${{ github.run_id }}
          AVAILABLE_ARTIFACTS: ${{ inputs.available_artifacts || '[]' }}
          BMT_RUNNERS_PRESEEDED_IN_GCS: "true"
        run: uv run bmt write-context && uv run bmt filter-upload-matrix

      - name: Workflow summary notice
        run: echo "::notice::Workflow will wait for final BMT status context and fail if verdict is not success."
  # Validate requested runners exist in repo (no build/upload); write marker so handoff can request real BMT from VM.
  validate_runners:
    name: Validate runner • ${{ matrix.project }}
    needs: resolve_context
    if: needs.resolve_context.outputs.matrix_need_upload_keys != '[]'
    runs-on: ubuntu-22.04
    continue-on-error: true
    permissions:
      id-token: write
    strategy:
      fail-fast: false
      max-parallel: 3
      matrix: ${{ fromJson(needs.resolve_context.outputs.matrix_need_upload || '{"include":[]}') }}
    steps:
      - name: Checkout repo
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: ${{ inputs.head_sha || github.event.inputs.head_sha || github.sha }}
          fetch-depth: 1

      - name: Setup GCP and uv
        uses: ./.github/actions/setup-gcp-uv
        with:
          workload_identity_provider: ${{ env.GCP_WIF_PROVIDER }}
          service_account: ${{ env.GCP_SA_EMAIL }}
          python_version: "3.12"

      - name: Validate requested runner exists in repo
        id: validate
        env:
          PROJECT: ${{ matrix.project }}
          PRESET: ${{ matrix.preset }}
        run: uv run bmt validate-runner-in-repo

  dispatch_eventarc:
    name: Dispatch Eventarc Trigger
    needs: [resolve_context, validate_runners]
    if: >-
      !cancelled()
      && needs.resolve_context.result == 'success'
      && (needs['validate_runners'].result == 'success' || needs['validate_runners'].result == 'skipped')
    runs-on: ubuntu-22.04
    permissions:
      id-token: write
    outputs:
      # Step-level results for failure-fallback diagnostics
      classify_result: ${{ steps.classify.outcome || 'skipped' }}
      handoff_result: ${{ steps.run-eventarc.outcome || 'skipped' }}
      # Classify outputs
      classify_path: ${{ steps.classify.outputs.path || 'unknown' }}
      has_legs: ${{ steps.classify.outputs.has_legs || 'false' }}
      accepted_projects: ${{ steps.classify.outputs.accepted_projects || '[]' }}
      filtered_matrix: ${{ steps.classify.outputs.filtered_matrix || '{"include":[]}' }}
      # Handshake-run outputs (VM ack, trigger, etc.)
      selected_vm: ${{ steps.run-eventarc.outputs.selected_vm || '' }}
      trigger_written: ${{ steps.run-eventarc.outputs.trigger_written || 'false' }}
      handshake_ok: ${{ steps.run-eventarc.outputs.handshake_ok || 'false' }}
      handshake_uri: ${{ steps.run-eventarc.outputs.handshake_uri || '' }}
      vm_started: ${{ steps.run-eventarc.outputs.vm_started || 'false' }}
      handoff_reason: ${{ steps.run-eventarc.outputs.handoff_reason || '' }}
      handshake_reason_code: ${{ steps.run-eventarc.outputs.handshake_reason_code || '' }}
      handshake_reason_detail: ${{ steps.run-eventarc.outputs.handshake_reason_detail || '' }}
      handshake_diagnostics_uri: ${{ steps.run-eventarc.outputs.handshake_diagnostics_uri || '' }}
    steps:
      - name: Checkout repo (for local actions)
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: ${{ inputs.head_sha || github.event.inputs.head_sha || github.sha }}
          fetch-depth: 1
          sparse-checkout: |
            .github
            gcp

      - name: Setup GCP and uv
        uses: ./.github/actions/setup-gcp-uv
        with:
          workload_identity_provider: ${{ env.GCP_WIF_PROVIDER }}
          service_account: ${{ env.GCP_SA_EMAIL }}
          python_version: "3.12"

      - id: classify
        uses: ./.github/actions/bmt-filter-handoff-matrix
        with:
          head_sha: ${{ needs.resolve_context.outputs.head_sha }}
          runner_matrix: ${{ needs.resolve_context.outputs.runner_matrix }}
          workload_identity_provider: ${{ env.GCP_WIF_PROVIDER }}
          service_account: ${{ env.GCP_SA_EMAIL }}
          setup_gcp: "false"

      - id: run-eventarc
        shell: bash
        env:
          FILTERED_MATRIX_JSON: ${{ steps.classify.outputs.filtered_matrix }}
          RUN_CONTEXT: ${{ needs.resolve_context.outputs.run_context }}
          HEAD_EVENT: ${{ needs.resolve_context.outputs.head_event }}
          HEAD_SHA: ${{ needs.resolve_context.outputs.head_sha }}
          HEAD_BRANCH: ${{ needs.resolve_context.outputs.head_branch }}
          PR_NUMBER: ${{ needs.resolve_context.outputs.pr_number }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          set -euo pipefail
          uv run bmt write-context
          uv run bmt write-run-trigger
          echo "selected_vm=" >> "$GITHUB_OUTPUT"
          echo "trigger_written=true" >> "$GITHUB_OUTPUT"
          echo "handshake_ok=true" >> "$GITHUB_OUTPUT"
          echo "handshake_uri=" >> "$GITHUB_OUTPUT"
          echo "vm_started=false" >> "$GITHUB_OUTPUT"
          echo "handoff_reason=ok_eventarc_trigger_written" >> "$GITHUB_OUTPUT"
          echo "handshake_reason_code=" >> "$GITHUB_OUTPUT"
          echo "handshake_reason_detail=eventarc_async" >> "$GITHUB_OUTPUT"
          echo "handshake_diagnostics_uri=" >> "$GITHUB_OUTPUT"

      - name: Write handoff summary (Eventarc trigger-only)
        uses: ./.github/actions/bmt-write-summary
        with:
          mode: run_success
          repository: ${{ github.repository }}
          head_sha: ${{ needs.resolve_context.outputs.head_sha }}
          head_branch: ${{ needs.resolve_context.outputs.head_branch }}
          pr_number: ${{ needs.resolve_context.outputs.pr_number }}
          filtered_matrix: ${{ steps.classify.outputs.filtered_matrix }}
          trigger_written: "true"
          vm_started: "false"
          handshake_ok: "true"
          handoff_state_line: "Handoff complete: trigger written to GCS; Eventarc/Workflow will execute asynchronously."
          gcp_project: ${{ env.GCP_PROJECT }}
          gcp_zone: ${{ env.GCP_ZONE }}
          gcs_bucket: ${{ env.GCS_BUCKET }}

  report_gate:
    name: Report BMT Gate Outcome
    needs: [resolve_context, dispatch_eventarc]
    if: always()
    runs-on: ubuntu-22.04
    permissions:
      id-token: write
      statuses: write
      contents: read
    outputs:
      bmt_gate_passed: ${{ steps.outcome.outputs.bmt_gate_passed }}
      bmt_fallback_run: ${{ steps.outcome.outputs.bmt_fallback_run }}
    steps:
      - id: set-fallback
        run: |
          r="${{ needs.resolve_context.result }}"
          d="${{ needs.dispatch_eventarc.result }}"
          if [[ "$r" == "failure" || "$d" == "failure" || "$r" == "cancelled" || "$d" == "cancelled" ]]; then
            echo "run_fallback=true" >> "$GITHUB_OUTPUT"
          else
            echo "run_fallback=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout repo (for local actions)
        if: steps.set-fallback.outputs.run_fallback == 'true'
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: ${{ inputs.head_sha || github.event.inputs.head_sha || github.sha }}
          fetch-depth: 1
          sparse-checkout: |
            .github
            gcp

      - uses: ./.github/actions/setup-gcp-uv
        if: steps.set-fallback.outputs.run_fallback == 'true'
        with:
          workload_identity_provider: ${{ env.GCP_WIF_PROVIDER }}
          service_account: ${{ env.GCP_SA_EMAIL }}
          python_version: "3.12"

      - name: Set BMT constants for fallback
        if: steps.set-fallback.outputs.run_fallback == 'true'
        id: bmt-constants
        run: |
          STATUS_CONTEXT=$(uv run python -c "from gcp.image.config.constants import STATUS_CONTEXT; print(STATUS_CONTEXT)")
          echo "status_context=$STATUS_CONTEXT" >> "$GITHUB_OUTPUT"
          echo "BMT_STATUS_CONTEXT=$STATUS_CONTEXT" >> "$GITHUB_ENV"

      - name: Failure fallback
        if: steps.set-fallback.outputs.run_fallback == 'true'
        uses: ./.github/actions/bmt-failure-fallback
        with:
          handshake_outputs: ${{ toJson(needs.dispatch_eventarc.outputs) }}
          setup_outputs: ${{ toJson(needs.resolve_context.outputs) }}
          prepare_result: ${{ needs.resolve_context.result }}
          classify_result: ${{ needs.dispatch_eventarc.outputs.classify_result }}
          handoff_result: ${{ needs.dispatch_eventarc.outputs.handoff_result == 'skipped' && 'success' || needs.dispatch_eventarc.outputs.handoff_result }}
          dispatch_head_sha: ${{ inputs.head_sha || github.event.inputs.head_sha }}
          dispatch_pr_number: ${{ inputs.pr_number || github.event.inputs.pr_number }}
          fallback_ref: ${{ github.sha }}
          workload_identity_provider: ${{ env.GCP_WIF_PROVIDER }}
          service_account: ${{ env.GCP_SA_EMAIL }}
          bmt_status_context: ${{ steps.bmt-constants.outputs.status_context }}

      - name: Set BMT constants for verdict wait
        if: steps.set-fallback.outputs.run_fallback != 'true'
        id: bmt-verdict-constants
        run: |
          STATUS_CONTEXT="${BMT_STATUS_CONTEXT}"
          echo "status_context=$STATUS_CONTEXT" >> "$GITHUB_OUTPUT"
          echo "BMT_STATUS_CONTEXT=$STATUS_CONTEXT" >> "$GITHUB_ENV"

      - name: Wait for final BMT status context
        if: steps.set-fallback.outputs.run_fallback != 'true'
        id: wait-verdict
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HEAD_SHA: ${{ needs.resolve_context.outputs.head_sha }}
          STATUS_CONTEXT: ${{ steps.bmt-verdict-constants.outputs.status_context }}
          TIMEOUT_SEC: "5400"
          POLL_SEC: "20"
        shell: bash
        run: |
          set -euo pipefail
          deadline=$(( $(date +%s) + TIMEOUT_SEC ))
          verdict_state=""
          verdict_target_url=""
          verdict_desc=""
          while [[ $(date +%s) -lt "$deadline" ]]; do
            status_json="$(gh api "repos/${GITHUB_REPOSITORY}/commits/${HEAD_SHA}/status")"
            match_json="$(jq -c --arg ctx "${STATUS_CONTEXT}" '[.statuses[] | select(.context == $ctx)] | first // {}' <<<"${status_json}")"
            verdict_state="$(jq -r '.state // ""' <<<"${match_json}")"
            verdict_target_url="$(jq -r '.target_url // ""' <<<"${match_json}")"
            verdict_desc="$(jq -r '.description // ""' <<<"${match_json}")"
            if [[ -z "${verdict_state}" || "${verdict_state}" == "pending" ]]; then
              sleep "${POLL_SEC}"
              continue
            fi
            break
          done

          if [[ -z "${verdict_state}" || "${verdict_state}" == "pending" ]]; then
            echo "::error::Timed out waiting for status context '${STATUS_CONTEXT}' on ${HEAD_SHA}."
            echo "verdict_state=timeout" >> "$GITHUB_OUTPUT"
            echo "verdict_passed=false" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          echo "::notice::BMT status context '${STATUS_CONTEXT}' resolved to '${verdict_state}'."
          [[ -n "${verdict_desc}" ]] && echo "::notice::${verdict_desc}"
          [[ -n "${verdict_target_url}" ]] && echo "::notice::Details: ${verdict_target_url}"
          echo "verdict_state=${verdict_state}" >> "$GITHUB_OUTPUT"
          echo "verdict_target_url=${verdict_target_url}" >> "$GITHUB_OUTPUT"
          if [[ "${verdict_state}" == "success" ]]; then
            echo "verdict_passed=true" >> "$GITHUB_OUTPUT"
          else
            echo "verdict_passed=false" >> "$GITHUB_OUTPUT"
            exit 1
          fi

      - id: outcome
        run: |
          if [[ "${{ steps.set-fallback.outputs.run_fallback }}" == "true" ]]; then
            echo "bmt_gate_passed=false" >> "$GITHUB_OUTPUT"
          else
            echo "bmt_gate_passed=${{ steps.wait-verdict.outputs.verdict_passed == 'true' }}" >> "$GITHUB_OUTPUT"
          fi
          echo "bmt_fallback_run=${{ needs.resolve_context.result != 'cancelled' && needs.dispatch_eventarc.result != 'cancelled' && (needs.resolve_context.result == 'failure' || needs.dispatch_eventarc.result == 'failure') }}" >> "$GITHUB_OUTPUT"

      - name: Fail job when BMT did not pass
        if: steps.outcome.outputs.bmt_gate_passed != 'true'
        run: |
          echo "::error::BMT gate did not pass (fallback path, timeout, or non-success final verdict)."
          exit 1
