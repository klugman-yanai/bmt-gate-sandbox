name: BMT Cloud Jobs Handoff
run-name: "BMT Cloud Jobs Handoff • ${{ inputs.head_branch || github.event.inputs.head_branch }} • ${{ inputs.head_sha || github.event.inputs.head_sha || github.sha }}"

on:
  workflow_dispatch:
    inputs:
      ci_run_id:
        description: >
          GitHub run ID of the workflow that triggered this dispatch workflow (e.g. build-and-test).
          Used to download runner artifacts from that run.
        required: true
        type: string
      head_sha:
        description: "Full commit SHA that BMT will run against (the ref under test)."
        required: true
        type: string
      head_branch:
        description: >
          Branch name containing head_sha; used for run list, status checks, and display.
        required: true
        type: string
      head_event:
        description: "Event that triggered the caller: push or pull_request."
        required: false
        type: string
        default: "push"
      pr_number:
        description: "PR number when head_event is pull_request; leave empty for push."
        required: false
        type: string
        default: ""
      available_artifacts:
        description: >
          JSON array of artifact names the caller uploaded (e.g. ["runner-sk_gcc_release"]).
          Upload steps for names not in this list are skipped instead of failing.
        required: false
        type: string
        default: "[]"
  workflow_call:
    inputs:
      ci_run_id:
        description: >
          GitHub run ID of the workflow that triggered this dispatch workflow (e.g. build-and-test).
          Used to download runner artifacts from that run.
        required: true
        type: string
      head_sha:
        description: "Full commit SHA that BMT will run against (the ref under test)."
        required: true
        type: string
      head_branch:
        description: >
          Branch name containing head_sha; used for run list, status checks, and display.
        required: true
        type: string
      head_event:
        description: "Event that triggered the caller: push or pull_request."
        required: false
        type: string
        default: "push"
      pr_number:
        description: "PR number when head_event is pull_request; leave empty for push."
        required: false
        type: string
        default: ""
      available_artifacts:
        description: >
          JSON array of artifact names the caller uploaded (e.g. ["runner-sk_gcc_release"]).
          Upload steps for names not in this list are skipped instead of failing.
        required: false
        type: string
        default: "[]"
    outputs:
      bmt_gate_passed:
        description: "True when dispatch to cloud runtime is confirmed (async execution continues outside this workflow)."
        value: ${{ jobs.confirm_gate_outcome.outputs.bmt_gate_passed }}
      bmt_dispatch_confirmed:
        description: "True when trigger dispatch to cloud runtime is confirmed."
        value: ${{ jobs.confirm_gate_outcome.outputs.bmt_dispatch_confirmed }}
      bmt_final_state:
        description: "Dispatch pipeline terminal state for this workflow (dispatched_async or dispatch_failed)."
        value: ${{ jobs.confirm_gate_outcome.outputs.bmt_final_state }}
      bmt_recovery_used:
        description: "True if context/dispatch failed and recovery fallback path ran."
        value: ${{ jobs.confirm_gate_outcome.outputs.bmt_recovery_used }}
      bmt_fallback_run:
        description: "Deprecated alias of bmt_recovery_used."
        value: ${{ jobs.confirm_gate_outcome.outputs.bmt_recovery_used }}

concurrency:
  group: bmt-${{ github.repository }}-${{ inputs.head_branch || github.event.inputs.head_branch || github.ref_name || github.sha }}
  cancel-in-progress: true

# Canonical input resolution (workflow_dispatch + workflow_call). Use these expressions when passing ref/run-id to steps:
#   head_sha:    inputs.head_sha || github.event.inputs.head_sha || github.sha
#   head_branch: inputs.head_branch || github.event.inputs.head_branch || github.ref_name
#   ci_run_id:   inputs.ci_run_id || github.event.inputs.ci_run_id
env:
  GCS_BUCKET: ${{ vars.GCS_BUCKET }}
  GCP_WIF_PROVIDER: ${{ vars.GCP_WIF_PROVIDER }}
  GCP_SA_EMAIL: ${{ vars.GCP_SA_EMAIL }}
  GCP_PROJECT: ${{ vars.GCP_PROJECT }}
  GCP_ZONE: ${{ vars.GCP_ZONE || 'europe-west4-a' }}
  BMT_STATUS_CONTEXT: ${{ vars.BMT_STATUS_CONTEXT || 'BMT Gate' }}

permissions:
  contents: read
  actions: read

jobs:
  # Cloud dispatch DAG: prepare_dispatch -> verify_runner_assets -> dispatch_cloud_trigger -> confirm_gate_outcome.
  prepare_dispatch:
    name: Prepare Dispatch Context
    runs-on: ubuntu-22.04
    permissions:
      id-token: write
    outputs:
      run_id: ${{ steps.prepare.outputs.run_id }}
      head_sha: ${{ steps.prepare.outputs.head_sha }}
      head_branch: ${{ steps.prepare.outputs.head_branch }}
      head_event: ${{ steps.prepare.outputs.head_event }}
      pr_number: ${{ steps.prepare.outputs.pr_number }}
      run_context: ${{ steps.prepare.outputs.run_context }}
      runner_matrix: ${{ steps.prepare.outputs.runner_matrix }}
      matrix_need_upload: ${{ steps.filter.outputs.matrix_need_upload }}
      matrix_need_upload_keys: ${{ steps.filter.outputs.matrix_need_upload_keys }}
    steps:
      - name: Checkout repo
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: ${{ inputs.head_sha || github.event.inputs.head_sha || github.sha }}
          fetch-depth: 1

      - id: prepare
        uses: ./.github/actions/bmt-prepare-context
        with:
          ci_run_id: ${{ inputs.ci_run_id || github.event.inputs.ci_run_id }}
          head_sha: ${{ inputs.head_sha || github.event.inputs.head_sha || github.sha }}
          head_branch: ${{ inputs.head_branch || github.event.inputs.head_branch }}
          head_event: ${{ inputs.head_event || github.event.inputs.head_event || 'push' }}
          pr_number: ${{ inputs.pr_number || github.event.inputs.pr_number }}

      - name: Setup GCP and uv
        uses: ./.github/actions/setup-gcp-uv
        with:
          workload_identity_provider: ${{ env.GCP_WIF_PROVIDER }}
          service_account: ${{ env.GCP_SA_EMAIL }}
          python_version: "3.12"

      - id: filter
        env:
          GCS_BUCKET: ${{ env.GCS_BUCKET }}
          RUNNER_MATRIX: ${{ steps.prepare.outputs.runner_matrix }}
          HEAD_SHA: ${{ steps.prepare.outputs.head_sha }}
          GITHUB_RUN_ID: ${{ github.run_id }}
          AVAILABLE_ARTIFACTS: ${{ inputs.available_artifacts || '[]' }}
          BMT_RUNNERS_PRESEEDED_IN_GCS: "true"
        run: uv run bmt write-context && uv run bmt filter-upload-matrix

      - name: Workflow summary notice
        run: echo "::notice::Workflow validates and dispatches to cloud runtime, then exits; final BMT verdict is reported asynchronously via commit status/check."
  # Validate requested runners exist in repo (no build/upload) before cloud dispatch.
  verify_runner_assets:
    name: Verify Runner Assets • ${{ matrix.project }}
    needs: prepare_dispatch
    if: needs.prepare_dispatch.outputs.matrix_need_upload_keys != '[]'
    runs-on: ubuntu-22.04
    continue-on-error: true
    permissions:
      id-token: write
    strategy:
      fail-fast: false
      max-parallel: 3
      matrix: ${{ fromJson(needs.prepare_dispatch.outputs.matrix_need_upload || '{"include":[]}') }}
    steps:
      - name: Checkout repo
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: ${{ inputs.head_sha || github.event.inputs.head_sha || github.sha }}
          fetch-depth: 1

      - name: Setup GCP and uv
        uses: ./.github/actions/setup-gcp-uv
        with:
          workload_identity_provider: ${{ env.GCP_WIF_PROVIDER }}
          service_account: ${{ env.GCP_SA_EMAIL }}
          python_version: "3.12"

      - name: Validate requested runner exists in repo
        id: validate
        env:
          PROJECT: ${{ matrix.project }}
          PRESET: ${{ matrix.preset }}
        run: uv run bmt validate-runner-in-repo

  dispatch_cloud_trigger:
    name: Dispatch Cloud Runtime Trigger
    needs: [prepare_dispatch, verify_runner_assets]
    if: >-
      !cancelled()
      && needs.prepare_dispatch.result == 'success'
      && (needs['verify_runner_assets'].result == 'success' || needs['verify_runner_assets'].result == 'skipped')
    runs-on: ubuntu-22.04
    permissions:
      id-token: write
    outputs:
      # Step-level results for failure-fallback diagnostics
      classify_result: ${{ steps.classify.outcome || 'skipped' }}
      dispatch_result: ${{ steps.run-eventarc.outcome || 'skipped' }}
      # Classify outputs
      classify_path: ${{ steps.classify.outputs.path || 'unknown' }}
      has_legs: ${{ steps.classify.outputs.has_legs || 'false' }}
      accepted_projects: ${{ steps.classify.outputs.accepted_projects || '[]' }}
      filtered_matrix: ${{ steps.classify.outputs.filtered_matrix || '{"include":[]}' }}
      # Dispatch outputs
      dispatch_confirmed: ${{ steps.run-eventarc.outputs.dispatch_confirmed || 'false' }}
      dispatch_reason: ${{ steps.run-eventarc.outputs.dispatch_reason || '' }}
      trigger_written: ${{ steps.run-eventarc.outputs.trigger_written || 'false' }}
    steps:
      - name: Checkout repo (for local actions)
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: ${{ inputs.head_sha || github.event.inputs.head_sha || github.sha }}
          fetch-depth: 1
          sparse-checkout: |
            .github
            gcp

      - name: Setup GCP and uv
        uses: ./.github/actions/setup-gcp-uv
        with:
          workload_identity_provider: ${{ env.GCP_WIF_PROVIDER }}
          service_account: ${{ env.GCP_SA_EMAIL }}
          python_version: "3.12"

      - id: classify
        uses: ./.github/actions/bmt-filter-handoff-matrix
        with:
          head_sha: ${{ needs.prepare_dispatch.outputs.head_sha }}
          runner_matrix: ${{ needs.prepare_dispatch.outputs.runner_matrix }}
          workload_identity_provider: ${{ env.GCP_WIF_PROVIDER }}
          service_account: ${{ env.GCP_SA_EMAIL }}
          setup_gcp: "false"

      - id: run-eventarc
        shell: bash
        env:
          FILTERED_MATRIX_JSON: ${{ steps.classify.outputs.filtered_matrix }}
          RUN_CONTEXT: ${{ needs.prepare_dispatch.outputs.run_context }}
          HEAD_EVENT: ${{ needs.prepare_dispatch.outputs.head_event }}
          HEAD_SHA: ${{ needs.prepare_dispatch.outputs.head_sha }}
          HEAD_BRANCH: ${{ needs.prepare_dispatch.outputs.head_branch }}
          PR_NUMBER: ${{ needs.prepare_dispatch.outputs.pr_number }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          set -euo pipefail
          uv run bmt write-context
          uv run bmt write-run-trigger
          echo "dispatch_confirmed=true" >> "$GITHUB_OUTPUT"
          echo "trigger_written=true" >> "$GITHUB_OUTPUT"
          echo "dispatch_reason=ok_eventarc_trigger_written" >> "$GITHUB_OUTPUT"

      - name: Write dispatch summary (trigger confirmed)
        uses: ./.github/actions/bmt-write-summary
        with:
          mode: run_success
          repository: ${{ github.repository }}
          head_sha: ${{ needs.prepare_dispatch.outputs.head_sha }}
          head_branch: ${{ needs.prepare_dispatch.outputs.head_branch }}
          pr_number: ${{ needs.prepare_dispatch.outputs.pr_number }}
          filtered_matrix: ${{ steps.classify.outputs.filtered_matrix }}
          trigger_written: "true"
          vm_started: "false"
          handshake_ok: "true"
          handoff_state_line: "Dispatch confirmed: trigger written to GCS; cloud runtime processing is in progress."
          gcp_project: ${{ env.GCP_PROJECT }}
          gcp_zone: ${{ env.GCP_ZONE }}
          gcs_bucket: ${{ env.GCS_BUCKET }}

  confirm_gate_outcome:
    name: Confirm Dispatch Outcome
    needs: [prepare_dispatch, dispatch_cloud_trigger]
    if: always()
    runs-on: ubuntu-22.04
    permissions:
      id-token: write
      statuses: write
      contents: read
    outputs:
      bmt_gate_passed: ${{ steps.outcome.outputs.bmt_gate_passed }}
      bmt_dispatch_confirmed: ${{ steps.outcome.outputs.bmt_dispatch_confirmed }}
      bmt_final_state: ${{ steps.outcome.outputs.bmt_final_state }}
      bmt_recovery_used: ${{ steps.outcome.outputs.bmt_recovery_used }}
    steps:
      - id: set-fallback
        run: |
          r="${{ needs.prepare_dispatch.result }}"
          d="${{ needs.dispatch_cloud_trigger.result }}"
          if [[ "$r" == "failure" || "$d" == "failure" || "$r" == "cancelled" || "$d" == "cancelled" ]]; then
            echo "run_fallback=true" >> "$GITHUB_OUTPUT"
          else
            echo "run_fallback=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout repo (for local actions)
        if: steps.set-fallback.outputs.run_fallback == 'true'
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: ${{ inputs.head_sha || github.event.inputs.head_sha || github.sha }}
          fetch-depth: 1
          sparse-checkout: |
            .github
            gcp

      - uses: ./.github/actions/setup-gcp-uv
        if: steps.set-fallback.outputs.run_fallback == 'true'
        with:
          workload_identity_provider: ${{ env.GCP_WIF_PROVIDER }}
          service_account: ${{ env.GCP_SA_EMAIL }}
          python_version: "3.12"

      - name: Set BMT constants for fallback
        if: steps.set-fallback.outputs.run_fallback == 'true'
        id: bmt-constants
        run: |
          STATUS_CONTEXT=$(uv run python -c "from gcp.image.config.constants import STATUS_CONTEXT; print(STATUS_CONTEXT)")
          echo "status_context=$STATUS_CONTEXT" >> "$GITHUB_OUTPUT"
          echo "BMT_STATUS_CONTEXT=$STATUS_CONTEXT" >> "$GITHUB_ENV"

      - name: Failure fallback
        if: steps.set-fallback.outputs.run_fallback == 'true'
        uses: ./.github/actions/bmt-failure-fallback
        with:
          handshake_outputs: ${{ toJson(needs.dispatch_cloud_trigger.outputs) }}
          setup_outputs: ${{ toJson(needs.prepare_dispatch.outputs) }}
          prepare_result: ${{ needs.prepare_dispatch.result }}
          classify_result: ${{ needs.dispatch_cloud_trigger.outputs.classify_result }}
          handoff_result: ${{ needs.dispatch_cloud_trigger.outputs.dispatch_result == 'skipped' && 'success' || needs.dispatch_cloud_trigger.outputs.dispatch_result }}
          dispatch_head_sha: ${{ inputs.head_sha || github.event.inputs.head_sha }}
          dispatch_pr_number: ${{ inputs.pr_number || github.event.inputs.pr_number }}
          fallback_ref: ${{ github.sha }}
          workload_identity_provider: ${{ env.GCP_WIF_PROVIDER }}
          service_account: ${{ env.GCP_SA_EMAIL }}
          bmt_status_context: ${{ steps.bmt-constants.outputs.status_context }}

      - id: outcome
        run: |
          if [[ "${{ steps.set-fallback.outputs.run_fallback }}" == "true" ]]; then
            echo "bmt_gate_passed=false" >> "$GITHUB_OUTPUT"
            echo "bmt_dispatch_confirmed=false" >> "$GITHUB_OUTPUT"
            echo "bmt_final_state=dispatch_failed" >> "$GITHUB_OUTPUT"
          else
            echo "bmt_gate_passed=${{ needs.dispatch_cloud_trigger.outputs.dispatch_confirmed == 'true' }}" >> "$GITHUB_OUTPUT"
            echo "bmt_dispatch_confirmed=${{ needs.dispatch_cloud_trigger.outputs.dispatch_confirmed == 'true' }}" >> "$GITHUB_OUTPUT"
            echo "bmt_final_state=dispatched_async" >> "$GITHUB_OUTPUT"
          fi
          echo "bmt_recovery_used=${{ needs.prepare_dispatch.result != 'cancelled' && needs.dispatch_cloud_trigger.result != 'cancelled' && (needs.prepare_dispatch.result == 'failure' || needs.dispatch_cloud_trigger.result == 'failure') }}" >> "$GITHUB_OUTPUT"

      - name: Fail job when BMT did not pass
        if: steps.outcome.outputs.bmt_gate_passed != 'true'
        run: |
          echo "::error::BMT dispatch did not complete successfully."
          exit 1
