name: BMT Cloud Jobs Handoff
run-name: "BMT Cloud Jobs Handoff • ${{ inputs.head_branch || github.event.inputs.head_branch || (github.event.pull_request && github.event.pull_request.head.ref) || github.head_ref || github.ref_name }} • ${{ inputs.head_sha || github.event.inputs.head_sha || (github.event.pull_request && github.event.pull_request.head.sha) || github.sha }}"

on:
  workflow_dispatch:
    inputs:
      ci_run_id:
        description: >
          GitHub run ID of the workflow that produced runner-* artifacts (e.g. build-and-test).
          Required for workflow_dispatch (validated at runtime). For workflow_call, omit to use
          the caller workflow run_id.
        required: false
        type: string
        default: ""
      head_sha:
        description: >
          Commit under test. Optional when using workflow_call (defaults to PR head or github.sha).
        required: false
        type: string
        default: ""
      head_branch:
        description: >
          Branch under test. Optional when using workflow_call (defaults to PR head ref or ref_name).
        required: false
        type: string
        default: ""
      head_event:
        description: "Event that triggered the caller: push or pull_request."
        required: false
        type: string
        default: "push"
      pr_number:
        description: "PR number when head_event is pull_request; leave empty for push."
        required: false
        type: string
        default: ""
      force_pass:
        description: >
          When true, handoff exits green even if dispatch fails (runs invoke-workflow --force-pass).
          Does not change cloud BMT verdict or GCS. Pass explicitly from the caller workflow (no repo var).
        required: false
        type: boolean
        default: false
      available_artifacts:
        description: >
          Optional. JSON array of runner-* artifact names. When empty or "[]" (default), Plan lists
          artifacts from the caller run via the GitHub API. Set only to override that list.
        required: false
        type: string
        default: "[]"
      cloud_run_region:
        description: GCP region for Cloud Run jobs (pass from caller workflow; default here is unused when empty).
        required: false
        type: string
        default: ""
      bmt_status_context:
        description: GitHub commit status context name (pass from caller workflow).
        required: false
        type: string
        default: ""
      bmt_pex_repo:
        description: >
          owner/repo publishing bmt.pex releases. Empty defaults to klugman-yanai/bmt-gcloud inside prepare.
        required: false
        type: string
        default: ""
      release_git_sha:
        description: >
          Optional. When non-empty, the Plan job asserts that
          gs://$GCS_BUCKET/_state/release.json.git_sha equals this value before
          dispatching cloud work, and fails fast with a ::error:: annotation on
          mismatch or missing marker. Empty (default) preserves legacy
          behaviour for cross-repo callers (e.g. Kardome-org/core-main) whose
          github.sha does not correspond to a bmt-gcloud release marker. The
          bmt-gcloud release.yml workflow passes its own github.sha here after
          the `mark` job writes the marker, closing the deployment-drift gap.
        required: false
        type: string
        default: ""
  workflow_call:
    inputs:
      ci_run_id:
        description: >
          Caller run_id listing runner-* artifacts. Omit when the handoff job runs in the same
          workflow as the build (defaults to github.run_id).
        required: false
        type: string
        default: ""
      head_sha:
        description: >
          Commit under test. Omit for workflow_call to default from github.event.pull_request or
          github.sha.
        required: false
        type: string
        default: ""
      head_branch:
        description: >
          Branch under test. Omit for workflow_call to default from the PR head or ref_name.
        required: false
        type: string
        default: ""
      head_event:
        description: "Event that triggered the caller: push or pull_request."
        required: false
        type: string
        default: "push"
      pr_number:
        description: "PR number when head_event is pull_request; leave empty for push."
        required: false
        type: string
        default: ""
      available_artifacts:
        description: >
          Optional. JSON array of runner-* artifact names. When empty or "[]" (default), Plan lists
          artifacts from the caller run via the GitHub API. Set only to override that list.
        required: false
        type: string
        default: "[]"
      force_pass:
        description: >
          When true, bmt_gate_passed is true even if dispatch fails (invoke-workflow --force-pass).
          Pass from caller workflow only (no repo var).
        required: false
        type: boolean
        default: false
      cloud_run_region:
        description: GCP region for Cloud Run (caller workflow `with:`).
        required: false
        type: string
        default: ""
      bmt_status_context:
        description: Commit status context name (caller workflow `with:`).
        required: false
        type: string
        default: ""
      bmt_pex_repo:
        description: owner/repo for bmt.pex releases (caller workflow `with:`; empty → klugman-yanai/bmt-gcloud).
        required: false
        type: string
        default: ""
      release_git_sha:
        description: >
          Optional. When non-empty, the Plan job asserts that
          gs://$GCS_BUCKET/_state/release.json.git_sha equals this value before
          dispatching cloud work, and fails fast with a ::error:: annotation on
          mismatch or missing marker. See the workflow_dispatch input of the
          same name for full semantics.
        required: false
        type: string
        default: ""
    outputs:
      bmt_gate_passed:
        description: >
          True when dispatch is confirmed, or when force_pass input enables the escape hatch
          (may be true without a cloud execution).
        value: ${{ jobs.start_bmt_workflow.outputs.bmt_gate_passed }}
      bmt_dispatch_confirmed:
        description: "True when trigger dispatch to cloud runtime is confirmed."
        value: ${{ jobs.start_bmt_workflow.outputs.bmt_dispatch_confirmed }}
      bmt_final_state:
        description: >
          Terminal state: dispatched_async, dispatch_failed, or forced_pass_dispatch_failed when
          force_pass is set without a confirmed execution.
        value: ${{ jobs.start_bmt_workflow.outputs.bmt_final_state }}
      bmt_recovery_used:
        description: "True if context/dispatch failed and recovery fallback path ran."
        value: ${{ jobs.start_bmt_workflow.outputs.bmt_recovery_used }}
      bmt_fallback_run:
        description: "Deprecated alias of bmt_recovery_used."
        value: ${{ jobs.start_bmt_workflow.outputs.bmt_recovery_used }}

concurrency:
  group: bmt-${{ github.repository }}-${{ inputs.head_branch || github.event.inputs.head_branch || (github.event.pull_request && github.event.pull_request.head.ref) || github.head_ref || github.ref_name || github.sha }}
  cancel-in-progress: true

# Resolved ref/run-id for workflow_dispatch + workflow_call (omit inputs on workflow_call to use caller github.*).
env:
  BMT_RESOLVED_CI_RUN_ID: ${{ inputs.ci_run_id || github.event.inputs.ci_run_id || github.run_id }}
  BMT_RESOLVED_HEAD_SHA: ${{ inputs.head_sha || github.event.inputs.head_sha || (github.event.pull_request && github.event.pull_request.head.sha) || github.sha }}
  BMT_RESOLVED_HEAD_BRANCH: ${{ inputs.head_branch || github.event.inputs.head_branch || (github.event.pull_request && github.event.pull_request.head.ref) || github.head_ref || github.ref_name }}
  BMT_RESOLVED_HEAD_EVENT: ${{ inputs.head_event || github.event.inputs.head_event || github.event_name }}
  BMT_RESOLVED_PR_NUMBER: ${{ inputs.pr_number || github.event.inputs.pr_number || (github.event.pull_request && format('{0}', github.event.pull_request.number)) || '' }}
  BMT_FORCE_PASS_RESOLVED: >-
    ${{
      (inputs.force_pass == true || github.event.inputs.force_pass == 'true') && 'true' || 'false'
    }}
  # vars.* below are evaluated in the CALLER repository. Cross-repo callers MUST set:
  # GCS_BUCKET, GCP_WIF_PROVIDER, GCP_SA_EMAIL, GCP_PROJECT.
  # Region, status context, PEX repo, and force_pass come from workflow_call / workflow_dispatch
  # inputs only (declare them in the caller `with:` block — no repo vars).
  #
  # PEX version: setup-bmt-pex resolves `github.action_ref` (or rolling tag
  # `bmt-handoff` → latest `bmt-v*`). Consumers pin only the reusable workflow ref,
  # e.g. `uses: .../bmt-handoff.yml@bmt-handoff` (rolling) or `@bmt-v0.3.4` (strict).
  GCS_BUCKET: ${{ vars.GCS_BUCKET }}
  GCP_WIF_PROVIDER: ${{ vars.GCP_WIF_PROVIDER }}
  GCP_SA_EMAIL: ${{ vars.GCP_SA_EMAIL }}
  GCP_PROJECT: ${{ vars.GCP_PROJECT }}
  # Defaults match docs/configuration.md and runtime/config/constants.py (DEFAULT_*).
  CLOUD_RUN_REGION: ${{ inputs.cloud_run_region || github.event.inputs.cloud_run_region || 'europe-west4' }}
  BMT_STATUS_CONTEXT: ${{ inputs.bmt_status_context || github.event.inputs.bmt_status_context || 'BMT Gate' }}
  BMT_PEX_REPO: ${{ inputs.bmt_pex_repo || github.event.inputs.bmt_pex_repo || '' }}

permissions:
  contents: read
  actions: read

jobs:
  # Cloud dispatch DAG: Plan -> Publish -> Dispatch.
  write_handoff_context:
    name: Plan
    runs-on: ubuntu-22.04
    permissions:
      contents: read
      actions: read
      pull-requests: read
      id-token: write
    outputs:
      run_id: ${{ steps.prepare.outputs.run_id }}
      head_sha: ${{ steps.prepare.outputs.head_sha }}
      head_branch: ${{ steps.prepare.outputs.head_branch }}
      head_event: ${{ steps.prepare.outputs.head_event }}
      pr_number: ${{ steps.prepare.outputs.pr_number }}
      run_context: ${{ steps.prepare.outputs.run_context }}
      runner_matrix: ${{ steps.prepare.outputs.runner_matrix }}
      matrix_need_upload: ${{ steps.filter.outputs.matrix_need_upload }}
      matrix_need_upload_keys: ${{ steps.filter.outputs.matrix_need_upload_keys }}
      matrix_publish: ${{ steps.filter.outputs.matrix_publish }}
      matrix_publish_keys: ${{ steps.filter.outputs.matrix_publish_keys }}
      matrix_no_bmt: ${{ steps.filter.outputs.matrix_no_bmt }}
      matrix_no_bmt_keys: ${{ steps.filter.outputs.matrix_no_bmt_keys }}
    steps:
      # Local composites (`./.github/actions/...`) must exist before `uses:` resolves them.
      # Keep this minimal: full tree comes later under `_layout_probe/` for `plugins/projects/`.
      - name: Checkout (.github actions + composites)
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          repository: ${{ github.repository }}
          ref: ${{ env.BMT_RESOLVED_HEAD_SHA }}
          fetch-depth: 1
          sparse-checkout: |
            .github
          sparse-checkout-cone-mode: true
      # NOTE: the Plan job does not checkout the full caller tree up front — `bmt-prepare-context`
      # only fetches `CMakePresets.json` via the API so `parse-release-runners` can emit
      # `RUNNER_MATRIX`. Before `runner filter-upload-matrix`, we still need
      # `plugins/projects/<project>/` on disk so `_project_has_bmt_stage_layout()` can see
      # `project.json` / `bmts/` (see `ci/kardome_bmt/runner.py`). Without that, every preset
      # is misclassified as `no_bmt` and SK never appears in the Publish matrix. The sparse
      # checkout below materializes only `plugins/projects/` under `_layout_probe/` and symlinks
      # it into the workspace root, leaving `.local/bmt/` from `setup-bmt-pex` untouched
      # (`actions/checkout` uses `path:` so it does not clobber the job workspace).
      - name: Require ci_run_id for direct workflow_dispatch
        if: github.event_name == 'workflow_dispatch'
        shell: bash
        run: |
          set -euo pipefail
          cid="${{ github.event.inputs.ci_run_id }}"
          if [[ -z "${cid// }" ]]; then
            echo "::error::workflow_dispatch requires input ci_run_id (Actions run_id that uploaded runner-* artifacts)."
            exit 1
          fi
      - id: prepare
        uses: ./.github/actions/bmt-prepare-context
        with:
          ci_run_id: ${{ env.BMT_RESOLVED_CI_RUN_ID }}
          head_sha: ${{ env.BMT_RESOLVED_HEAD_SHA }}
          head_branch: ${{ env.BMT_RESOLVED_HEAD_BRANCH }}
          head_event: ${{ env.BMT_RESOLVED_HEAD_EVENT }}
          pr_number: ${{ env.BMT_RESOLVED_PR_NUMBER }}
          bmt_pex_repo: ${{ env.BMT_PEX_REPO }}

      - id: runner_artifacts_index
        env:
          GH_TOKEN: ${{ github.token }}
          OVERRIDE: ${{ inputs.available_artifacts }}
          CI_RUN: ${{ env.BMT_RESOLVED_CI_RUN_ID }}
        run: |
          set -euo pipefail
          if [[ -n "${OVERRIDE}" && "${OVERRIDE}" != "[]" ]]; then
            json="${OVERRIDE}"
          else
            json=$(gh api "repos/${{ github.repository }}/actions/runs/${CI_RUN}/artifacts" \
              --paginate --jq '[.artifacts[]|select(.name|startswith("runner-"))|.name]')
          fi
          {
            echo "json<<ARTIFACTS_EOF"
            echo "$json"
            echo "ARTIFACTS_EOF"
          } >>"$GITHUB_OUTPUT"

      - name: GCP auth (WIF)
        uses: google-github-actions/auth@7c6bc770dae815cd3e89ee6cdf493a5fab2cc093 # v3
        with:
          workload_identity_provider: ${{ env.GCP_WIF_PROVIDER }}
          service_account: ${{ env.GCP_SA_EMAIL }}
          project_id: ${{ env.GCP_PROJECT }}

      - name: Setup Cloud SDK
        uses: google-github-actions/setup-gcloud@aa5489c8933f4cc7a4f7d45035b3b1440c9c10db # v3.0.1
        with:
          project_id: ${{ env.GCP_PROJECT }}
          version: ">= 363.0.0"

      - name: Stage plugins/projects for BMT layout probe
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          repository: ${{ github.repository }}
          ref: ${{ steps.prepare.outputs.head_sha }}
          fetch-depth: 1
          path: _layout_probe
          sparse-checkout: |
            plugins/projects
          sparse-checkout-cone-mode: true

      - name: Symlink plugins/projects into workspace root
        shell: bash
        run: |
          set -euo pipefail
          probe="${GITHUB_WORKSPACE}/_layout_probe/plugins/projects"
          if [[ -d "$probe" ]]; then
            mkdir -p plugins
            rm -rf "${GITHUB_WORKSPACE}/plugins/projects" 2>/dev/null || true
            ln -sfn "$probe" "${GITHUB_WORKSPACE}/plugins/projects"
          else
            echo "::notice::No plugins/projects in sparse checkout at $probe — filter-upload-matrix uses repo layout probe only when the caller mirrors bmt-gcloud."
          fi

      # Drift guard: assert bucket ``_state/release.json`` matches the commit under test
      # (see docs/architecture.md and ci/kardome_bmt/release_marker.py).
      # Opt-in: when a caller (typically bmt-gcloud's own release.yml after its `mark`
      # job succeeds) passes `release_git_sha`, we assert that the bucket's
      # `_state/release.json` marker was written for that commit before we let any
      # cloud dispatch proceed. A mismatch means release.yml did not complete for the
      # code under test, so the Cloud Run image / GCS plugins / Pulumi state downstream
      # jobs are about to consume could be stale — refuse to dispatch with an
      # actionable ::error::. Cross-repo callers (e.g. Kardome-org/core-main) don't
      # pass this input; they rely on the reusable-workflow @ref (e.g. @bmt-handoff or @bmt-v*)
      # `@ref` as their contract, so the step is a no-op for them.
      - name: Verify release marker (opt-in drift guard)
        if: ${{ (inputs.release_git_sha || github.event.inputs.release_git_sha) != '' }}
        env:
          GCS_BUCKET: ${{ env.GCS_BUCKET }}
          GITHUB_SHA: ${{ inputs.release_git_sha || github.event.inputs.release_git_sha }}
        run: |
          set -euo pipefail
          "$BMT_PEX_PATH" release verify

      - id: filter
        env:
          GCS_BUCKET: ${{ env.GCS_BUCKET }}
          RUNNER_MATRIX: ${{ steps.prepare.outputs.runner_matrix }}
          HEAD_SHA: ${{ steps.prepare.outputs.head_sha }}
          GITHUB_RUN_ID: ${{ github.run_id }}
          BMT_CI_RUN_ID: ${{ env.BMT_RESOLVED_CI_RUN_ID }}
          AVAILABLE_ARTIFACTS: ${{ steps.runner_artifacts_index.outputs.json }}
        run: |
          "$BMT_PEX_PATH" handoff write-context
          "$BMT_PEX_PATH" runner filter-upload-matrix

      - name: Workflow summary notice
        run: echo "::notice::Workflow validates and dispatches to cloud runtime, then exits; final BMT verdict is reported asynchronously via commit status/check."
  # Publish supported BMT runner binaries to GCS. Every matrix row is a supported leg;
  # `upload_action == 'upload'` gates the real upload steps, `skip_in_gcs` rows render
  # as a visible green "Skipped (already in GCS)" summary so the UI always shows the
  # project-in-cloud legs even when the bucket runner is fresh.
  publish_runners:
    name: Publish
    needs: write_handoff_context
    if: needs.write_handoff_context.outputs.matrix_publish_keys != '[]'
    runs-on: ubuntu-22.04
    continue-on-error: true
    permissions:
      contents: read
      actions: read
      id-token: write
    strategy:
      fail-fast: false
      max-parallel: 3
      matrix: ${{ fromJson(needs.write_handoff_context.outputs.matrix_publish || '{"include":[]}') }}
    env:
      BMT_CI_RUN_ID: ${{ inputs.ci_run_id || github.event.inputs.ci_run_id || github.run_id }}
    steps:
      - name: Summarize action
        # Log-only annotation; the aggregated matrix table lives in the Plan job
        # summary to avoid N per-leg sections in the workflow run summary.
        shell: bash
        run: |
          echo "::notice::${{ matrix.project }}/${{ matrix.preset }}: upload_action=${{ matrix.upload_action }} ${{ matrix.skip_reason && format('({0})', matrix.skip_reason) || '' }}"

      - name: Checkout (.github for local composites)
        if: matrix.upload_action == 'upload'
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          repository: ${{ github.repository }}
          ref: ${{ env.BMT_RESOLVED_HEAD_SHA }}
          fetch-depth: 1
          sparse-checkout: |
            .github
          sparse-checkout-cone-mode: true

      - name: GCP auth (WIF)
        if: matrix.upload_action == 'upload'
        uses: google-github-actions/auth@7c6bc770dae815cd3e89ee6cdf493a5fab2cc093 # v3
        with:
          workload_identity_provider: ${{ env.GCP_WIF_PROVIDER }}
          service_account: ${{ env.GCP_SA_EMAIL }}
          project_id: ${{ env.GCP_PROJECT }}

      - name: Setup Cloud SDK
        if: matrix.upload_action == 'upload'
        uses: google-github-actions/setup-gcloud@aa5489c8933f4cc7a4f7d45035b3b1440c9c10db # v3.0.1
        with:
          project_id: ${{ env.GCP_PROJECT }}
          version: ">= 363.0.0"

      - name: Setup BMT CLI (release PEX, no uv)
        if: matrix.upload_action == 'upload'
        # tag self-discovered from github.action_ref (bmt-v0.3.3)
        uses: ./.github/actions/setup-bmt-pex
        with:
          repo: ${{ env.BMT_PEX_REPO != '' && env.BMT_PEX_REPO || 'klugman-yanai/bmt-gcloud' }}

      - name: Download runner artifact from CI run
        if: matrix.upload_action == 'upload'
        uses: actions/download-artifact@634f93cb2916e3fdff6788551b99b062d0335ce0 # v5
        with:
          name: runner-${{ matrix.preset }}
          path: artifact-download
          github-token: ${{ secrets.GITHUB_TOKEN }}
          repository: ${{ github.repository }}
          run-id: ${{ env.BMT_RESOLVED_CI_RUN_ID }}

      - name: Normalize layout for bmt runner upload
        if: matrix.upload_action == 'upload'
        run: |
          set -euo pipefail
          mkdir -p artifact/Runners artifact/Kardome
          k=$(find artifact-download -name kardome_runner -type f ! -path '*/.*' 2>/dev/null | head -1 || true)
          l=$(find artifact-download -name libKardome.so -type f ! -path '*/.*' 2>/dev/null | head -1 || true)
          if [[ -z "$k" ]]; then
            echo "::error::kardome_runner not found in downloaded artifact runner-${{ matrix.preset }}"
            exit 1
          fi
          cp "$k" artifact/Runners/kardome_runner
          chmod +x artifact/Runners/kardome_runner
          if [[ -n "$l" ]]; then
            cp "$l" artifact/Kardome/libKardome.so
          fi

      - name: Upload runner to GCS
        if: matrix.upload_action == 'upload'
        env:
          PROJECT: ${{ matrix.project }}
          PRESET: ${{ matrix.preset }}
          SOURCE_REF: ${{ needs.write_handoff_context.outputs.head_sha }}
        run: |
          "$BMT_PEX_PATH" runner upload-to-gcs

      - name: Mark uploaded for handoff
        if: matrix.upload_action == 'upload'
        env:
          PROJECT: ${{ matrix.project }}
          PRESET: ${{ matrix.preset }}
        run: |
          "$BMT_PEX_PATH" runner validate-in-repo

  # Parallel, informational-only node: one visible green row per release preset
  # that has no cloud BMT plugin. Keeps the full matrix visible in the UI without
  # turning unsupported legs into red failures or silencing them entirely.
  acknowledge_no_bmt:
    name: No BMT
    needs: write_handoff_context
    if: needs.write_handoff_context.outputs.matrix_no_bmt_keys != '[]'
    runs-on: ubuntu-22.04
    permissions:
      contents: read
    strategy:
      fail-fast: false
      max-parallel: 6
      matrix: ${{ fromJson(needs.write_handoff_context.outputs.matrix_no_bmt || '{"include":[]}') }}
    steps:
      - name: Acknowledge
        # Log-only annotation; the aggregated matrix table in the Plan job
        # summary covers all no-BMT rows in one section.
        shell: bash
        run: |
          echo "::notice::${{ matrix.project }}/${{ matrix.preset }}: no cloud BMT plugin — acknowledged, nothing to upload."

  start_bmt_workflow:
    name: Dispatch
    # `acknowledge_no_bmt` is intentionally NOT in `needs`: it's a
    # display-only job (one green row per release preset that has no
    # cloud BMT plugin) and Dispatch doesn't read any output from it.
    # Including it in `needs` made Dispatch silently skip whenever the
    # released PEX didn't emit `matrix_no_bmt_keys` and the matrix
    # expanded to zero rows, because `needs.acknowledge_no_bmt.result`
    # then evaluates to a value that doesn't match `'success'` /
    # `'skipped'` reliably across runner versions.
    needs: [write_handoff_context, publish_runners]
    if: >-
      !cancelled()
      && needs.write_handoff_context.result == 'success'
      && needs['publish_runners'].result != 'failure'
      && needs['publish_runners'].result != 'cancelled'
    runs-on: ubuntu-22.04
    permissions:
      contents: read
      id-token: write
      statuses: write
    outputs:
      # Step-level results for diagnostics
      classify_result: ${{ steps.classify.outcome || 'skipped' }}
      dispatch_result: ${{ steps.invoke-workflow.outcome || 'skipped' }}
      verify_trigger_result: ${{ steps.invoke-workflow.outcome || 'skipped' }}
      workflow_execution_name: ${{ steps.invoke-workflow.outputs.workflow_execution_name || '' }}
      classify_path: ${{ steps.classify.outputs.path || 'unknown' }}
      has_legs: ${{ steps.classify.outputs.has_legs || 'false' }}
      accepted_projects: ${{ steps.invoke-workflow.outputs.accepted_projects || steps.classify.outputs.accepted_projects || '[]' }}
      filtered_matrix: ${{ steps.classify.outputs.filtered_matrix || '{"include":[]}' }}
      dispatch_confirmed: ${{ steps.invoke-workflow.outputs.dispatch_confirmed || 'false' }}
      dispatch_reason: ${{ steps.invoke-workflow.outputs.dispatch_reason || '' }}
      # Public workflow outputs
      bmt_gate_passed: ${{ steps.outcome.outputs.bmt_gate_passed }}
      bmt_dispatch_confirmed: ${{ steps.outcome.outputs.bmt_dispatch_confirmed }}
      bmt_final_state: ${{ steps.outcome.outputs.bmt_final_state }}
      bmt_recovery_used: ${{ steps.outcome.outputs.bmt_recovery_used }}
    steps:
      # Local composites (`./.github/actions/...`) must exist before `uses:` resolves them.
      # Unlike Plan, this job does not inherit a checkout from an earlier step.
      - name: Checkout (.github actions + composites)
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          repository: ${{ github.repository }}
          ref: ${{ env.BMT_RESOLVED_HEAD_SHA }}
          fetch-depth: 1
          sparse-checkout: |
            .github
          sparse-checkout-cone-mode: true

      - name: GCP auth (WIF)
        uses: google-github-actions/auth@7c6bc770dae815cd3e89ee6cdf493a5fab2cc093 # v3
        with:
          workload_identity_provider: ${{ env.GCP_WIF_PROVIDER }}
          service_account: ${{ env.GCP_SA_EMAIL }}
          project_id: ${{ env.GCP_PROJECT }}

      - name: Setup Cloud SDK
        uses: google-github-actions/setup-gcloud@aa5489c8933f4cc7a4f7d45035b3b1440c9c10db # v3.0.1
        with:
          project_id: ${{ env.GCP_PROJECT }}
          version: ">= 363.0.0"

      - name: Setup BMT CLI (release PEX, no uv)
        # tag self-discovered from github.action_ref (bmt-v0.3.3)
        uses: ./.github/actions/setup-bmt-pex
        with:
          repo: ${{ env.BMT_PEX_REPO != '' && env.BMT_PEX_REPO || 'klugman-yanai/bmt-gcloud' }}

      - id: classify
        uses: ./.github/actions/bmt-filter-handoff-matrix
        with:
          head_sha: ${{ needs.write_handoff_context.outputs.head_sha }}
          runner_matrix: ${{ needs.write_handoff_context.outputs.runner_matrix }}

      - name: Validate dataset inputs (fail fast if no .wav files in GCS)
        env:
          GCS_BUCKET: ${{ env.GCS_BUCKET }}
          ACCEPTED_PROJECTS: ${{ steps.classify.outputs.accepted_projects }}
        run: |
          set -euo pipefail
          "$BMT_PEX_PATH" handoff validate-dataset-inputs

      - id: invoke-workflow
        shell: bash
        env:
          FILTERED_MATRIX_JSON: ${{ steps.classify.outputs.filtered_matrix }}
          RUN_CONTEXT: ${{ needs.write_handoff_context.outputs.run_context }}
          HEAD_EVENT: ${{ needs.write_handoff_context.outputs.head_event }}
          HEAD_SHA: ${{ needs.write_handoff_context.outputs.head_sha }}
          HEAD_BRANCH: ${{ needs.write_handoff_context.outputs.head_branch }}
          PR_NUMBER: ${{ needs.write_handoff_context.outputs.pr_number }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          set -euo pipefail
          "$BMT_PEX_PATH" handoff write-context
          if [[ "${{ env.BMT_FORCE_PASS_RESOLVED }}" == "true" ]]; then
            "$BMT_PEX_PATH" dispatch invoke-workflow --force-pass
          else
            "$BMT_PEX_PATH" dispatch invoke-workflow
          fi

      - name: Persist workflow execution snapshot
        if: >-
          steps.invoke-workflow.outcome == 'success'
          && steps.invoke-workflow.outputs.dispatch_confirmed == 'true'
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p .local/diagnostics
          cat > .local/diagnostics/workflow-execution.json <<'JSON'
          {
            "workflow_execution_name": "${{ steps.invoke-workflow.outputs.workflow_execution_name }}",
            "workflow_execution_state": "${{ steps.invoke-workflow.outputs.workflow_execution_state || 'UNKNOWN' }}"
          }
          JSON
          {
            echo "workflow_execution_name=${{ steps.invoke-workflow.outputs.workflow_execution_name }}"
            echo "workflow_execution_path=.local/diagnostics/workflow-execution.json"
          } > .local/diagnostics/manifest.txt

      - name: Upload diagnostics artifact
        if: always()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7
        with:
          name: bmt-handoff-diagnostics-${{ github.run_id }}
          path: .local/diagnostics/
          if-no-files-found: ignore
          retention-days: 7

      - name: Write dispatch summary (workflow execution confirmed)
        if: >-
          steps.invoke-workflow.outcome == 'success'
          && steps.invoke-workflow.outputs.dispatch_confirmed == 'true'
        uses: ./.github/actions/bmt-write-summary
        with:
          mode: run_success
          repository: ${{ github.repository }}
          head_sha: ${{ needs.write_handoff_context.outputs.head_sha }}
          head_branch: ${{ needs.write_handoff_context.outputs.head_branch }}
          pr_number: ${{ needs.write_handoff_context.outputs.pr_number }}
          filtered_matrix: ${{ steps.classify.outputs.filtered_matrix }}
          accepted_projects: ${{ steps.invoke-workflow.outputs.accepted_projects || steps.classify.outputs.accepted_projects }}
          handshake_ok: "true"
          gcp_project: ${{ env.GCP_PROJECT }}
          gcs_bucket: ${{ env.GCS_BUCKET }}
          workflow_execution_url: ${{ steps.invoke-workflow.outputs.workflow_execution_url }}
          workflow_execution_state: ${{ steps.invoke-workflow.outputs.workflow_execution_state || 'UNKNOWN' }}
          dispatch_reason: ${{ steps.invoke-workflow.outputs.dispatch_reason || '' }}
          diagnostics_artifact: bmt-handoff-diagnostics-${{ github.run_id }}

      # Failure fallback: GCP auth + PEX are still set up from earlier in this same job
      # (steps above), so no re-checkout / re-setup is needed. STATUS_CONTEXT is taken
      # from the workflow-level env (default 'BMT Gate', overridable via input).
      - name: Failure fallback
        if: >-
          steps.invoke-workflow.outcome != 'success'
          && env.BMT_FORCE_PASS_RESOLVED != 'true'
        uses: ./.github/actions/bmt-failure-fallback
        with:
          handshake_outputs: ${{ toJson(steps.invoke-workflow.outputs) }}
          setup_outputs: ${{ toJson(needs.write_handoff_context.outputs) }}
          prepare_result: ${{ needs.write_handoff_context.result }}
          classify_result: ${{ steps.classify.outcome || 'failure' }}
          handoff_result: ${{ steps.invoke-workflow.outcome || 'failure' }}
          accepted_projects: ${{ steps.invoke-workflow.outputs.accepted_projects || steps.classify.outputs.accepted_projects || '[]' }}
          dispatch_head_sha: ${{ needs.write_handoff_context.outputs.head_sha }}
          dispatch_pr_number: ${{ needs.write_handoff_context.outputs.pr_number }}
          fallback_ref: ${{ github.sha }}
          workload_identity_provider: ${{ env.GCP_WIF_PROVIDER }}
          service_account: ${{ env.GCP_SA_EMAIL }}
          gcp_project: ${{ env.GCP_PROJECT }}
          bmt_status_context: ${{ env.BMT_STATUS_CONTEXT }}
          dispatch_reason: ${{ steps.invoke-workflow.outputs.dispatch_reason || '' }}
          workflow_execution_url: ${{ steps.invoke-workflow.outputs.workflow_execution_url || '' }}
          workflow_execution_state: ${{ steps.invoke-workflow.outputs.workflow_execution_state || '' }}

      - id: outcome
        env:
          HANDOFF_FORCE_PASS: ${{ env.BMT_FORCE_PASS_RESOLVED }}
        shell: bash
        run: |
          set -euo pipefail
          invoke_result="${{ steps.invoke-workflow.outcome }}"
          disp="${{ steps.invoke-workflow.outputs.dispatch_confirmed }}"
          if [[ "$HANDOFF_FORCE_PASS" == "true" ]]; then
            if [[ "$invoke_result" == "success" && "$disp" == "true" ]]; then
              {
                echo "bmt_gate_passed=true"
                echo "bmt_dispatch_confirmed=true"
                echo "bmt_final_state=dispatched_async"
                echo "bmt_recovery_used=false"
              } >> "$GITHUB_OUTPUT"
            else
              {
                echo "bmt_gate_passed=true"
                echo "bmt_dispatch_confirmed=false"
                echo "bmt_final_state=forced_pass_dispatch_failed"
                echo "bmt_recovery_used=true"
              } >> "$GITHUB_OUTPUT"
            fi
          elif [[ "$invoke_result" == "success" && "$disp" == "true" ]]; then
            {
              echo "bmt_gate_passed=true"
              echo "bmt_dispatch_confirmed=true"
              echo "bmt_final_state=dispatched_async"
              echo "bmt_recovery_used=false"
            } >> "$GITHUB_OUTPUT"
          else
            {
              echo "bmt_gate_passed=false"
              echo "bmt_dispatch_confirmed=false"
              echo "bmt_final_state=dispatch_failed"
              echo "bmt_recovery_used=true"
            } >> "$GITHUB_OUTPUT"
          fi

      - name: Forced pass notice (no confirmed cloud dispatch)
        if: >-
          always()
          && env.BMT_FORCE_PASS_RESOLVED == 'true'
          && steps.outcome.outputs.bmt_dispatch_confirmed != 'true'
        shell: bash
        run: |
          echo "::warning::BMT handoff force pass is set: job is green without a confirmed Workflows execution; cloud BMT was not started from this handoff."

      - name: Fail job when BMT did not pass
        if: steps.outcome.outputs.bmt_gate_passed != 'true'
        run: |
          echo "::error::BMT dispatch did not complete successfully (classify=${{ steps.classify.outcome || 'n/a' }}, workflow=${{ steps.invoke-workflow.outcome || 'n/a' }})."
          exit 1



