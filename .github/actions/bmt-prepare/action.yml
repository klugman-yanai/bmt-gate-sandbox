name: BMT Prepare
description: Checkout, emit context, validate vars, parse release runners. Use in BMT handoff workflow.

inputs:
  head_sha:
    description: Head commit SHA to checkout
    required: true
  ci_run_id:
    description: CI workflow run ID (for artifact download)
    required: true
  head_branch:
    description: Head branch name
    required: true
  head_event:
    description: Event that triggered CI (pull_request or push)
    required: false
    default: "push"
  pr_number:
    description: PR number (if head_event is pull_request)
    required: false
    default: ""

outputs:
  run_id:
    description: BMT run ID emitted by emit-bmt-context
    value: ${{ steps.ctx.outputs.run_id }}
  head_sha:
    description: Head commit SHA
    value: ${{ steps.ctx.outputs.head_sha }}
  head_branch:
    description: Head branch name
    value: ${{ steps.ctx.outputs.head_branch }}
  head_event:
    description: Event that triggered CI (pull_request or push)
    value: ${{ steps.ctx.outputs.head_event }}
  pr_number:
    description: PR number when head_event is pull_request
    value: ${{ steps.ctx.outputs.pr_number }}
  runner_matrix:
    description: JSON matrix of release runners from parse-release-runners
    value: ${{ steps.parse.outputs.runner_matrix }}

runs:
  using: composite
  steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        ref: ${{ inputs.head_sha }}

    - name: Install uv
      uses: astral-sh/setup-uv@v4
      with:
        python-version: "3.12"

    - id: ctx
      shell: bash
      env:
        DISPATCH_CI_RUN_ID: ${{ inputs.ci_run_id }}
        DISPATCH_HEAD_SHA: ${{ inputs.head_sha }}
        DISPATCH_HEAD_BRANCH: ${{ inputs.head_branch }}
        DISPATCH_HEAD_EVENT: ${{ inputs.head_event }}
        DISPATCH_PR_NUMBER: ${{ inputs.pr_number }}
      run: bash packages/bmt-cli/scripts/bmt_workflow.sh emit-bmt-context

    - name: Validate required configuration variables
      shell: bash
      run: |
        bash packages/bmt-cli/scripts/bmt_workflow.sh guard-no-legacy-prefix
        bash packages/bmt-cli/scripts/bmt_workflow.sh validate-required-vars

    - id: parse
      shell: bash
      env:
        BMT_OUTPUT_FORMAT: bmt
        BMT_OUTPUT_KEY: runner_matrix
      run: uv run --project packages/bmt-cli bmt parse-release-runners
