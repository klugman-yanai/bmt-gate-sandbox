name: Upload artifact (repo pin)
description: Single SHA pin for actions/upload-artifact v7; forwards common inputs.
inputs:
  name:
    description: Artifact name
    required: true
  path:
    description: Paths (multi-line supported)
    required: true
  retention-days:
    description: Retention in days (default 90 matches upstream when omitted).
    required: false
    default: "90"
  if-no-files-found:
    description: warn | error | ignore
    required: false
    default: warn
runs:
  using: composite
  steps:
    - uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7
      with:
        name: ${{ inputs.name }}
        path: ${{ inputs.path }}
        retention-days: ${{ inputs.retention-days }}
        if-no-files-found: ${{ inputs.if-no-files-found }}
