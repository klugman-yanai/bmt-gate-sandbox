name: Setup build environment
description: >
  Prepare an ubuntu-latest runner for a CMake build: free disk space,
  install system dependencies, fix webOS toolchain paths, and cache/install CMake 3.29.3.

inputs:
  configure:
    description: "CMake configure preset name (used to detect mingw/webOS)"
    required: true
  build:
    description: "CMake build preset name (used to detect mingw)"
    required: true

runs:
  using: composite
  steps:
    - name: Disk space (before)
      shell: bash
      run: |
        df -h
        echo "Largest dirs (top 30) under /usr/share /opt /usr/local (best effort)"
        sudo du -xh /usr/share /opt /usr/local 2>/dev/null | sort -h | tail -n 30 || true

    - name: Free disk space on runner
      shell: bash
      run: |
        set -euo pipefail
        sudo rm -rf /usr/share/dotnet || true
        sudo rm -rf /opt/ghc || true
        sudo rm -rf /usr/local/lib/android || true
        sudo rm -rf /usr/local/share/boost || true
        sudo apt-get clean || true
        sudo rm -rf /var/lib/apt/lists/* || true
        df -h

    - name: Install system dependencies
      shell: bash
      run: |
        set -euo pipefail
        sudo apt-get update
        sudo apt-get install -y patchelf libfl2
        if [[ "${{ inputs.configure }}${{ inputs.build }}" == *mingw* ]]; then
          sudo apt-get install -y g++-mingw-w64-x86-64 gcc-mingw-w64-x86-64
        fi

    - name: Fix hardcoded paths for webOS toolchains
      shell: bash
      run: |
        set -euo pipefail
        if compgen -G "third-party/starfish-bdk*" > /dev/null; then
          find third-party/starfish-bdk* -type f -executable | while read -r exe; do
            if file "$exe" | grep -q "ELF.*executable"; then
              patchelf --set-interpreter /lib64/ld-linux-x86-64.so.2 "$exe" || true
              # shellcheck disable=SC2016
              patchelf --set-rpath '$ORIGIN/../lib' "$exe" || true
            fi
          done
        fi

    - name: Cache CMake 3.29.3
      id: cmake-cache
      uses: actions/cache@cdf6c1fa76f9f475f3d7449005a359c84ca0f306  # v5
      with:
        path: /opt/cmake-3.29
        key: cmake-3.29.3-linux-x86_64

    - name: Install CMake 3.29.3
      if: steps.cmake-cache.outputs.cache-hit != 'true'
      shell: bash
      run: |
        set -euo pipefail
        wget -q https://github.com/Kitware/CMake/releases/download/v3.29.3/cmake-3.29.3-linux-x86_64.tar.gz
        tar -xf cmake-3.29.3-linux-x86_64.tar.gz
        sudo mv cmake-3.29.3-linux-x86_64 /opt/cmake-3.29
        rm -f cmake-3.29.3-linux-x86_64.tar.gz

    - name: Add CMake to PATH
      shell: bash
      run: echo "/opt/cmake-3.29/bin" >>"$GITHUB_PATH"
