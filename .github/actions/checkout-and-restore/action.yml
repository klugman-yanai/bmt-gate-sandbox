name: Checkout and restore snapshot
description: Checkout repo (sparse or full) and restore repo-snapshot artifact.

inputs:
  ref:
    description: "Ref to checkout (default current SHA)"
    required: false
    default: ${{ github.sha }}
  run-id:
    description: "Run ID for artifact (omit = current run)"
    required: false
  github-token:
    description: "Token for cross-run artifact download"
    required: false
    default: ${{ github.token }}
  sparse-checkout:
    description: "Paths to checkout (e.g. .github). Empty = full."
    required: false
    default: ".github"

runs:
  using: composite
  steps:
    - name: Checkout
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
      with:
        ref: ${{ inputs.ref }}
        fetch-depth: 1
        sparse-checkout: ${{ inputs.sparse-checkout }}
        sparse-checkout-cone-mode: ${{ inputs.sparse-checkout != '' && 'false' || 'true' }}

    - name: Restore repo snapshot
      uses: ./.github/actions/restore-snapshot
      with:
        run-id: ${{ inputs.run-id }}
        github-token: ${{ inputs.github-token }}
