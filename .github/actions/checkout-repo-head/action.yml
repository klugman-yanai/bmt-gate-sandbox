name: Checkout source (repo pin)
description: >
  Single SHA pin for actions/checkout v6. Default: repository/ref from pull_request_target,
  pull_request, or the current ref. Optional ref/repository override for workflow_call inputs
  (e.g. BMT handoff). Optional sparse-checkout for minimal trees.
inputs:
  fetch-depth:
    description: fetch-depth for actions/checkout.
    required: false
    default: "1"
  submodules:
    required: false
    default: "false"
  lfs:
    required: false
    default: "false"
  persist-credentials:
    required: false
    default: "true"
  repository:
    description: >
      When `ref` is set, selects repo (default github.repository). When both empty, uses PR head or github.repository.
    required: false
    default: ""
  ref:
    description: >
      When set, checks out this ref (with `repository` or github.repository). When empty, uses PR/PRT head or github.sha.
    required: false
    default: ""
  sparse-checkout:
    description: Multi-line sparse-checkout paths; empty for full checkout.
    required: false
    default: ""
runs:
  using: composite
  steps:
    - name: Checkout (full tree)
      if: ${{ inputs.sparse-checkout == '' }}
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      with:
        repository: ${{ inputs.ref != '' && (inputs.repository != '' && inputs.repository || github.repository) || ((github.event_name == 'pull_request_target' || github.event_name == 'pull_request') && github.event.pull_request.head.repo.full_name || github.repository) }}
        ref: ${{ inputs.ref != '' && inputs.ref || ((github.event_name == 'pull_request_target' || github.event_name == 'pull_request') && github.event.pull_request.head.sha || github.sha) }}
        fetch-depth: ${{ inputs.fetch-depth }}
        submodules: ${{ inputs.submodules }}
        lfs: ${{ inputs.lfs }}
        persist-credentials: ${{ inputs.persist-credentials }}

    - name: Checkout (sparse)
      if: ${{ inputs.sparse-checkout != '' }}
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      with:
        repository: ${{ inputs.ref != '' && (inputs.repository != '' && inputs.repository || github.repository) || ((github.event_name == 'pull_request_target' || github.event_name == 'pull_request') && github.event.pull_request.head.repo.full_name || github.repository) }}
        ref: ${{ inputs.ref != '' && inputs.ref || ((github.event_name == 'pull_request_target' || github.event_name == 'pull_request') && github.event.pull_request.head.sha || github.sha) }}
        fetch-depth: ${{ inputs.fetch-depth }}
        submodules: ${{ inputs.submodules }}
        lfs: ${{ inputs.lfs }}
        persist-credentials: ${{ inputs.persist-credentials }}
        sparse-checkout: ${{ inputs.sparse-checkout }}
