name: Setup GCP and uv
description: Authenticate to GCP via WIF, install Cloud SDK, and install the BMT CLI (uv or release PEX).

inputs:
  workload_identity_provider:
    description: Workload Identity Provider resource name.
    required: true
  service_account:
    description: Service account email used for WIF auth.
    required: true
  gcp_project:
    description: Must match repository variable GCP_PROJECT; pass env.GCP_PROJECT when workflow env is set from vars (see .github/README.md).
    required: true
  gcloud_version:
    description: >
      Cloud SDK version constraint for setup-gcloud (e.g. ">= 363.0.0" for WIF). See google-github-actions/setup-gcloud README.
    required: false
    default: ">= 363.0.0"
  python_version:
    description: Python version used by setup-bmt-cli.
    required: false
    default: "3.12"
  install_uv:
    description: When "false", skip BMT CLI setup (GCP auth + gcloud only).
    required: false
    default: "true"
  install_workspace:
    description: >
      When mode=pex, also run uv sync so jobs can use uv run python -m tools. When mode=uv, uv sync always runs once.
    required: false
    default: "true"
  bmt_cli:
    description: "uv or pex — set vars.BMT_CLI to switch (default uv)."
    required: false
    default: "uv"
  bmt_pex_tag:
    description: Release tag for bmt.pex when bmt_cli is pex (vars.BMT_PEX_TAG).
    required: false
    default: ""
  bmt_pex_repo:
    description: >
      Repo that published bmt.pex (owner/name). Empty uses github.repository; set this input when
      the workflow repo is not the release repo.
    required: false
    default: ""

runs:
  using: composite
  steps:
    - name: GCP Auth (WIF)
      uses: google-github-actions/auth@v3
      with:
        workload_identity_provider: ${{ inputs.workload_identity_provider }}
        service_account: ${{ inputs.service_account }}
        project_id: ${{ inputs.gcp_project }}

    - name: Setup Cloud SDK
      uses: google-github-actions/setup-gcloud@v3
      with:
        project_id: ${{ inputs.gcp_project }}
        version: ${{ inputs.gcloud_version }}

    - name: Setup BMT CLI
      if: ${{ inputs.install_uv == 'true' }}
      uses: ./.github/actions/setup-bmt-cli
      with:
        mode: ${{ inputs.bmt_cli }}
        pex_tag: ${{ inputs.bmt_pex_tag }}
        pex_repo: ${{ inputs.bmt_pex_repo != '' && inputs.bmt_pex_repo || github.repository }}
        python_version: ${{ inputs.python_version }}
        install_workspace: ${{ inputs.install_workspace }}
