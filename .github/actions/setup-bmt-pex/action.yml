name: Setup kardome-bmt PEX
description: >
  Self-contained PEX-only BMT CLI setup for cross-repo callers. Installs Python 3.12
  (PEX runtime), downloads bmt.pex from a GitHub Release, and exports BMT_PEX_PATH for
  downstream steps. The PEX bundles the full kardome-bmt CLI; nothing else from this
  publishing repo is needed at runtime. Unlike setup-bmt-cli, this action does NOT run
  uv sync, has no dependency on the caller's checkout, and is the canonical setup used
  by bmt-handoff.yml when callers consume it cross-repo (e.g. Kardome-org/core-main).

inputs:
  tag:
    description: >-
      Release tag containing bmt.pex. Defaults to this action's own ref, so
      `uses: klugman-yanai/bmt-gcloud/.github/actions/setup-bmt-pex@bmt-v0.3.3`
      self-discovers `bmt-v0.3.3` for the download. Override only for cross-
      version testing. When invoking via `@<sha>` or `@<branch>` (not a release
      tag) you must pass `tag:` explicitly.
    required: false
    default: ${{ github.action_ref }}
  repo:
    description: >
      owner/name of the repo that published bmt.pex. Defaults to klugman-yanai/bmt-gcloud;
      override via vars.BMT_PEX_REPO once the publishing repo moves under Kardome-org.
    required: false
    default: klugman-yanai/bmt-gcloud
  python_version:
    description: Python version for the PEX runtime.
    required: false
    default: "3.12"
  out_path:
    description: Directory to place bmt.pex (relative to GITHUB_WORKSPACE).
    required: false
    default: ".local/bmt"
  token:
    description: Token with contents:read on the release repo (default github.token).
    required: false
    default: ${{ github.token }}

runs:
  using: composite
  steps:
    - name: Validate inputs
      shell: bash
      run: |
        set -euo pipefail
        tag="${{ inputs.tag }}"
        if [[ -z "$tag" ]]; then
          echo "::error::setup-bmt-pex: tag is required; could not self-discover from github.action_ref ('${{ github.action_ref }}'). Pass `with: tag: bmt-v0.3.x` explicitly."
          exit 1
        fi
        # Self-discovery via github.action_ref only works when invoked at a
        # release tag (`bmt-v*`). If someone called this action at @<sha> or
        # @<branch>, action_ref is not a release tag and `gh release download`
        # will fail with a confusing 404. Guard here with a clear message.
        if [[ "$tag" != bmt-v* ]]; then
          echo "::error::setup-bmt-pex: resolved tag '$tag' is not a bmt-v* release tag. If you invoked this action via @<sha> or @<branch>, pass `with: tag: bmt-v0.3.x` explicitly."
          exit 1
        fi

    - name: Setup Python for PEX
      uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
      with:
        python-version: ${{ inputs.python_version }}

    - name: Download bmt.pex
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.token }}
      run: |
        set -euo pipefail
        out="${GITHUB_WORKSPACE}/${{ inputs.out_path }}"
        mkdir -p "$out"
        gh release download "${{ inputs.tag }}" \
          -R "${{ inputs.repo }}" \
          -p "bmt.pex" \
          -D "$out"
        chmod +x "$out/bmt.pex"
        echo "BMT_PEX_PATH=${out}/bmt.pex" >> "$GITHUB_ENV"
