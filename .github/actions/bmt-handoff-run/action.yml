name: BMT Handoff Run
description: Preflight, write trigger, dispatch runtime backend (VM or Cloud Run Job), wait handshake, write summary. Requires job env GCS_BUCKET, GCP_*, BMT_*.

inputs:
  head_sha:
    description: Head commit SHA
    required: true
  head_branch:
    description: Head branch name
    required: true
  head_event:
    description: Event that triggered CI (pull_request or push)
    required: true
  pr_number:
    description: PR number when head_event is pull_request
    required: false
    default: ""
  filtered_matrix:
    description: JSON matrix of legs to run (from classify-handoff)
    required: true
  runner_matrix:
    description: Full runner matrix from prepare
    required: true
  accepted_projects:
    description: JSON array of projects with uploaded runners
    required: true
  workload_identity_provider:
    description: GCP Workload Identity Federation provider
    required: true
  service_account:
    description: GCP service account email for WIF
    required: true

outputs:
  trigger_written:
    description: Whether the run trigger was written to GCS
    value: ${{ steps.trigger.outcome == 'success' && 'true' || 'false' }}
  handshake_ok:
    description: Whether the VM acknowledged the trigger
    value: ${{ steps.handshake.outcome == 'success' && 'true' || 'false' }}
  handshake_uri:
    description: GCS URI of the handshake ack artifact
    value: ${{ steps.handshake.outputs.handshake_uri }}
  vm_started:
    description: Whether runtime dispatch started (VM start or Cloud Run Job execute)
    value: ${{ (steps.start-vm.outcome == 'success' || steps.start-cloud-run-job.outcome == 'success') && 'true' || 'false' }}
  runtime_backend:
    description: Runtime backend selected for this handoff (vm or cloud_run_job)
    value: ${{ steps.runtime-backend.outputs.runtime_backend }}
  handoff_reason:
    description: Handoff result reason (ok, no_runtime_supported_legs, handshake_timeout)
    value: ${{ steps.handoff-reason.outputs.handoff_reason || (steps.handshake.outcome == 'success' && 'ok' || 'handshake_timeout') }}

runs:
  using: composite
  steps:
    - name: Setup GCP and uv
      uses: ./.github/actions/setup-gcp-uv
      with:
        workload_identity_provider: ${{ inputs.workload_identity_provider }}
        service_account: ${{ inputs.service_account }}
        python_version: "3.12"

    - name: Validate WIF/provider consistency
      shell: bash
      run: |
        set -euo pipefail
        provider="${GCP_WIF_PROVIDER:-}"
        project_id="${GCP_PROJECT:-}"
        if [[ -z "$provider" || -z "$project_id" ]]; then
          echo "::error::GCP_WIF_PROVIDER and GCP_PROJECT must be set."
          exit 1
        fi
        if [[ ! "$provider" =~ ^projects/([0-9]+)/locations/global/workloadIdentityPools/([^/]+)/providers/([^/]+)$ ]]; then
          echo "::error::Invalid GCP_WIF_PROVIDER format: '$provider'"
          echo "::error::Expected: projects/<number>/locations/global/workloadIdentityPools/<pool>/providers/<provider>"
          exit 1
        fi
        provider_project_number="${BASH_REMATCH[1]}"
        actual_project_number="$(gcloud projects describe "$project_id" --format='value(projectNumber)' 2>/dev/null || true)"
        if [[ -z "$actual_project_number" ]]; then
          echo "::error::Could not resolve project number for GCP_PROJECT='$project_id'."
          exit 1
        fi
        if [[ "$provider_project_number" != "$actual_project_number" ]]; then
          echo "::error::GCP_WIF_PROVIDER project number mismatch."
          echo "::error::provider=$provider_project_number project=$actual_project_number"
          exit 1
        fi
        echo "Validated GCP_WIF_PROVIDER project-number alignment."

    - name: Resolve runtime backend
      id: runtime-backend
      shell: bash
      run: |
        set -euo pipefail
        backend="${BMT_RUNTIME_BACKEND:-vm}"
        backend="${backend,,}"
        case "$backend" in
          vm)
            ;;
          cloud_run_job)
            if [[ -z "${BMT_CLOUD_RUN_JOB:-}" || -z "${BMT_CLOUD_RUN_REGION:-}" ]]; then
              echo "::error::BMT_CLOUD_RUN_JOB and BMT_CLOUD_RUN_REGION are required when BMT_RUNTIME_BACKEND=cloud_run_job."
              exit 1
            fi
            ;;
          *)
            echo "::error::Invalid BMT_RUNTIME_BACKEND='$backend'. Expected one of: vm, cloud_run_job."
            exit 1
            ;;
        esac
        echo "runtime_backend=$backend" >>"$GITHUB_OUTPUT"
        echo "Using runtime backend: $backend"

    - name: Preflight runtime trigger queue (stale cleanup)
      id: preflight
      shell: bash
      env:
        RUN_CONTEXT: ${{ inputs.head_event == 'pull_request' && 'pr' || 'dev' }}
      run: bash .github/bmt/scripts/bmt_workflow.sh preflight-trigger-queue

    - name: Write run trigger to GCS
      id: trigger
      shell: bash
      env:
        FILTERED_MATRIX_JSON: ${{ inputs.filtered_matrix }}
        RUN_CONTEXT: ${{ inputs.head_event == 'pull_request' && 'pr' || 'dev' }}
        HEAD_EVENT: ${{ inputs.head_event }}
        HEAD_SHA: ${{ inputs.head_sha }}
        HEAD_BRANCH: ${{ inputs.head_branch }}
        PR_NUMBER: ${{ inputs.pr_number }}
      run: bash .github/bmt/scripts/bmt_workflow.sh write-run-trigger

    - name: Sync VM metadata from workflow config
      if: steps.runtime-backend.outputs.runtime_backend == 'vm'
      shell: bash
      run: uv run --project .github/bmt bmt sync-vm-metadata

    - name: Force clean VM restart after stale-trigger cleanup
      if: steps.runtime-backend.outputs.runtime_backend == 'vm' && steps.preflight.outputs.restart_vm == 'true'
      shell: bash
      env:
        STALE_CLEANUP_COUNT: ${{ steps.preflight.outputs.stale_cleanup_count }}
      run: bash .github/bmt/scripts/bmt_workflow.sh force-clean-vm-restart

    - name: Start BMT VM
      id: start-vm
      if: steps.runtime-backend.outputs.runtime_backend == 'vm'
      shell: bash
      run: uv run --project .github/bmt bmt start-vm

    - name: Start Cloud Run runtime job
      id: start-cloud-run-job
      if: steps.runtime-backend.outputs.runtime_backend == 'cloud_run_job'
      shell: bash
      run: uv run --project .github/bmt bmt start-cloud-run-job

    - name: Show handshake guidance
      shell: bash
      env:
        RESTART_VM: ${{ steps.preflight.outputs.restart_vm }}
        STALE_CLEANUP_COUNT: ${{ steps.preflight.outputs.stale_cleanup_count }}
        BMT_RUNTIME_BACKEND: ${{ steps.runtime-backend.outputs.runtime_backend }}
      run: bash .github/bmt/scripts/bmt_workflow.sh show-handshake-guidance

    - name: Wait for VM handshake ack
      id: handshake
      shell: bash
      env:
        WORKFLOW_RUN_ID: ${{ github.run_id }}
        RESTART_VM: ${{ steps.preflight.outputs.restart_vm }}
        STALE_CLEANUP_COUNT: ${{ steps.preflight.outputs.stale_cleanup_count }}
      run: bash .github/bmt/scripts/bmt_workflow.sh wait-handshake

    - name: Handshake timeout diagnostics
      if: ${{ always() && steps.handshake.outcome == 'failure' }}
      shell: bash
      run: bash .github/bmt/scripts/bmt_workflow.sh handshake-timeout-diagnostics

    - name: Show VM handshake summary
      if: steps.handshake.outcome == 'success'
      shell: bash
      env:
        ACK_PAYLOAD: ${{ steps.handshake.outputs.handshake_payload }}
        HANDSHAKE_URI: ${{ steps.handshake.outputs.handshake_uri }}
        HANDSHAKE_REQUESTED_LEG_COUNT: ${{ steps.handshake.outputs.handshake_requested_leg_count }}
        HANDSHAKE_ACCEPTED_LEG_COUNT: ${{ steps.handshake.outputs.handshake_accepted_leg_count }}
        RESTART_VM: ${{ steps.preflight.outputs.restart_vm }}
        STALE_CLEANUP_COUNT: ${{ steps.preflight.outputs.stale_cleanup_count }}
      run: bash .github/bmt/scripts/bmt_workflow.sh show-handshake-summary

    - name: Fail when VM accepts zero runtime-supported legs
      id: accept-guard
      if: steps.handshake.outcome == 'success'
      shell: bash
      env:
        HANDSHAKE_ACCEPTED_LEG_COUNT: ${{ steps.handshake.outputs.handshake_accepted_leg_count }}
      run: |
        set -euo pipefail
        accepted="${HANDSHAKE_ACCEPTED_LEG_COUNT:-0}"
        if [[ "$accepted" =~ ^[0-9]+$ ]] && [[ "$accepted" -ge 1 ]]; then
          echo "VM accepted ${accepted} leg(s)."
          exit 0
        fi
        echo "::error::no_runtime_supported_legs: VM acknowledged trigger but accepted zero runtime-supported legs."
        exit 1

    - name: Resolve handoff reason
      id: handoff-reason
      if: always()
      shell: bash
      run: |
        reason="ok"
        if [[ "${{ steps.handshake.outcome }}" != "success" ]]; then
          reason="handshake_timeout"
        elif [[ "${{ steps.accept-guard.outcome }}" == "failure" ]]; then
          reason="no_runtime_supported_legs"
        fi
        echo "handoff_reason=${reason}" >>"$GITHUB_OUTPUT"

    - name: Write handoff summary
      if: always()
      uses: ./.github/actions/bmt-write-summary
      with:
        mode: ${{ steps.handoff-reason.outputs.handoff_reason == 'ok' && 'run_success' || 'failure' }}
        repository: ${{ github.repository }}
        head_sha: ${{ inputs.head_sha }}
        head_branch: ${{ inputs.head_branch }}
        head_event: ${{ inputs.head_event }}
        pr_number: ${{ inputs.pr_number }}
        routing_decision: run
        runner_matrix: ${{ inputs.runner_matrix }}
        accepted_projects: ${{ inputs.accepted_projects }}
        filtered_matrix: ${{ inputs.filtered_matrix }}
        trigger_written: ${{ steps.trigger.outcome == 'success' && 'true' || 'false' }}
        vm_started: ${{ (steps.start-vm.outcome == 'success' || steps.start-cloud-run-job.outcome == 'success') && 'true' || 'false' }}
        handshake_ok: ${{ steps.handshake.outcome == 'success' && 'true' || 'false' }}
        handshake_uri: ${{ steps.handshake.outputs.handshake_uri }}
        handoff_state_line: "${{ steps.handoff-reason.outputs.handoff_reason == 'ok' && 'Handoff complete: runtime acknowledged trigger.' || steps.handoff-reason.outputs.handoff_reason == 'no_runtime_supported_legs' && 'Handoff failed: runtime accepted zero supported legs.' || 'Handoff failed: runtime did not acknowledge trigger.' }}"
        failure_reason: "${{ steps.handoff-reason.outputs.handoff_reason == 'no_runtime_supported_legs' && 'Runtime acknowledged trigger but reported no supported legs.' || steps.handoff-reason.outputs.handoff_reason == 'handshake_timeout' && 'Runtime did not acknowledge trigger within handshake timeout.' || '' }}"
