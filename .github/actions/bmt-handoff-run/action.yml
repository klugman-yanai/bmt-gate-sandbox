# yaml-language-server: $schema=https://json.schemastore.org/github-action.json
name: BMT Handoff Run
description: "When vm_pre_started is false (default): preflight, sync VM metadata, start VM, write trigger (GCS + Pub/Sub), wait handshake, write summary. When vm_pre_started is true (VM started in setup): set BMT_VM_NAME from input, write trigger, wait handshake, write summary. Start-before-trigger so cold start is outside handshake timeout; Pub/Sub delivers to already-running VM. Requires job env GCS_BUCKET, GCP_*, BMT_*."

inputs:
  head_sha:
    description: Head commit SHA
    required: true
  head_branch:
    description: Head branch name
    required: true
  head_event:
    description: Event that triggered CI (pull_request or push)
    required: true
  pr_number:
    description: PR number when head_event is pull_request
    required: false
    default: ""
  run_context:
    description: Resolved run context (pr or dev) from prepare; VM uses for PR-state checks
    required: true
  filtered_matrix:
    description: JSON matrix of legs to run (from classify-handoff)
    required: true
  runner_matrix:
    description: Full runner matrix from prepare
    required: true
  accepted_projects:
    description: JSON array of projects with uploaded runners
    required: true
  workload_identity_provider:
    description: GCP Workload Identity Federation provider
    required: true
  service_account:
    description: GCP service account email for WIF
    required: true
  gcp_project:
    description: GCP project ID (summary context)
    required: false
    default: ""
  gcp_zone:
    description: GCP zone (summary context)
    required: false
    default: ""
  gcs_bucket:
    description: GCS bucket (summary context)
    required: false
    default: ""
  vm_pre_started:
    description: If true, VM was already started in setup; skip select/preflight/sync/restart/start and use pre_started_* inputs
    required: false
    default: "false"
  pre_started_selected_vm:
    description: Selected VM name when vm_pre_started is true
    required: false
    default: ""
  pre_started_vm_reused_running:
    description: vm_reused_running from setup when vm_pre_started
    required: false
    default: "false"
  pre_started_restart_vm:
    description: restart_vm from setup when vm_pre_started
    required: false
    default: "false"
  pre_started_stale_cleanup_count:
    description: stale_cleanup_count from setup when vm_pre_started
    required: false
    default: "0"
  pre_started_vm_started:
    description: vm_started from setup when vm_pre_started
    required: false
    default: "false"
outputs:
  selected_vm:
    description: VM name selected from pool for this run
    value: ${{ steps.select-vm.outputs.selected_vm || inputs.pre_started_selected_vm }}
  vm_reused_running:
    description: Whether a RUNNING VM was reused (no TERMINATED available); handshake uses longer timeout
    value: ${{ steps.select-vm.outputs.vm_reused_running || inputs.pre_started_vm_reused_running || 'false' }}
  trigger_written:
    description: Whether the run trigger was written to GCS
    value: ${{ steps.trigger.outcome == 'success' && 'true' || 'false' }}
  handshake_ok:
    description: Whether the VM confirmed the trigger
    value: ${{ steps.handshake.outcome == 'success' && 'true' || 'false' }}
  handshake_uri:
    description: GCS URI of the handshake ack artifact
    value: ${{ steps.handshake.outputs.handshake_uri }}
  handshake_elapsed_sec:
    description: Seconds from start of wait until ack was received (for tuning BMT_HANDSHAKE_TIMEOUT_SEC)
    value: ${{ steps.handshake.outputs.handshake_elapsed_sec }}
  vm_started:
    description: Whether the BMT VM was started
    value: ${{ inputs.vm_pre_started == 'true' && inputs.pre_started_vm_started || (steps.start-vm.outcome == 'success' || steps.select-vm.outputs.vm_reused_running == 'true') || 'false' }}
  handoff_reason:
    description: Handoff result reason (ok, no_runtime_supported_legs, handshake_timeout)
    value: ${{ steps.handoff-reason.outputs.handoff_reason || (steps.handshake.outcome == 'success' && 'ok' || 'handshake_timeout') }}

runs:
  using: composite
  steps:
    - name: Setup GCP and uv
      uses: ./.github/actions/setup-gcp-uv
      with:
        workload_identity_provider: ${{ inputs.workload_identity_provider }}
        service_account: ${{ inputs.service_account }}
        python_version: "3.12"

    - name: Set VM from setup (pre-started)
      if: inputs.vm_pre_started == 'true'
      shell: bash
      run: echo "BMT_VM_NAME=${{ inputs.pre_started_selected_vm }}" >> "$GITHUB_ENV"

    - name: Select available VM from pool
      id: select-vm
      if: inputs.vm_pre_started != 'true'
      shell: bash
      run: |
        uv run bmt select-available-vm
        # Export selected VM as BMT_VM_NAME so all subsequent steps in this job use it
        selected_vm="$(grep '^selected_vm=' "$GITHUB_OUTPUT" | tail -1 | cut -d= -f2-)"
        echo "BMT_VM_NAME=${selected_vm}" >> "$GITHUB_ENV"

    - name: Preflight runtime trigger queue (stale cleanup)
      id: preflight
      if: inputs.vm_pre_started != 'true'
      shell: bash
      env:
        RUN_CONTEXT: ${{ inputs.run_context }}
        PR_NUMBER: ${{ inputs.pr_number }}
      run: uv run bmt preflight-trigger-queue

    - name: Sync VM metadata from workflow config
      if: inputs.vm_pre_started != 'true'
      shell: bash
      run: uv run bmt sync-vm-metadata

    - name: Force clean VM restart after stale-trigger cleanup
      if: inputs.vm_pre_started != 'true' && steps.preflight.outputs.restart_vm == 'true'
      shell: bash
      env:
        STALE_CLEANUP_COUNT: ${{ steps.preflight.outputs.stale_cleanup_count }}
      run: uv run bmt write-context && uv run bmt force-clean-vm-restart

    - name: Start BMT VM
      id: start-vm
      if: inputs.vm_pre_started != 'true' && steps.select-vm.outputs.vm_reused_running != 'true'
      shell: bash
      run: uv run bmt start-vm

    - name: Write run trigger to GCS
      id: trigger
      shell: bash
      env:
        FILTERED_MATRIX_JSON: ${{ inputs.filtered_matrix }}
        RUN_CONTEXT: ${{ inputs.run_context }}
        HEAD_EVENT: ${{ inputs.head_event }}
        HEAD_SHA: ${{ inputs.head_sha }}
        HEAD_BRANCH: ${{ inputs.head_branch }}
        PR_NUMBER: ${{ inputs.pr_number }}
      run: uv run bmt write-run-trigger

    - name: Wait for VM handshake ack
      id: handshake
      shell: bash
      env:
        WORKFLOW_RUN_ID: ${{ github.run_id }}
        RESTART_VM: ${{ inputs.vm_pre_started == 'true' && inputs.pre_started_restart_vm || steps.preflight.outputs.restart_vm }}
        STALE_CLEANUP_COUNT: ${{ inputs.vm_pre_started == 'true' && inputs.pre_started_stale_cleanup_count || steps.preflight.outputs.stale_cleanup_count }}
        VM_REUSED_RUNNING: ${{ inputs.vm_pre_started == 'true' && inputs.pre_started_vm_reused_running || steps.select-vm.outputs.vm_reused_running }}
      run: uv run bmt write-context && uv run bmt wait-handshake

    - name: Handshake timeout diagnostics
      if: ${{ always() && steps.handshake.outcome == 'failure' }}
      shell: bash
      run: uv run bmt handshake-timeout-diagnostics

    - name: Fail when VM accepts zero runtime-supported legs
      id: accept-guard
      if: steps.handshake.outcome == 'success'
      shell: bash
      env:
        HANDSHAKE_ACCEPTED_LEG_COUNT: ${{ steps.handshake.outputs.handshake_accepted_leg_count }}
      run: |
        set -euo pipefail
        accepted="${HANDSHAKE_ACCEPTED_LEG_COUNT:-0}"
        if [[ "$accepted" =~ ^[0-9]+$ ]] && [[ "$accepted" -ge 1 ]]; then
          echo "VM accepted ${accepted} leg(s)."
          exit 0
        fi
        echo "::warning::no_runtime_supported_legs: VM confirmed trigger but accepted zero supported test runs."
        exit 1

    - name: Resolve handoff reason
      id: handoff-reason
      if: always()
      shell: bash
      run: |
        reason="ok"
        if [[ "${{ steps.handshake.outcome }}" != "success" ]]; then
          reason="handshake_timeout"
        elif [[ "${{ steps.handshake.outputs.handshake_accepted_leg_count }}" == "0" ]] || [[ -z "${{ steps.handshake.outputs.handshake_accepted_leg_count }}" ]]; then
          reason="no_runtime_supported_legs"
        fi
        echo "handoff_reason=${reason}" >>"$GITHUB_OUTPUT"

    - name: Write handoff summary
      if: always()
      uses: ./.github/actions/bmt-write-summary
      with:
        mode: ${{ steps.handoff-reason.outputs.handoff_reason == 'ok' && 'run_success' || 'failure' }}
        repository: ${{ github.repository }}
        head_sha: ${{ inputs.head_sha }}
        head_branch: ${{ inputs.head_branch }}
        pr_number: ${{ inputs.pr_number }}
        filtered_matrix: ${{ inputs.filtered_matrix }}
        trigger_written: ${{ steps.trigger.outcome == 'success' && 'true' || 'false' }}
        vm_started: ${{ (steps.start-vm.outcome == 'success' || steps.select-vm.outputs.vm_reused_running == 'true') && 'true' || 'false' }}
        handshake_ok: ${{ steps.handshake.outcome == 'success' && 'true' || 'false' }}
        handshake_uri: ${{ steps.handshake.outputs.handshake_uri }}
        handshake_elapsed_sec: ${{ steps.handshake.outputs.handshake_elapsed_sec }}
        vm_name: ${{ steps.select-vm.outputs.selected_vm || inputs.pre_started_selected_vm }}
        gcp_project: ${{ inputs.gcp_project }}
        gcp_zone: ${{ inputs.gcp_zone }}
        gcs_bucket: ${{ inputs.gcs_bucket }}
        handoff_state_line: "${{ steps.handoff-reason.outputs.handoff_reason == 'ok' && 'Handoff complete: VM confirmed trigger.' || steps.handoff-reason.outputs.handoff_reason == 'no_runtime_supported_legs' && 'Handoff failed: VM accepted zero supported test runs.' || 'Handoff failed: VM did not confirm trigger.' }}"
        failure_reason: "${{ steps.handoff-reason.outputs.handoff_reason == 'no_runtime_supported_legs' && 'VM confirmed trigger but reported no supported test runs.' || steps.handoff-reason.outputs.handoff_reason == 'handshake_timeout' && 'VM did not confirm trigger within handshake timeout.' || '' }}"
