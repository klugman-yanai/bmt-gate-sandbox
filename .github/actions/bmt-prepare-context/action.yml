name: BMT Prepare
description: Emit context, validate vars, parse release runners. Use in BMT handoff workflow.

inputs:
  head_sha:
    description: Head commit SHA to checkout
    required: true
  ci_run_id:
    description: CI workflow run ID (for artifact download)
    required: true
  head_branch:
    description: Head branch name
    required: true
  head_event:
    description: Event that triggered CI (pull_request or push)
    required: false
    default: "push"
  pr_number:
    description: PR number (if head_event is pull_request)
    required: false
    default: ""
  bmt_cli:
    description: BMT CLI mode (uv or pex); pass from workflow env (vars not allowed in composite).
    required: false
    default: "uv"
  bmt_pex_tag:
    description: Release tag for bmt.pex when bmt_cli is pex
    required: false
    default: ""
  bmt_pex_repo:
    description: owner/repo for PEX releases; empty lets setup-bmt-cli use github.repository
    required: false
    default: ""

outputs:
  run_id:
    description: BMT run ID emitted by emit-bmt-context
    value: ${{ steps.ctx.outputs.run_id }}
  head_sha:
    description: Head commit SHA
    value: ${{ steps.ctx.outputs.head_sha }}
  head_branch:
    description: Head branch name
    value: ${{ steps.ctx.outputs.head_branch }}
  head_event:
    description: Event that triggered CI (pull_request or push)
    value: ${{ steps.ctx.outputs.head_event }}
  pr_number:
    description: PR number — resolved from input or (for push events) from the open PR targeting the branch
    value: ${{ steps.resolve-pr.outputs.pr_number }}
  run_context:
    description: Run context (pr or dev)
    value: ${{ steps.ctx.outputs.run_context }}
  runner_matrix:
    description: JSON matrix of release runners from parse-release-runners
    value: ${{ steps.parse.outputs.runner_matrix }}

runs:
  using: composite
  steps:
    - name: Setup BMT CLI (uv or release PEX; uv sync when needed for tools)
      uses: ./.github/actions/setup-bmt-cli
      with:
        mode: ${{ inputs.bmt_cli }}
        pex_tag: ${{ inputs.bmt_pex_tag }}
        pex_repo: ${{ inputs.bmt_pex_repo != '' && inputs.bmt_pex_repo || github.repository }}
        python_version: "3.12"
        install_workspace: "true"

    - id: ctx
      shell: bash
      run: |
        pr="${{ inputs.pr_number }}"
        ev="${{ inputs.head_event }}"
        if [[ -n "${pr// /}" ]]; then
          run_context=pr
        elif [[ "${ev}" == "pull_request" || "${ev}" == "pull_request_target" ]]; then
          run_context=pr
        else
          run_context=dev
        fi
        {
          echo "run_id=${{ inputs.ci_run_id }}"
          echo "head_sha=${{ inputs.head_sha }}"
          echo "head_branch=${{ inputs.head_branch }}"
          echo "head_event=${{ inputs.head_event }}"
          echo "pr_number=${{ inputs.pr_number }}"
          echo "run_context=${run_context}"
        } >> "$GITHUB_OUTPUT"

    # For push events where no pr_number was supplied, look up any open PR that has this
    # branch as its head. This allows PR comments to be posted even when CI fires as a push.
    - id: resolve-pr
      shell: bash
      env:
        GH_TOKEN: ${{ github.token }}
      run: |
        pr="${{ steps.ctx.outputs.pr_number }}"
        if [[ -z "${pr// /}" ]] && [[ -n "${{ inputs.head_branch }}" ]]; then
          pr=$(gh pr list \
            --repo "${{ github.repository }}" \
            --head "${{ inputs.head_branch }}" \
            --state open \
            --json number \
            --jq '.[0].number // ""' 2>/dev/null || echo "")
        fi
        echo "pr_number=${pr}" >> "$GITHUB_OUTPUT"

    - name: Validate required configuration variables
      shell: bash
      run: |
        if [[ -n "${BMT_BUCKET_PREFIX:-}" ]]; then
          echo "::error::Legacy BMT_BUCKET_PREFIX is set in repository variables. BMT_BUCKET_PREFIX has been removed; clear it in Settings."
          exit 1
        fi
        missing=()
        for var in GCS_BUCKET GCP_WIF_PROVIDER GCP_SA_EMAIL GCP_PROJECT CLOUD_RUN_REGION; do
          [[ -n "${!var:-}" ]] || missing+=("$var")
        done
        if [[ ${#missing[@]} -gt 0 ]]; then
          echo "::error::Missing required repo vars: ${missing[*]}"
          exit 1
        fi
        echo "Proceeding with BMT"

    - id: parse
      shell: bash
      env:
        BMT_OUTPUT_FORMAT: bmt
        BMT_OUTPUT_KEY: runner_matrix
      run: bash .github/scripts/invoke-bmt.sh matrix parse-release-runners
