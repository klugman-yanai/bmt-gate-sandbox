name: BMT job setup
description: Checkout and restore snapshot, setup uv, sync BMT, load env. Run actions/checkout (sparse .github) before this so local actions exist.

inputs:
  ref:
    description: "Ref to checkout"
    required: false
    default: ${{ github.sha }}
  run-id:
    description: "Run ID for repo-snapshot artifact (omit = current run)"
    required: false
  github-token:
    description: "Token for cross-run artifact download"
    required: false
    default: ${{ github.token }}

runs:
  using: composite
  steps:
    - uses: ./.github/actions/checkout-and-restore
      with:
        ref: ${{ inputs.ref }}
        run-id: ${{ inputs.run-id }}
        github-token: ${{ inputs.github-token }}

    - name: Setup uv
      uses: astral-sh/setup-uv@38f3f104447c67c051c4a08e39b64a148898af3a # v4
      with:
        version: "v0.10.9"

    - name: Sync BMT
      shell: bash
      run: uv sync --project .github/bmt

    - name: Load BMT config
      shell: bash
      run: uv run --project .github/bmt bmt load-env
