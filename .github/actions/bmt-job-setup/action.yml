name: BMT job setup
description: Checkout and restore snapshot, setup uv, sync BMT, load env. Run actions/checkout (sparse .github) before this so local actions exist.

inputs:
  ref:
    description: "Ref to checkout"
    required: false
    default: ${{ github.sha }}
  run-id:
    description: "Run ID for repo-snapshot artifact (omit = current run)"
    required: false
  github-token:
    description: "Token for cross-run artifact download"
    required: false
    default: ${{ github.token }}

runs:
  using: composite
  steps:
    - uses: ./.github/actions/checkout-and-restore
      with:
        ref: ${{ inputs.ref }}
        run-id: ${{ inputs.run-id }}
        github-token: ${{ inputs.github-token }}

    - name: Setup uv
      uses: astral-sh/setup-uv@65ef90775fa85bf7130e46f3f22dc79a206581c8  # v7
      with:
        version: "0.10.9"

    - name: Export default uv project
      shell: bash
      run: |
        echo "UV_PROJECT=.github/bmt" >>"$GITHUB_ENV"

    - name: Sync BMT
      shell: bash
      run: uv sync

    - name: Load BMT config
      shell: bash
      run: uv run bmt load-env
