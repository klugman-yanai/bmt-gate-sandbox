name: BMT Classify Handoff
description: Resolve uploaded runners, build and filter matrix, decide run vs skip. Requires job env GCS_BUCKET, GCP_*, BMT_*.

inputs:
  head_sha:
    description: Head commit SHA to checkout
    required: true
  runner_matrix:
    description: JSON matrix of release runners from prepare job
    required: true
  workload_identity_provider:
    description: GCP Workload Identity Federation provider
    required: true
  service_account:
    description: GCP service account email for WIF
    required: true

outputs:
  path:
    description: Handoff path decision (run or skip_no_legs)
    value: ${{ steps.route.outputs.path }}
  has_legs:
    description: Whether filtered matrix has at least one leg
    value: ${{ steps.filter.outputs.has_legs }}
  accepted_projects:
    description: JSON array of projects with uploaded runners
    value: ${{ steps.list.outputs.accepted_projects }}
  filtered_matrix:
    description: JSON matrix filtered to supported uploaded runners
    value: ${{ steps.filter.outputs.matrix }}

runs:
  using: composite
  steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        ref: ${{ inputs.head_sha }}

    - name: Setup GCP and uv
      uses: ./.github/actions/setup-gcp-uv
      with:
        workload_identity_provider: ${{ inputs.workload_identity_provider }}
        service_account: ${{ inputs.service_account }}
        python_version: "3.12"

    - id: list
      shell: bash
      run: bash .github/bmt/scripts/bmt_workflow.sh resolve-uploaded-projects

    - id: matrix
      shell: bash
      env:
        BMT_CONFIG_ROOT: remote/code
      run: uv run bmt matrix

    - id: filter
      shell: bash
      env:
        RUNNER_MATRIX: ${{ inputs.runner_matrix }}
        FULL_MATRIX: ${{ steps.matrix.outputs.matrix }}
        ACCEPTED_PROJECTS: ${{ steps.list.outputs.accepted_projects }}
      run: uv run bmt filter-supported-matrix

    - id: route
      shell: bash
      run: |
        if [[ "${{ steps.filter.outputs.has_legs }}" == "true" ]]; then
          echo "path=run" >>"$GITHUB_OUTPUT"
        else
          echo "path=skip_no_legs" >>"$GITHUB_OUTPUT"
        fi

    - name: Show matrix classification details
      shell: bash
      env:
        RUNNER_MATRIX: ${{ inputs.runner_matrix }}
        ACCEPTED: ${{ steps.list.outputs.accepted_projects }}
        FILTERED_MATRIX: ${{ steps.filter.outputs.matrix }}
      run: bash .github/bmt/scripts/bmt_workflow.sh summarize-matrix-handshake
