name: Restore repo snapshot
description: Download and extract the repo-snapshot artifact

inputs:
  run-id:
    description: "Run ID to download artifact from (omit for current run)"
    required: false
  github-token:
    description: "GitHub token for cross-run artifact download"
    required: false
    default: ${{ github.token }}

runs:
  using: composite
  steps:
    # run-id set → download from that run; omit → current run. Empty string can yield "Not Found".
    - name: Download repo-snapshot (from current run)
      if: ${{ inputs.run-id == '' || inputs.run-id == null }}
      uses: actions/download-artifact@70fc10c6e5e1ce46ad2ea6f2b72d43f7d47b13c3  # v8
      with:
        name: repo-snapshot

    - name: Download repo-snapshot (from run ${{ inputs.run-id }})
      if: ${{ inputs.run-id != '' && inputs.run-id != null }}
      uses: actions/download-artifact@70fc10c6e5e1ce46ad2ea6f2b72d43f7d47b13c3  # v8
      with:
        name: repo-snapshot
        run-id: ${{ inputs.run-id }}
        github-token: ${{ inputs.github-token }}

    - name: Extract repo snapshot
      shell: bash
      run: tar -xzf repo-snapshot.tar.gz -C .
